<script>
// ============================================================
// DAF_COMMERCE-Box — AUDIT KPI MARCHÉ vs TOURNÉES
// Ajout non destructif : compare les règles sans modifier les KPI existants.
// ============================================================
(function(){
  'use strict';
  function byId(id){return document.getElementById(id);}
  function all(sel,root){return Array.prototype.slice.call((root||document).querySelectorAll(sel));}
  function h(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function nrm(s){try{return norm(s);}catch(e){return String(s||'').trim().toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}}
  function siret(v){try{return normSiret(v&&v.siret);}catch(e){return String((v&&v.siret)||'').replace(/\D/g,'');}}
  function vKey(v){return [siret(v),v&&v.plaque||'',v&&v.date||'',v&&v.chassis||'',marketBrand(v),v&&v.type||''].map(function(x){return nrm(x);}).join('|');}
  function uniqVeh(list){var seen={},out=[];(list||[]).forEach(function(v){var k=vKey(v);if(!seen[k]){seen[k]=true;out.push(v);}});return out;}
  function clientForVehicle(v){var sr=siret(v);return sr && IDX && IDX.cBySiret ? IDX.cBySiret[sr] : null;}
  function siteKeyForClient(c){try{return c._siteKey||makeSiteKey(c);}catch(e){return c&&c._siteKey||'';}}
  function getToursFilter(){try{return window.toursF||toursF||'all';}catch(e){return 'all';}}
  function getToursSearch(){try{return (window.toursSearch || (typeof toursSearch!=='undefined'?toursSearch:'') || '').toLowerCase().trim();}catch(e){return '';}}

  function ensureAuditScreen(){
    if(!byId('screen-audit')){
      var more=byId('screen-more')||all('.screen').slice(-1)[0];
      var div=document.createElement('div');
      div.className='screen';
      div.id='screen-audit';
      div.innerHTML='<div class="screen-header"><div class="screen-title">🧪 Audit KPI</div><div class="screen-sub">Comparaison MARCHÉ vs TOURNÉES</div></div><div id="audit-content" style="padding-top:6px;"></div>';
      if(more&&more.parentNode)more.parentNode.insertBefore(div,more);else document.body.appendChild(div);
    }
  }

  function baseToursRows(applyMasks, applyCurrentFilter){
    var data=[];
    try{data=buildToursData();}catch(e){data=[];}
    var search=applyCurrentFilter?getToursSearch():'';
    var f=applyCurrentFilter?getToursFilter():'all';
    return data.filter(function(c){
      if(applyMasks && typeof passesToursExclusions==='function' && !passesToursExclusions(c))return false;
      if(search && [c.nom,c.ville,c.canton,c.vendeur,c.profil,c.tva,c.siret,c.groupement].join(' ').toLowerCase().indexOf(search)<0)return false;
      switch(f){
        case 'daf_with':return c.dafCount>0;
        case 'no_daf':return c.dafCount===0;
        case 'urgent':return c.isUrgent;
        case 'flotte':return c.isFlotte;
        case 'protocole':return !!c.groupement;
        case 'daf_renew_kpi':case 'daf_renew':return c.dafRenew>0;
        case 'hors_renew_kpi':case 'conc_renew':return c.horsRenew>0;
        default:return true;
      }
    });
  }

  function vehiclesFromToursRows(rows){
    try{if(typeof _dedupVehiclesFromRows==='function')return uniqVeh(_dedupVehiclesFromRows(rows)).filter(function(v){return v.possession!==false && (typeof matchesToursVehicle!=='function'||matchesToursVehicle(v));});}catch(e){}
    var list=[];(rows||[]).forEach(function(c){
      try{list=list.concat(getSiteVehicles(c._siteKey||siteKeyForClient(c))||[]);}catch(e){}
    });
    return uniqVeh(list).filter(function(v){return v.possession!==false && (typeof matchesToursVehicle!=='function'||matchesToursVehicle(v));});
  }

  function marketVehiclesCurrent(){
    var vv=[];try{vv=(DB.getVehicles()||[]).filter(function(v){return typeof matchesMarcheVehicle!=='function'||matchesMarcheVehicle(v);});}catch(e){vv=[];}
    return uniqVeh(vv);
  }
  function marketVehiclesAttached(){
    return marketVehiclesCurrent().filter(function(v){return !!clientForVehicle(v);});
  }

  function kpisFromVehicles(label, veh, rows){
    veh=uniqVeh(veh||[]); rows=rows||[];
    var daf=veh.filter(isDaf).length;
    return {
      label:label,
      veh:veh,
      rows:rows,
      parc:veh.length,
      daf:daf,
      horsDaf:veh.length-daf,
      dafRenew:veh.filter(function(v){try{return isRenewDaf(v);}catch(e){return false;}}).length,
      horsRenew:veh.filter(function(v){try{return isRenewHors(v);}catch(e){return false;}}).length,
      sites:rows.length,
      sansDaf:rows.filter(function(c){return (c.dafCount||0)===0;}).length,
      urgents:rows.filter(function(c){return !!c.isUrgent;}).length
    };
  }

  function diffVehicles(a,b){
    var bm={};(b||[]).forEach(function(v){bm[vKey(v)]=true;});
    return (a||[]).filter(function(v){return !bm[vKey(v)];});
  }

  function reasonVehicleMissingFromTours(v){
    var reasons=[];
    var sr=siret(v);
    var c=clientForVehicle(v);
    if(!sr)reasons.push('SIRET absent dans immat');
    if(sr&&!c)reasons.push('SIRET immat non trouvé dans CRM');
    if(v.possession===false)reasons.push('véhicule marqué non possédé');
    if(c){
      var sk=siteKeyForClient(c);
      var row=null;try{row=buildToursData().find(function(x){return (x._siteKey||siteKeyForClient(x))===sk;});}catch(e){}
      try{if(typeof clientMatchesGF==='function'&&!clientMatchesGF(c))reasons.push('filtre global client/vendeur/pays/département/profil');}catch(e){}
      try{if(typeof matchesToursVehicle==='function'&&!matchesToursVehicle(v))reasons.push('filtre véhicule Tournées');}catch(e){}
      if(row){
        if(row.isExclu && GF.masquerExclusTours)reasons.push('site exclu masqué');
        if(row.isInactif && GF.masquerInactifsTours)reasons.push('site inactif masqué');
        if(row.isFlotteNationale && GF.masquerFlotteNationaleTours)reasons.push('flotte nationale masquée');
        if((row.hasProjet||row.pasProjet) && GF.masquerProjet)reasons.push(row.hasProjet?'projet masqué':'pas de projet masqué');
        if(row.isSiteSecondaire && GF.masquerSitesSecondaires!==false)reasons.push('site secondaire masqué');
      }
    }
    return reasons.length?reasons.join(' + '):'à contrôler : écart non expliqué automatiquement';
  }

  function reasonVehicleMissingFromMarket(v){
    var reasons=[];
    try{if(typeof matchesMarcheVehicle==='function'&&!matchesMarcheVehicle(v))reasons.push('filtre Marché');}catch(e){}
    if(v.possession===false)reasons.push('non possédé');
    var c=clientForVehicle(v);
    if(c){
      try{if(GF.exclExclusionMarche&&isClientExcluded(c))reasons.push('Exclusion ON Marché : exclu');}catch(e){}
      try{if(GF.exclExclusionMarche&&isInactiveClientMarche(c.tva,siteKeyForClient(c)))reasons.push('Exclusion ON Marché : inactif');}catch(e){}
      try{if(GF.exclFlotteNationaleMarche&&isFlotteNationale(c))reasons.push('Hors Flotte NAT. Marché');}catch(e){}
    }
    return reasons.length?reasons.join(' + '):'à contrôler : présent Tournées mais absent Marché';
  }

  function rowForVehicle(v,reason){
    var c=clientForVehicle(v);
    return '<tr><td>'+h(v.plaque||'—')+'</td><td>'+h(marketBrand(v))+'</td><td>'+h(v.type||'—')+'</td><td>'+h(v.date||'—')+'</td><td>'+h(siret(v)||'—')+'</td><td>'+h(c?(c.nom||''):'—')+'</td><td>'+h(reason||'')+'</td></tr>';
  }
  function smallTable(list,reasonFn,max){
    max=max||80;
    if(!list.length)return '<div style="font-size:11px;color:var(--green);padding:8px 0;">Aucun écart détecté.</div>';
    var rows=list.slice(0,max).map(function(v){return rowForVehicle(v,reasonFn(v));}).join('');
    var extra=list.length>max?'<div style="font-size:10px;color:var(--orange);padding:6px 0;">Affichage limité à '+max+' lignes sur '+list.length+'.</div>':'';
    return extra+'<div style="overflow:auto;max-height:360px;border:1px solid var(--border);border-radius:8px;"><table style="width:100%;border-collapse:collapse;font-size:10px;"><thead><tr style="color:var(--text3);"><th>Plaque</th><th>Marque</th><th>Type</th><th>Date</th><th>SIRET</th><th>Client</th><th>Raison probable</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  }

  function renderAuditKpi(){
    ensureAuditScreen();
    try{buildIndex();}catch(e){}
    var allImport=uniqVeh(DB.getVehicles()||[]);
    var mVeh=marketVehiclesCurrent();
    var mAttached=marketVehiclesAttached();
    var tRowsRaw=baseToursRows(false,false);
    var tVehRaw=vehiclesFromToursRows(tRowsRaw);
    var tRowsCurrent=baseToursRows(true,true);
    var tVehCurrent=vehiclesFromToursRows(tRowsCurrent);
    var M=kpisFromVehicles('MARCHÉ actuel',mVeh,[]);
    var MA=kpisFromVehicles('MARCHÉ rattaché SIRET',mAttached,[]);
    var TR=kpisFromVehicles('TOURNÉES brut',tVehRaw,tRowsRaw);
    var TC=kpisFromVehicles('TOURNÉES actuel',tVehCurrent,tRowsCurrent);
    var missTours=diffVehicles(mVeh,tVehCurrent);
    var missMarket=diffVehicles(tVehCurrent,mVeh);
    var structural=diffVehicles(mVeh,tVehRaw);
    var kpiRows=[
      ['Parc total',M.parc,TC.parc,M.parc-TC.parc],
      ['DAF total',M.daf,TC.daf,M.daf-TC.daf],
      ['Hors DAF total',M.horsDaf,TC.horsDaf,M.horsDaf-TC.horsDaf],
      ['DAF à renouveler',M.dafRenew,TC.dafRenew,M.dafRenew-TC.dafRenew],
      ['Hors DAF à renouveler',M.horsRenew,TC.horsRenew,M.horsRenew-TC.horsRenew]
    ];
    var kpiHtml=kpiRows.map(function(r){var cls=r[3]===0?'var(--green)':(Math.abs(r[3])>0?'var(--orange)':'var(--text2)');return '<tr><td>'+h(r[0])+'</td><td>'+r[1]+'</td><td>'+r[2]+'</td><td style="font-weight:900;color:'+cls+';">'+(r[3]>0?'+':'')+r[3]+'</td></tr>';}).join('');
    var state='<div style="font-size:10px;color:var(--text3);line-height:1.5;">Filtres actuels : type <strong>'+h(GF.marcheTypeFilter||'tous')+'</strong> · vendeurs MARCHÉ <strong>'+h((GF.vendeursMarche&&GF.vendeursMarche.length?GF.vendeursMarche.join(', '):'tous'))+'</strong> · Tournées <strong>'+h(getToursFilter())+'</strong> · masques : exclus '+(GF.masquerExclusTours?'ON':'OFF')+', inactifs '+(GF.masquerInactifsTours?'ON':'OFF')+', flotte nat. '+(GF.masquerFlotteNationaleTours?'ON':'OFF')+', projets '+(GF.masquerProjet?'ON':'OFF')+', sites sec. '+(GF.masquerSitesSecondaires!==false?'ON':'OFF')+'.</div>';
    var html='';
    html+='<div class="card"><div class="card-title">Méthode d’audit</div><div style="font-size:12px;color:var(--text2);line-height:1.5;">Cette page ne corrige rien : elle compare les véhicules comptés par MARCHÉ avec ceux réellement repris par TOURNÉES, puis donne la raison probable de chaque écart.</div>'+state+'<div style="display:flex;gap:6px;margin-top:8px;"><button class="btn btn-primary btn-sm" id="audit-refresh">Recalculer</button><button class="btn btn-secondary btn-sm" id="audit-export">Exporter CSV écarts</button></div></div>';
    html+='<div class="kpi-grid"><div class="kpi-card"><div class="kpi-val">'+allImport.length+'</div><div class="kpi-lbl">Lignes immat importées</div></div><div class="kpi-card"><div class="kpi-val">'+M.parc+'</div><div class="kpi-lbl">Parc Marché actuel</div></div><div class="kpi-card c-blue"><div class="kpi-val">'+TC.parc+'</div><div class="kpi-lbl">Parc Tournées actuel</div></div><div class="kpi-card c-orange"><div class="kpi-val">'+missTours.length+'</div><div class="kpi-lbl">Marché absent Tournées</div></div></div>';
    html+='<div class="card"><div class="card-title">Comparaison KPI visibles</div><div style="overflow:auto;"><table style="width:100%;border-collapse:collapse;font-size:11px;"><thead><tr style="color:var(--text3);"><th style="text-align:left;">KPI</th><th>Marché</th><th>Tournées</th><th>Écart</th></tr></thead><tbody>'+kpiHtml+'</tbody></table></div></div>';
    html+='<div class="card"><div class="card-title">Contrôle structurel SIRET</div><div style="font-size:11px;color:var(--text2);line-height:1.5;">Marché rattaché SIRET : <strong>'+MA.parc+'</strong> véhicules. Tournées brut sans masques : <strong>'+TR.parc+'</strong> véhicules sur <strong>'+TR.sites+'</strong> sites. Écart structurel : <strong style="color:'+(structural.length?'var(--orange)':'var(--green)')+'">'+structural.length+'</strong>.</div>'+smallTable(structural,reasonVehicleMissingFromTours,50)+'</div>';
    html+='<div class="card"><div class="card-title">Véhicules comptés dans MARCHÉ mais absents de TOURNÉES actuel</div>'+smallTable(missTours,reasonVehicleMissingFromTours,100)+'</div>';
    html+='<div class="card"><div class="card-title">Véhicules comptés dans TOURNÉES mais absents de MARCHÉ actuel</div>'+smallTable(missMarket,reasonVehicleMissingFromMarket,80)+'</div>';
    var root=byId('audit-content');if(root)root.innerHTML=html;
    var ref=byId('audit-refresh');if(ref)ref.onclick=renderAuditKpi;
    var exp=byId('audit-export');if(exp)exp.onclick=function(){exportAuditCsv(missTours,missMarket);};
  }

  function exportAuditCsv(missTours,missMarket){
    var rows=[['Sens','Plaque','Marque','Type','Date','SIRET','Client','Raison probable']];
    (missTours||[]).forEach(function(v){var c=clientForVehicle(v);rows.push(['Marché absent Tournées',v.plaque||'',marketBrand(v),v.type||'',v.date||'',siret(v),c?c.nom||'':'',reasonVehicleMissingFromTours(v)]);});
    (missMarket||[]).forEach(function(v){var c=clientForVehicle(v);rows.push(['Tournées absent Marché',v.plaque||'',marketBrand(v),v.type||'',v.date||'',siret(v),c?c.nom||'':'',reasonVehicleMissingFromMarket(v)]);});
    var csv=rows.map(function(r){return r.map(function(x){return '"'+String(x==null?'':x).replace(/"/g,'""')+'"';}).join(';');}).join('\n');
    var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='audit_kpi_marche_tournees.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(function(){URL.revokeObjectURL(a.href);},500);try{toast('Audit CSV exporté');}catch(e){}
  }

  function injectAuditButton(){
    var more=byId('more-content');if(!more||byId('btn-open-audit-kpi'))return;
    var card=document.createElement('div');card.className='card';card.innerHTML='<div class="card-title">🧪 Audit KPI</div><div style="font-size:11px;color:var(--text3);margin-bottom:8px;line-height:1.4;">Compare MARCHÉ et TOURNÉES, puis liste les véhicules qui créent les écarts.</div><button class="btn btn-primary" id="btn-open-audit-kpi" style="width:100%;">Ouvrir Audit KPI</button>';
    more.insertBefore(card,more.firstChild);
    byId('btn-open-audit-kpi').onclick=function(){try{showScreen('audit');}catch(e){ensureAuditScreen();all('.screen').forEach(function(s){s.classList.remove('active');});byId('screen-audit').classList.add('active');renderAuditKpi();}};
  }

  var oldRenderMore=window.renderMore;
  if(typeof oldRenderMore==='function'){
    window.renderMore=function(){var r=oldRenderMore.apply(this,arguments);setTimeout(injectAuditButton,0);return r;};
  }
  var oldRenderScreen=window.renderScreen;
  window.renderScreen=function(name){if(name==='audit'){renderAuditKpi();return;}return oldRenderScreen?oldRenderScreen.apply(this,arguments):undefined;};
  var oldShow=window.showScreen;
  window.showScreen=function(name){ensureAuditScreen();var r=oldShow?oldShow.apply(this,arguments):undefined;if(name==='audit'){all('.screen').forEach(function(s){s.classList.remove('active');});all('.nav-item').forEach(function(n){n.classList.remove('active');});byId('screen-audit').classList.add('active');renderAuditKpi();}if(name==='more')setTimeout(injectAuditButton,120);return r;};
  document.addEventListener('DOMContentLoaded',function(){ensureAuditScreen();setTimeout(injectAuditButton,300);});
  window.renderAuditKpi=renderAuditKpi;
})();
</script>

// ============================================================
// PATCH FINAL — FILTRES VENDEUR VISIBLES ET SÉPARÉS
// Objectif :

(function(){
  if(window.__patchVendeurVisibleCB)return;
  window.__patchVendeurVisibleCB=true;

  function byId(id){return document.getElementById(id);}
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function nrm(s){try{return norm(s);}catch(e){return String(s||'').trim().toUpperCase();}}

  function ensureStates(){
    if(typeof GF==='undefined')window.GF={};
    if(!Array.isArray(GF.vendeursMarche))GF.vendeursMarche=[];
    if(!Array.isArray(GF.vendeursTours))GF.vendeursTours=[];
  }

  function distinctVendeurs(){
    ensureStates();
    var set={};
    try{(DB.getClients()||[]).forEach(function(c){var v=String((c&&c.vendeur)||'').trim();if(v)set[v]=true;});}catch(e){}
    return Object.keys(set).sort(function(a,b){return a.localeCompare(b,'fr');});
  }

  function makeFilter(kind){
    ensureStates();
    var arr=kind==='marche'?GF.vendeursMarche:GF.vendeursTours;
    var vals=distinctVendeurs();
    if(!vals.length)return '';
    var title=kind==='marche'?'Vendeur Marché':'Vendeur Tournées';
    var label=arr.length?(title+' ('+arr.length+')'):(title+' ▼');

      +'</div>'
      + vals.map(function(v){
        var checked=arr.indexOf(v)>=0;
        return '<label style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2);">'

      }).join('')

  }

  function bindFilter(kind){

        var v=this.getAttribute('data-vendeur');
        var arr=kind==='marche'?GF.vendeursMarche:GF.vendeursTours;
        if(this.checked){if(arr.indexOf(v)<0)arr.push(v);}else{arr=arr.filter(function(x){return x!==v;});}
        if(kind==='marche')GF.vendeursMarche=arr;else GF.vendeursTours=arr;
        refreshKind(kind);
      };
    });
  }

  function refreshKind(kind){
    try{invalidateCache();}catch(e){}
    try{buildIndex();}catch(e){}
    if(kind==='marche'){
      try{renderMarche();}catch(e){console.error(e);}
    }else{
      try{renderTours();}catch(e){console.error(e);}
    }
  }

  function injectMarche(){
    ensureStates();
    var bar=byId('marche-sticky-bar');
    if(!bar)return;
    var old=byId('vf-wrap-marche'); if(old)old.remove();
    var tmp=document.createElement('div'); tmp.innerHTML=makeFilter('marche');
    if(tmp.firstElementChild)bar.insertBefore(tmp.firstElementChild,bar.firstChild);
    bindFilter('marche');
  }

  function injectTours(){
    ensureStates();
    var bar=byId('tours-mask-bar');
    if(!bar)return;
    var old=byId('vf-wrap-tours'); if(old)old.remove();
    var tmp=document.createElement('div'); tmp.innerHTML=makeFilter('tours');
    var node=tmp.firstElementChild;
    if(node)bar.insertBefore(node,bar.firstChild);
    bindFilter('tours');
  }

  // TOURNÉES : filtre vendeur indépendant, appliqué au niveau site/client.
  if(typeof buildToursData==='function'){
    var __oldBuildToursData=buildToursData;
    buildToursData=function(){
      var data=__oldBuildToursData.apply(this,arguments)||[];
      ensureStates();
      if(GF.vendeursTours&&GF.vendeursTours.length){
        data=data.filter(function(c){return GF.vendeursTours.some(function(v){return nrm(c&&c.vendeur)===nrm(v);});});
      }
      return data;
    };
  }

  // MARCHÉ : si une version de matchesMarcheClient est utilisée par certains blocs, on sécurise aussi ici.
  if(typeof matchesMarcheClient==='function'){
    var __oldMatchesMarcheClient=matchesMarcheClient;
    matchesMarcheClient=function(c){
      ensureStates();
      if(GF.vendeursMarche&&GF.vendeursMarche.length&&!GF.vendeursMarche.some(function(v){return nrm(c&&c.vendeur)===nrm(v);}))return false;
      return __oldMatchesMarcheClient.apply(this,arguments);
    };
  }

  if(typeof renderMarche==='function'){
    var __oldRenderMarche=renderMarche;
    renderMarche=function(){var r=__oldRenderMarche.apply(this,arguments);setTimeout(injectMarche,0);return r;};
  }
  if(typeof renderTours==='function'){
    var __oldRenderTours=renderTours;
    renderTours=function(){var r=__oldRenderTours.apply(this,arguments);setTimeout(injectTours,0);return r;};
  }

  document.addEventListener('click',function(e){
    if(!e.target.closest || !e.target.closest('.vendeur-filter-visible')){
      document.querySelectorAll('.vendeur-filter-visible > div[id^="vf-drop-"]').forEach(function(d){d.style.display='none';});
    }
  },true);

  // Injection au chargement / après import / après navigation.
  setTimeout(function(){try{injectMarche();injectTours();}catch(e){}},250);
})();
</script>


<script>
// ============================================================
// PATCH FINAL — REVUE COMPLÈTE FILTRES MARCHÉ / TOURNÉES
// Règle clé : aucun filtre MARCHÉ ne doit modifier TOURNÉES.
// Règle clé : les statuts inactif/exclu/flotte sont calculés au site exact SIRET.
// ============================================================
(function(){
  if(window.__PATCH_FILTRES_REVUS_20260526__)return;
  window.__PATCH_FILTRES_REVUS_20260526__=true;

  function byId(id){return document.getElementById(id);}
  function qsa(sel){return Array.prototype.slice.call(document.querySelectorAll(sel));}
  function nrm(s){try{return norm(s);}catch(e){return String(s||'').trim().toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}}
  function h(s){return String(s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
  function siretClean(s){try{return normSiret(s);}catch(e){return String(s||'').replace(/[\s\.\-]/g,'');}}
  function siteKey(c){try{return makeSiteKey(c);}catch(e){return ((c&&c.tva)||'')+'|'+siretClean(c&&c.siret);}}
  function clientForVehicle(v){var s=siretClean(v&&v.siret);return (s&&IDX&&IDX.cBySiret)?IDX.cBySiret[s]:null;}
  function vehSiteKey(v){var c=clientForVehicle(v);return c?siteKey(c):'';}
  function siteVehicles(c){var sk=siteKey(c);return (IDX&&IDX.vBySite&&IDX.vBySite[sk])?IDX.vBySite[sk]:[];}
  function owned(v){return v && v.possession!==false;}
  function typeMatches(v,type){
    type=type||'tous';
    if(type==='tracteur')return typeof isTracteur==='function'?isTracteur(v):true;
    if(type==='porteur')return typeof isPorteur==='function'?isPorteur(v):true;
    return true;
  }
  function vendeurMatch(c,arr,fallback){
    if(!arr||!arr.length)return true;
    var val=(c&&c.vendeur)||fallback||'';
    return arr.some(function(x){return nrm(x)===nrm(val);});
  }
  function manualExcluded(c){
    try{var ex=getExclusionRec(c.tva)||{};if(ex.manual)return ex.excluded===true;}catch(e){}
    return nrm((c&&c.exclu)||'')==='OUI';
  }
  function inaccessible(c){
    var acc=String((c&&c.accessible)||'').trim().toUpperCase();
    return acc==='0'||acc==='NON'||acc==='FALSE'||acc==='FAUX';
  }
  function activeInVehicles(veh){
    veh=(veh||[]).filter(owned);
    if(!veh.length)return false;
    var recent=veh.some(function(v){var y=getYear(v&&v.date);return y && y>=YEAR-4;});
    var renew=veh.some(function(v){return typeof isVehicleRenewableCore==='function'&&isVehicleRenewableCore(v);});
    return recent||renew;
  }

  if(typeof GF==='object'){
    if(!Array.isArray(GF.vendeursMarche))GF.vendeursMarche=[];
    if(!Array.isArray(GF.vendeursTours))GF.vendeursTours=[];
    if(typeof GF.marcheExcluOnly==='undefined')GF.marcheExcluOnly=false;
    if(typeof GF.marcheAccessibleOnly==='undefined')GF.marcheAccessibleOnly=false;
    if(typeof GF.marcheInactifsOnly==='undefined')GF.marcheInactifsOnly=false;
    if(typeof GF.exclFlotteNationaleMarche==='undefined')GF.exclFlotteNationaleMarche=false;
    if(typeof GF.marcheFlotteRegionale==='undefined')GF.marcheFlotteRegionale=false;
    if(typeof GF.masquerExclusTours==='undefined')GF.masquerExclusTours=true;
    if(typeof GF.masquerInactifsTours==='undefined')GF.masquerInactifsTours=true;
    if(typeof GF.masquerFlotteNationaleTours==='undefined')GF.masquerFlotteNationaleTours=true;
    if(typeof GF.masquerProjet==='undefined')GF.masquerProjet=true;
    if(typeof GF.masquerSitesSecondaires==='undefined')GF.masquerSitesSecondaires=true;
  }

  // ===== MARCHÉ : filtres strictement Marché =====
  window.isInactiveClientMarche=function(tva,sk){
    var c=(sk&&IDX&&IDX.cBySite)?IDX.cBySite[sk]:null;
    if(!c && tva && IDX&&IDX.sitesByTva&&IDX.sitesByTva[tva])c=IDX.sitesByTva[tva][0];
    var veh=c?siteVehicles(c):[];
    return !activeInVehicles(veh);
  };
  window.matchesMarcheClient=function(c){
    if(!c)return false;
    if(!vendeurMatch(c,GF.vendeursMarche))return false;
    var legacyAll=!!GF.exclExclusionMarche;
    if((legacyAll||GF.marcheExcluOnly) && manualExcluded(c))return false;
    if((legacyAll||GF.marcheAccessibleOnly) && inaccessible(c))return false;
    if((legacyAll||GF.marcheInactifsOnly) && window.isInactiveClientMarche(c.tva,siteKey(c)))return false;
    if(GF.exclFlotteNationaleMarche && typeof isFlotteNationale==='function' && isFlotteNationale(c))return false;
    if(GF.marcheFlotteRegionale && typeof isFlotteRegionale==='function' && isFlotteRegionale(c))return false;
    return true;
  };
  window.matchesMarcheVehicle=function(v){
    if(!v)return false;
    if(!typeMatches(v,GF.marcheTypeFilter||'tous'))return false;
    var c=clientForVehicle(v);
    if(!vendeurMatch(c,GF.vendeursMarche,v.vendeur))return false;
    // Si le véhicule n'est pas rattaché à un SIRET client, il reste dans le Marché total.
    // Il ne peut être retiré par exclusions/flottes/inactifs que lorsqu'un client est connu.
    if(!c)return true;
    return window.matchesMarcheClient(c);
  };
  try{matchesMarcheClient=window.matchesMarcheClient;matchesMarcheVehicle=window.matchesMarcheVehicle;}catch(e){}

  // ===== TOURNÉES : indépendant de MARCHÉ =====
  window.matchesToursVehicle=function(v){
    // Important : ne lit ni GF.marcheTypeFilter ni GF.vendeursMarche.
    // La page Tournées affiche des sites visitables ; le filtre vendeur Tournées agit au niveau site.
    return !!v;
  };
  try{matchesToursVehicle=window.matchesToursVehicle;}catch(e){}

  window.isActif=function(v){var y=getYear(v&&v.date);return owned(v)&&!!y&&y>=YEAR-4;};
  try{isActif=window.isActif;}catch(e){}

  window.isInactiveClientTours=function(tva,sk){
    var c=(sk&&IDX&&IDX.cBySite)?IDX.cBySite[sk]:null;
    if(!c && tva && IDX&&IDX.sitesByTva&&IDX.sitesByTva[tva])c=IDX.sitesByTva[tva][0];
    var veh=c?siteVehicles(c):[];
    return !activeInVehicles(veh);
  };
  try{isInactiveClientTours=window.isInactiveClientTours;}catch(e){}

  window.getSiteStats=function(sk){
    var all=(IDX&&IDX.vBySite&&IDX.vBySite[sk])?IDX.vBySite[sk]:[];
    var veh=all.filter(owned);
    var dafRenew=veh.filter(function(v){return typeof isRenewDaf==='function'?isRenewDaf(v):(typeof isDaf==='function'&&isDaf(v)&&isVehicleRenewableCore(v));});
    var horsRenew=veh.filter(function(v){return typeof isRenewHors==='function'?isRenewHors(v):(typeof isDaf==='function'&&!isDaf(v)&&isVehicleRenewableCore(v));});
    var score=Math.min(Math.min(dafRenew.length+horsRenew.length,8)*12+Math.min(veh.filter(window.isActif).length,6)*2,100);
    return {parc:veh.length,dafCount:veh.filter(isDaf).length,dafRenew:dafRenew.length,horsRenew:horsRenew.length,allVehicles:all,score:score};
  };
  try{getSiteStats=window.getSiteStats;}catch(e){}

  window.getGroupStats=function(group){
    var seen={}, all=[];
    (group&&group.siteKeys||[]).forEach(function(sk){((IDX&&IDX.vBySite&&IDX.vBySite[sk])?IDX.vBySite[sk]:[]).forEach(function(v){var k=[v.tva,v.plaque,v.date,v.chassis,v.siret].join('|');if(!seen[k]){seen[k]=true;all.push(v);}});});
    var veh=all.filter(owned);
    var dafRenew=veh.filter(isRenewDaf), horsRenew=veh.filter(isRenewHors);
    return {parc:veh.length,dafCount:veh.filter(isDaf).length,dafRenew:dafRenew.length,horsRenew:horsRenew.length,allVehicles:all,score:Math.min(Math.min(dafRenew.length+horsRenew.length,8)*12+Math.min(veh.filter(window.isActif).length,6)*2,100)};
  };
  try{getGroupStats=window.getGroupStats;}catch(e){}

  function infoForSite(sk){try{return getSitePrincipalInfo(sk);}catch(e){return {hasGroup:false,principal:true,group:null};}}
  function groupSites(group){return (group&&group.siteKeys||[]).map(function(sk){return IDX&&IDX.cBySite?IDX.cBySite[sk]:null;}).filter(Boolean);}
  function groupProjectsOpen(group){
    var out=false;
    groupSites(group).forEach(function(c){if(out)return;try{out=hasOpenProject(c.tva);}catch(e){}});
    return out;
  }
  function groupPasProjet(group){return groupSites(group).some(function(c){try{return hasPasProjet(c.tva);}catch(e){return false;}});}
  function rowStats(c,sk,info){return (info&&info.hasGroup&&info.principal)?window.getGroupStats(info.group):window.getSiteStats(sk);}
  function rowFlags(c,sk,info){
    var sites=(info&&info.hasGroup&&info.principal)?groupSites(info.group):[c];
    return {
      isFlotteNationale:sites.some(isFlotteNationale),
      isFlotteRegionale:sites.some(isFlotteRegionale),
      isFlotteCoordonnee:sites.some(isFlotteCoordonnee),
      isFlotte:sites.some(isFlotteBadge),
      isUrgent:sites.some(isClientUrgent),
      hasProjet:(info&&info.hasGroup&&info.principal)?groupProjectsOpen(info.group):hasOpenProject(c.tva),
      pasProjet:(info&&info.hasGroup&&info.principal)?groupPasProjet(info.group):hasPasProjet(c.tva),
      isExclu:sites.some(function(x){return manualExcluded(x)||inaccessible(x);}),
      isInactif:(info&&info.hasGroup&&info.principal)?!activeInVehicles(window.getGroupStats(info.group).allVehicles):window.isInactiveClientTours(c.tva,sk),
      hasTypeVerifier:((info&&info.hasGroup&&info.principal)?window.getGroupStats(info.group).allVehicles:siteVehicles(c)).some(function(v){return typeof isTypeVerifier==='function'&&isTypeVerifier(v);})
    };
  }
  window.buildToursData=function(){
    if(GF.masquerSitesSecondaires===undefined)GF.masquerSitesSecondaires=true;
    var rows=(DB.getClients()||[]).filter(function(c){return vendeurMatch(c,GF.vendeursTours);}).map(function(c){
      var sk=siteKey(c); c._siteKey=sk;
      var info=infoForSite(sk);
      var row=Object.assign({},c,rowStats(c,sk,info),rowFlags(c,sk,info));
      row._siteKey=sk; row.groupInfo=info;
      row.isSiteSecondaire=!!(info&&info.hasGroup&&!info.principal);
      row._isGroupPrincipal=!!(info&&info.hasGroup&&info.principal);
      return row;
    });
    return rows;
  };
  try{buildToursData=window.buildToursData;}catch(e){}

  window.passesToursExclusions=function(c){
    if(GF.masquerExclusTours&&c.isExclu)return false;
    if(GF.masquerInactifsTours&&c.isInactif)return false;
    if(GF.masquerFlotteNationaleTours&&c.isFlotteNationale)return false;
    if(GF.masquerProjet&&(c.hasProjet||c.pasProjet))return false;
    if(GF.masquerSitesSecondaires!==false&&c.isSiteSecondaire)return false;
    return true;
  };
  try{passesToursExclusions=window.passesToursExclusions;}catch(e){}

  function refreshAll(screen){
    try{invalidateCache();}catch(e){}
    try{buildIndex();}catch(e){}
    try{if(screen==='marche')renderMarche();else if(screen==='tours')renderTours();else{renderMarche();renderTours();}}catch(e){console.error(e);}
  }

  function patchMarcheBarFinal(){
    var bar=byId('marche-sticky-bar'); if(!bar)return;
    function on(v){return v?' gf-on':'';}
    var vendorPlaceholder='<span id="vf-anchor-marche-final"></span>';
    bar.innerHTML=''
      +vendorPlaceholder
      +'<button class="gf-btn'+on((GF.marcheTypeFilter||'tous')==='tous')+'" data-final-mtype="tous">Tous</button>'
      +'<button class="gf-btn'+on(GF.marcheTypeFilter==='tracteur')+'" data-final-mtype="tracteur">Tracteurs</button>'
      +'<button class="gf-btn'+on(GF.marcheTypeFilter==='porteur')+'" data-final-mtype="porteur">Porteurs</button>'
      +'<button class="gf-btn'+on(GF.marcheExcluOnly)+'" id="final-marche-exclu" style="margin-left:auto;">Masquer EXCLU '+(GF.marcheExcluOnly?'ON':'OFF')+'</button>'
      +'<button class="gf-btn'+on(GF.marcheAccessibleOnly)+'" id="final-marche-accessible">Masquer ACCESSIBLE=0 '+(GF.marcheAccessibleOnly?'ON':'OFF')+'</button>'
      +'<button class="gf-btn'+on(GF.marcheInactifsOnly)+'" id="final-marche-inactifs">Masquer inactifs '+(GF.marcheInactifsOnly?'ON':'OFF')+'</button>'
      +'<button class="gf-btn'+on(GF.exclFlotteNationaleMarche)+'" id="final-marche-flotte-nat">Hors Flotte NAT. '+(GF.exclFlotteNationaleMarche?'ON':'OFF')+'</button>';
    qsa('[data-final-mtype]').forEach(function(b){b.onclick=function(){GF.marcheTypeFilter=this.getAttribute('data-final-mtype');refreshAll('marche');};});
    [['final-marche-exclu','marcheExcluOnly'],['final-marche-accessible','marcheAccessibleOnly'],['final-marche-inactifs','marcheInactifsOnly'],['final-marche-flotte-nat','exclFlotteNationaleMarche']].forEach(function(x){var el=byId(x[0]);if(el)el.onclick=function(){GF[x[1]]=!GF[x[1]];refreshAll('marche');};});
    try{if(typeof injectMarche==='function')injectMarche();}catch(e){}
  }

  function patchToursButtonsFinal(){
    var defs=[
      ['btn-mask-exclus','Masquer exclus',GF.masquerExclusTours],
      ['btn-mask-inactifs','Masquer inactifs',GF.masquerInactifsTours],
      ['btn-mask-flotte-nat','Hors Flotte NAT.',GF.masquerFlotteNationaleTours],
      ['btn-mask-projets','Masquer projets',GF.masquerProjet],
      ['btn-mask-sites-sec','Masquer sites sec.',GF.masquerSitesSecondaires!==false]
    ];
    defs.forEach(function(d){var el=byId(d[0]);if(!el)return;el.textContent=d[1]+' '+(d[2]?'ON':'OFF');el.className='gf-chip'+(d[2]?' on':'');});
  }
  window.updateToursMaskButtons=patchToursButtonsFinal;
  try{updateToursMaskButtons=window.updateToursMaskButtons;}catch(e){}

  var oldRenderMarche=window.renderMarche;
  window.renderMarche=function(){var r=oldRenderMarche?oldRenderMarche.apply(this,arguments):undefined;setTimeout(patchMarcheBarFinal,0);return r;};
  try{renderMarche=window.renderMarche;}catch(e){}
  var oldRenderTours=window.renderTours;
  window.renderTours=function(){var r=oldRenderTours?oldRenderTours.apply(this,arguments):undefined;setTimeout(patchToursButtonsFinal,0);return r;};
  try{renderTours=window.renderTours;}catch(e){}

  document.addEventListener('DOMContentLoaded',function(){setTimeout(function(){try{patchMarcheBarFinal();patchToursButtonsFinal();}catch(e){}},250);});
  setTimeout(function(){try{patchMarcheBarFinal();patchToursButtonsFinal();}catch(e){}},500);
})();
</script>
