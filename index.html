function _valuesFromRows(data, mapper){if(!data||data.length<2)return [];var headers=data[0].map(h=>String(h||'').trim());var vals={};data.slice(1).forEach(function(r){if(!r.some(c=>c!==''))return;var obj=mapper(r,headers);['vendeur','pays','dept'].forEach(function(k){if(obj[k])vals[k]=vals[k]||{}, vals[k][obj[k]]=true;});});return vals;}
function _filterRowsBySelections(data, mapper, sel){
  if(!data||data.length<2)return data;var headers=data[0].map(h=>String(h||'').trim());var out=[data[0]];
  data.slice(1).forEach(function(r){
    if(!r.some(c=>c!==''))return;
    var obj=mapper(r,headers);
    function ok(k){return !sel[k]||!sel[k].length||sel[k].indexOf(obj[k])>=0;}
    var y=getYear(obj.date);
    var okYear=true;
    if(sel.yearMin&&y&&y<parseInt(sel.yearMin))okYear=false;
    if(sel.yearMax&&y&&y>parseInt(sel.yearMax))okYear=false;
    if(ok('vendeur')&&ok('pays')&&ok('dept')&&okYear)out.push(r);
  });
  return out;
}
function _countRowsBySelections(data, mapper, sel){
  if(!data||data.length<2)return 0;var headers=data[0].map(h=>String(h||'').trim()), n=0;
  for(var i=1;i<data.length;i++){
    var r=data[i]; if(!r.some(c=>c!==''))continue;
    var obj=mapper(r,headers);
    function ok(k){return !sel[k]||!sel[k].length||sel[k].indexOf(obj[k])>=0;}
    var y=getYear(obj.date), okYear=true;
    if(sel.yearMin&&y&&y<parseInt(sel.yearMin))okYear=false;
    if(sel.yearMax&&y&&y>parseInt(sel.yearMax))okYear=false;
    if(ok('vendeur')&&ok('pays')&&ok('dept')&&okYear)n++;
  }
  return n;

        created++;
      }
    });
    _saveDeliveries(deliveries); return created;
  }

  function _closeDealIfComplete(d){
    if(!_dealClosed(d))return false;
    var deals=_deals(); var idx=deals.findIndex(function(x){return x.id===d.id;}); if(idx<0)return false;
    var won=_dealWon(d), lost=_dealLost(d), planned=_dealPlanned(d);
    d.archived=true; d.closedAt=new Date().toISOString();
    d.finalStatus=won>0?'GAGNE':'PERDU';
    deals[idx]=d; _saveDeals(deals);
    var projects=DB.getProjects()||[]; var pidx=projects.findIndex(function(p){return p.id===d.projectId;});

      projects[pidx].status=won>0?'GAGNE':'PERDU';

      projects[pidx].hotDealId=d.id; projects[pidx].archivedHotDeal=true; projects[pidx].updated=new Date().toISOString();
      DB.saveProjects(projects);

<script>
// ============================================================
// PATCH IMPORT CSV LÉGER IMMATRICULATIONS — GROS FICHIERS iPHONE
// Objectif : éviter l'ouverture XLSX lourde quand un export CSV filtré est disponible.
// ============================================================
(function(){
  function _toastSafe(msg,dur){try{toast(msg,dur||2600);}catch(e){console.log(msg);}}
  function parseCSVLine(line, delimiter){
    var out=[], cur='', inQuotes=false;
    for(var i=0;i<line.length;i++){
      var ch=line[i];
      if(ch==='"'){
        if(inQuotes && line[i+1]==='"'){cur+='"';i++;}
        else inQuotes=!inQuotes;
      }else if(ch===delimiter && !inQuotes){out.push(cur);cur='';}
      else cur+=ch;
    }
    out.push(cur);
    return out;
  }
  function detectDelimiter(sample){
    var semi=(sample.match(/;/g)||[]).length;
    var comma=(sample.match(/,/g)||[]).length;
    var tab=(sample.match(/\t/g)||[]).length;
    if(tab>semi && tab>comma)return '\t';
    return semi>=comma?';':',';
  }
  function parseCSVFile(file){
    return new Promise(function(resolve,reject){
      var reader=new FileReader();
      reader.onload=function(e){
        try{
          var txt=String(e.target.result||'');
          // Supprime BOM UTF-8 éventuel
          if(txt.charCodeAt(0)===0xFEFF)txt=txt.slice(1);
          var firstLine=(txt.split(/\r?\n/,1)[0]||'');
          var delimiter=detectDelimiter(firstLine);
          var lines=txt.split(/\r?\n/).filter(function(l){return l.trim()!=='';});
          var data=[];
          for(var i=0;i<lines.length;i++){
            data.push(parseCSVLine(lines[i], delimiter).map(function(v){return String(v||'').trim();}));
            if(i>0 && i%20000===0){/* laisse respirer console uniquement */}
          }
          resolve(data);
        }catch(err){reject(err);}
      };
      reader.onerror=reject;
      reader.readAsText(file,'utf-8');
    });
  }
  function enhanceImportCardCSV(){
    try{
      var card=document.querySelector('#zone-immat');
      if(card && !document.getElementById('file-immat-csv')){
        card.insertAdjacentHTML('afterend',
          '<input type="file" id="file-immat-csv" accept=".csv,.txt" style="display:none">'+
          '<div class="file-zone" id="zone-immat-csv" style="border-color:var(--daf);background:var(--daf-bg);">'+
          '<div class="fz-title">⚡ IMMATRICULATIONS CSV léger recommandé</div>'+
          '<div class="fz-sub" id="immat-csv-status">Pour gros fichiers : exporter en CSV UTF-8 filtré depuis Excel</div>'+ 
          '</div>'+
          '<div style="font-size:10px;color:var(--text3);margin:-3px 0 8px;line-height:1.4;">Le CSV évite d’ouvrir un gros XLSX en mémoire sur iPhone. Colonnes attendues identiques au fichier immatriculations.</div>'
        );
      }
    }catch(e){}
  }
  var _oldRenderImportCard = window.renderImportCard;
  if(typeof _oldRenderImportCard==='function'){
    window.renderImportCard=function(xlsxOk){
      var html=_oldRenderImportCard(xlsxOk);
      // insertion directe dans HTML si possible
      if(html.indexOf('file-immat-csv')<0){
        html=html.replace('<div id="import-diag"></div>',
          '<input type="file" id="file-immat-csv" accept=".csv,.txt" style="display:none">'+
          '<div class="file-zone" id="zone-immat-csv" style="border-color:var(--daf);background:var(--daf-bg);">'+
          '<div class="fz-title">⚡ IMMATRICULATIONS CSV léger recommandé</div>'+ 
          '<div class="fz-sub" id="immat-csv-status">Pour gros fichiers : exporter en CSV UTF-8 filtré depuis Excel</div>'+ 
          '</div>'+ 
          '<div style="font-size:10px;color:var(--text3);margin:-3px 0 8px;line-height:1.4;">Le CSV évite d’ouvrir un gros XLSX en mémoire sur iPhone. Colonnes attendues identiques au fichier immatriculations.</div>'+ 
          '<div id="import-diag"></div>');
      }
      return html;
    };
  }
  var _oldBindImportEvents = window.bindImportEvents;
  window.bindImportEvents=function(){
    if(typeof _oldBindImportEvents==='function')_oldBindImportEvents();
    enhanceImportCardCSV();
    var z=$('zone-immat-csv'), f=$('file-immat-csv');
    if(z&&f){
      z.onclick=function(){f.click();};
      f.onchange=function(e){
        var file=e.target.files&&e.target.files[0]; if(!file)return;
        var st=$('immat-csv-status'); if(st)st.textContent='Lecture CSV en cours…';
        _toastSafe('Lecture du CSV léger…');
        parseCSVFile(file).then(function(data){
          if(st)st.textContent=Math.max(0,data.length-1)+' lignes CSV lues';
          if(typeof showImportFilterModal==='function')showImportFilterModal(file,data,'immat');
          else {
            var res=importVehicles(data,DB.getPossession());DB.saveVehicles(res.vehicles);buildIndex();autoSave();renderScreen(currentScreen);_toastSafe(res.vehicles.length+' véhicules importés depuis CSV');
          }
        }).catch(function(err){console.error(err); if(st)st.textContent='Erreur lecture CSV'; _toastSafe('Erreur lecture CSV');});
      };
    }
  };
  // Renforce le mode d’emploi si la fonction existe déjà
  var _oldMode=window.renderModeEmploi;
  if(typeof _oldMode==='function'){
    window.renderModeEmploi=function(){
      _oldMode();
      try{
        var body=$('modal-body')||$('sheet-body')||document.querySelector('.sheet-body');
        if(body && body.innerHTML.indexOf('Import CSV léger')<0){
          body.insertAdjacentHTML('beforeend','<hr style="border-color:var(--border);margin:12px 0"><h3>Import CSV léger pour gros fichiers</h3><p><strong>Pourquoi :</strong> un gros XLSX peut faire planter l’iPhone car il est décompressé entièrement en mémoire avant filtrage.</p><p><strong>Solution :</strong> depuis Excel, filtrer les immatriculations utiles puis enregistrer en CSV UTF-8. Dans PLUS, utiliser le bouton <strong>IMMATRICULATIONS CSV léger recommandé</strong>.</p><p><strong>Effet :</strong> mêmes colonnes attendues, mêmes filtres année/vendeur/pays/département, mais lecture plus légère.</p>');
        }
      }catch(e){}
    };
  }
})();
</script>



<script>
// ===== PATCH VALIDÉ — ARCHITECTURE AFFAIRES CHAUDES / COULEURS MARQUES / IMPORT =====
(function(){
  function byId(id){return document.getElementById(id)}
  function qsa(s){return Array.prototype.slice.call(document.querySelectorAll(s));}
  function toastSafe(m){try{toast(m)}catch(e){console.log(m)}}
  function safeArr(v){return Array.isArray(v)?v:[]}
  function settings(){try{return DB.getSettings()||{}}catch(e){return {}}}
  function saveSettings(s){try{DB.saveSettings(s||{}); if(typeof autoSave==='function')autoSave();}catch(e){}}
  function getStore(k){var s=settings();return Array.isArray(s[k])?s[k]:[]}
  function setStore(k,v){var s=settings();s[k]=v||[];saveSettings(s)}
  function id(p){return p+'_'+Date.now()+'_'+Math.floor(Math.random()*100000)}

  // 1) Couleurs fixes par marque : une marque = toujours la même couleur, quel que soit le filtre.
  var fixedBrandColors={
    'DAF':'#e8a020','SCANIA':'#cc3333','VOLVO':'#4488cc','MAN':'#4a90d9','MERCEDES':'#888888','MERCEDES-BENZ':'#888888',
    'RENAULT':'#d7a000','IVECO':'#e07830','FORD':'#2f6fd6','ISUZU':'#6aa84f','FIAT':'#a64d79','NISSAN':'#674ea7',
    'TOYOTA':'#3ab87a','FUSO':'#8060d0','AUTRE':'#a0a8b8','INCONNU':'#606880'
  };
  window.BRAND_COLORS=Object.assign({}, window.BRAND_COLORS||{}, fixedBrandColors);
  window.getStableBrandColor=function(brand){
    var b=String(brand||'Inconnu').trim().toUpperCase();
    if(window.BRAND_COLORS[b])return window.BRAND_COLORS[b];
    var hash=0; for(var i=0;i<b.length;i++) hash=((hash<<5)-hash)+b.charCodeAt(i), hash|=0;
    var palette=['#7cb342','#26a69a','#5c6bc0','#ab47bc','#ec407a','#8d6e63','#78909c','#ff7043','#29b6f6','#9ccc65'];
    return palette[Math.abs(hash)%palette.length];
  };

  // 2) Import : éviter deux boutons qui semblent faire la même chose.
  function cleanImportButtons(){
    var labels=['Importer avec ces critères','Importer selon années/critères'];
    qsa('button').forEach(function(b){
      var t=(b.textContent||'').trim();
      if(t==='Importer avec ces critères') b.textContent='Importer maintenant';
      if(t==='Importer selon années/critères') b.textContent='Prévisualiser / filtrer l’import';
    });
  }

  // 3) AFFAIRES CHAUDES devient le module de résultat. PROJETS reste simple.
  window.getHotDeals=window.getHotDeals||function(){return getStore('hotDeals')};
  window.saveHotDeals=window.saveHotDeals||function(v){setStore('hotDeals',v)};
  window.getArchivedHotDeals=function(){return getStore('archivedHotDeals')};
  window.saveArchivedHotDeals=function(v){setStore('archivedHotDeals',v)};
  window.getDeliveries=window.getDeliveries||function(){return getStore('deliveries')};
  window.saveDeliveries=window.saveDeliveries||function(v){setStore('deliveries',v)};

  function clientBySite(sk){return (window.IDX&&IDX.cBySite&&IDX.cBySite[sk])||null;}
  function makeSiteOptions(selected){
    return (DB.getClients()||[]).map(function(c){var sk=(typeof makeSiteKey==='function')?makeSiteKey(c):(c.key||c.tva||'');var label=[c.nom,c.ville,c.tva,c.siret].filter(Boolean).join(' / ');return '<option value="'+escH(sk)+'"'+(sk===selected?' selected':'')+'>'+escH(label)+'</option>';}).join('');
  }
  function lineWon(l){return parseInt((l&&l.wonQty)||0)||0}
  function lineLost(l){return parseInt((l&&l.lostQty)||0)||0}
  function dealWon(d){return safeArr(d&&d.lines).reduce(function(a,l){return a+lineWon(l)},0)}
  function dealLost(d){return safeArr(d&&d.lines).reduce(function(a,l){return a+lineLost(l)},0)}
  function dealQty(d){return safeArr(d&&d.lines).length}
  function validateDealBeforeArchive(d){
    for(var i=0;i<safeArr(d.lines).length;i++){
      var l=d.lines[i];
      if(!lineWon(l)&&!lineLost(l)) return 'Chaque véhicule doit avoir un résultat GAGNÉ ou PERDU.';
      if(lineLost(l)>0 && (!l.concurrent || !l.lossComment)) return 'Pour chaque véhicule perdu, renseigne la marque concurrente et le commentaire.';
    }
    return '';
  }
  function addDeliveriesForWonLines(d){
    var deliveries=getDeliveries(); var created=0;
    safeArr(d.lines).forEach(function(l,idx){
      if(lineWon(l)<=0)return;
      var sourceId=d.id+'|'+(l.id||idx)+'|won';
      if(deliveries.some(function(x){return x.sourceId===sourceId}))return;
      deliveries.push({id:id('del'),sourceId:sourceId,dealId:d.id,siteKey:d.siteKey,tva:d.tva,client:d.client,type:l.type,model:l.model,orderDate:'',deliveryDate:'',productionNo:'',bodybuilder:'',vnvo:'VN',maintenance:'Non',paccar:'Non',lessor:'',prime:0});
      created++;
    });
    saveDeliveries(deliveries); return created;
  }
  function archiveDeal(dealId){
    var deals=getHotDeals(); var idx=deals.findIndex(function(x){return x.id===dealId}); if(idx<0)return;
    var d=deals[idx]; var err=validateDealBeforeArchive(d); if(err){toastSafe(err);return;}
    var won=dealWon(d), lost=dealLost(d); var status=won>0?'GAGNÉ':'PERDU';
    var deliveriesCreated=won>0?addDeliveriesForWonLines(d):0;
    d.archivedAt=new Date().toISOString(); d.result=status; d.wonQty=won; d.lostQty=lost;
    var archives=getArchivedHotDeals(); archives.push(d); saveArchivedHotDeals(archives);
    deals.splice(idx,1); saveHotDeals(deals);
    if(d.projectId){
      var ps=DB.getProjects()||[]; var p=ps.find(function(x){return x.id===d.projectId});
      if(p){p.resultSummary=(won?won+' gagné(s) ':'')+(lost?lost+' perdu(s)':''); p.resultDate=new Date().toISOString(); p.hotDealArchived=true; p.status=p.status||'EN_COURS'; DB.saveProjects(ps);}
    }
    toastSafe('Affaire archivée : '+status+(deliveriesCreated?' · '+deliveriesCreated+' livraison(s) créée(s)':''));
    if(typeof renderAffaires==='function')renderAffaires();
    if(typeof renderLivraisons==='function' && window.currentScreen==='livraisons')renderLivraisons();
  }

  window.openHotDealModal=function(dealId){
    var deals=getHotDeals(); var d=deals.find(function(x){return x.id===dealId})||{id:id('deal'),created:new Date().toISOString().slice(0,10),siteKey:'',lines:[]};
    openModal(dealId?'Modifier affaire chaude':'Nouvelle affaire chaude',
      '<div class="form-group"><label class="form-label">Date création projet</label><input class="form-input" type="date" id="hd-created" value="'+escH(String(d.created||'').slice(0,10))+'"></div>'+ 
      '<div class="form-group"><label class="form-label">Nom client</label><select class="form-input" id="hd-site">'+makeSiteOptions(d.siteKey)+'</select></div>'+ 
      '<div style="font-size:11px;color:var(--text3);line-height:1.4;">Le détail des véhicules se gère dans Affaires chaudes. La page Projets reste succincte.</div>',
      [{label:'Annuler',cls:'btn-ghost'},{label:'Enregistrer',cls:'btn-primary',action:function(){
        var sk=(byId('hd-site')||{}).value||''; var c=clientBySite(sk)||{};
        d.created=(byId('hd-created')||{}).value||new Date().toISOString().slice(0,10); d.siteKey=sk; d.tva=c.tva||d.tva||''; d.client=c.nom||d.client||'';
        if(!dealId) deals.push(d); saveHotDeals(deals); toastSafe('Affaire enregistrée'); if(typeof renderAffaires==='function')renderAffaires();
      }}]);
  };
  window.openHotDealLineModal=function(dealId,lineIndex){
    var deals=getHotDeals(); var d=deals.find(function(x){return x.id===dealId}); if(!d)return;
    var idx=(lineIndex==null||lineIndex==='')?-1:parseInt(lineIndex); var l=idx>=0?safeArr(d.lines)[idx]:{id:id('line'),type:'Tracteur',model:'',wonQty:0,lostQty:0,concurrent:'',lossComment:''};
    openModal(idx>=0?'Modifier véhicule':'Ajouter véhicule',
      '<div class="form-group"><label class="form-label">Date automatique création projet</label><input class="form-input" value="'+escH(fmtDate(d.created||new Date()))+'" disabled></div>'+ 
      '<div class="form-group"><label class="form-label">Nom client</label><input class="form-input" value="'+escH(d.client||'')+'" disabled></div>'+ 
      '<div class="form-group"><label class="form-label">Type véhicule</label><select class="form-input" id="hdl-type"><option '+(l.type==='Tracteur'?'selected':'')+'>Tracteur</option><option '+(l.type==='Porteur'?'selected':'')+'>Porteur</option></select></div>'+ 
      '<div class="form-group"><label class="form-label">Modèle</label><input class="form-input" id="hdl-model" value="'+escH(l.model||'')+'" placeholder="XF480, XB290 19t…"></div>'+ 
      '<div class="sep"></div><div style="font-size:11px;color:var(--text3);line-height:1.45;margin-bottom:8px;">Le résultat est géré ici, pas dans Projet. Si PERDU, la marque concurrente et le commentaire sont obligatoires.</div>'+ 
      '<div class="form-group"><label class="form-label">Résultat</label><select class="form-input" id="hdl-result"><option value="">À suivre</option><option value="GAGNE" '+(lineWon(l)>0?'selected':'')+'>Gagné DAF</option><option value="PERDU" '+(lineLost(l)>0?'selected':'')+'>Perdu</option></select></div>'+ 
      '<div class="form-group"><label class="form-label">Marque concurrente si perdu</label><input class="form-input" id="hdl-conc" value="'+escH(l.concurrent||'')+'"></div>'+ 
      '<div class="form-group"><label class="form-label">Commentaire si perdu</label><textarea class="form-input form-textarea" id="hdl-losscomment">'+escH(l.lossComment||l.comment||'')+'</textarea></div>',
      [{label:'Annuler',cls:'btn-ghost'},{label:'Enregistrer',cls:'btn-primary',action:function(){
        var result=(byId('hdl-result')||{}).value||''; var nl={id:l.id||id('line'),type:(byId('hdl-type')||{}).value||'Tracteur',model:(byId('hdl-model')||{}).value||'',wonQty:result==='GAGNE'?1:0,lostQty:result==='PERDU'?1:0,concurrent:result==='PERDU'?((byId('hdl-conc')||{}).value||''):'',lossComment:result==='PERDU'?((byId('hdl-losscomment')||{}).value||''):''};
        if(nl.lostQty>0 && (!nl.concurrent||!nl.lossComment)){toastSafe('Pour un véhicule perdu, renseigne concurrent + commentaire.');return;}
        d.lines=safeArr(d.lines); if(idx>=0)d.lines[idx]=nl; else d.lines.push(nl); saveHotDeals(deals); if(typeof renderAffaires==='function')renderAffaires();
      }}]);
  };
  window.duplicateHotDealLine=function(dealId,lineIndex){
    var deals=getHotDeals(); var d=deals.find(function(x){return x.id===dealId}); if(!d)return; var l=safeArr(d.lines)[parseInt(lineIndex)]; if(!l)return;
    var copy=Object.assign({},l,{id:id('line'),wonQty:0,lostQty:0,concurrent:'',lossComment:''}); d.lines.push(copy); saveHotDeals(deals); if(typeof renderAffaires==='function')renderAffaires(); toastSafe('Véhicule dupliqué');
  };
  window.renderAffaires=function(){
    var deals=getHotDeals(), archives=getArchivedHotDeals(); var html='';
    html+='<div class="kpi-grid kpi-grid-3"><div class="kpi-card"><div class="kpi-val">'+deals.length+'</div><div class="kpi-lbl">Affaires actives</div></div><div class="kpi-card c-green"><div class="kpi-val">'+deals.reduce(function(a,d){return a+dealWon(d)},0)+'</div><div class="kpi-lbl">Gagnés</div></div><div class="kpi-card c-red"><div class="kpi-val">'+deals.reduce(function(a,d){return a+dealLost(d)},0)+'</div><div class="kpi-lbl">Perdus</div></div></div>';
    html+='<div class="card"><button class="btn btn-primary" id="btn-add-hotdeal" style="width:100%;">+ Nouvelle affaire chaude</button></div>';
    if(!deals.length) html+='<div class="empty-state"><div class="empty-icon">🔥</div><div class="empty-title">Aucune affaire chaude active</div></div>';
    deals.forEach(function(d){html+='<div class="card"><div style="display:flex;justify-content:space-between;gap:8px;"><div><div style="font-size:14px;font-weight:800;">'+escH(d.client||'Client')+'</div><div style="font-size:10px;color:var(--text3);">Projet en cours · Créé le '+escH(fmtDate(d.created))+' · '+dealQty(d)+' véhicule(s)</div></div><button class="btn btn-secondary btn-sm btn-edit-deal" data-id="'+escH(d.id)+'">Modifier</button></div>';
      html+='<div style="overflow-x:auto;margin-top:8px;"><table style="width:100%;border-collapse:collapse;font-size:10px;"><tr style="color:var(--text3);text-align:left;"><th>Type</th><th>Modèle</th><th>Résultat</th><th>Concurrent</th><th></th></tr>';
      safeArr(d.lines).forEach(function(l,i){var res=lineWon(l)?'Gagné':(lineLost(l)?'Perdu':'À suivre');html+='<tr style="border-top:1px solid var(--border);"><td>'+escH(l.type||'')+'</td><td>'+escH(l.model||'')+'</td><td>'+escH(res)+'</td><td>'+escH(l.concurrent||'')+'</td><td style="white-space:nowrap;"><button class="btn btn-secondary btn-sm btn-edit-line" data-id="'+escH(d.id)+'" data-idx="'+i+'">Modifier</button> <button class="btn btn-ghost btn-sm btn-dup-line" data-id="'+escH(d.id)+'" data-idx="'+i+'">× Dupliquer</button></td></tr>';});
      html+='</table></div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;"><button class="btn btn-secondary btn-sm btn-add-line" data-id="'+escH(d.id)+'">+ Ajouter un véhicule</button><button class="btn btn-green btn-sm btn-archive-deal" data-id="'+escH(d.id)+'">Archiver résultat</button><button class="btn btn-red btn-sm btn-del-deal" data-id="'+escH(d.id)+'">Supprimer</button></div></div>';});
    html+='<div class="card"><div class="card-title">📦 Archives Affaires Chaudes</div>'+(archives.length?archives.map(function(a){return '<div class="diag-row"><div><strong>'+escH(a.client||'Client')+'</strong><div style="font-size:10px;color:var(--text3);">'+escH(a.result||'')+' · '+escH(a.wonQty||0)+' gagné(s) · '+escH(a.lostQty||0)+' perdu(s) · '+escH(fmtDate(a.archivedAt))+'</div></div></div>';}).join(''):'<div style="font-size:11px;color:var(--text3);">Aucune archive.</div>')+'</div>';
    var c=byId('affaires-content'); if(c)c.innerHTML=html;
    qsa('#affaires-content .btn-edit-deal').forEach(function(b){b.onclick=function(){openHotDealModal(this.dataset.id)}});
    qsa('#affaires-content .btn-add-line').forEach(function(b){b.onclick=function(){openHotDealLineModal(this.dataset.id)}});
    qsa('#affaires-content .btn-edit-line').forEach(function(b){b.onclick=function(){openHotDealLineModal(this.dataset.id,this.dataset.idx)}});
    qsa('#affaires-content .btn-dup-line').forEach(function(b){b.onclick=function(){duplicateHotDealLine(this.dataset.id,this.dataset.idx)}});
    qsa('#affaires-content .btn-archive-deal').forEach(function(b){b.onclick=function(){archiveDeal(this.dataset.id)}});
    qsa('#affaires-content .btn-del-deal').forEach(function(b){b.onclick=function(){var deals=getHotDeals().filter(function(d){return d.id!==b.dataset.id});saveHotDeals(deals);renderAffaires();}});
    var add=byId('btn-add-hotdeal'); if(add)add.onclick=function(){openHotDealModal()};
  };

  // Liaison projet -> affaire chaude : PROJETS reste simple, il sert de point de départ.
  window.createHotDealFromProject=function(pid){
    var ps=DB.getProjects()||[], p=ps.find(function(x){return x.id===pid}); if(!p){toastSafe('Projet introuvable');return;}
    var deals=getHotDeals(); var existing=deals.find(function(d){return d.projectId===pid}); if(existing){toastSafe('Affaire chaude déjà créée'); if(typeof showScreen==='function')showScreen('affaires'); return;}
    var c=(DB.getClients()||[]).find(function(x){return x.tva===p.tva})||{}; var sk=(typeof makeSiteKey==='function')?makeSiteKey(c):(c.key||c.tva||'');
    var qty=parseInt(p.camions||p.nb||1)||1; var lines=[]; for(var i=0;i<qty;i++)lines.push({id:id('line'),type:p.type||'Tracteur',model:'',wonQty:0,lostQty:0,concurrent:'',lossComment:''});
    deals.push({id:id('deal'),projectId:pid,created:(p.created||new Date().toISOString()).slice(0,10),siteKey:sk,tva:p.tva||c.tva||'',client:p.nom||c.nom||'',sourceProjet:true,lines:lines});
    saveHotDeals(deals); p.hotDealLinked=true; DB.saveProjects(ps); toastSafe('Affaire chaude créée depuis le projet'); if(typeof showScreen==='function')showScreen('affaires');
  };

  // Ajoute un bouton Développer en affaire chaude dans les cartes projet si absent.
  function enhanceProjectButtons(){
    qsa('#projets-content .proj-card, #sheet-body .proj-card').forEach(function(card){
      if(card.querySelector('.btn-develop-hotdeal'))return;
      var pid=card.getAttribute('data-pid') || (card.dataset&&card.dataset.pid); if(!pid)return;
      card.insertAdjacentHTML('beforeend','<button class="btn btn-secondary btn-sm btn-develop-hotdeal" data-pid="'+escH(pid)+'" style="margin-top:6px;width:100%;">🔥 Développer en affaire chaude</button>');
    });
    qsa('.btn-develop-hotdeal').forEach(function(b){b.onclick=function(e){e.stopPropagation();createHotDealFromProject(this.dataset.pid)}});
  }

  // Mode d'emploi : ajoute la nouvelle règle claire.
  var oldHelp=window.renderModeEmploi;
  window.renderModeEmploi=function(){
    if(typeof oldHelp==='function')oldHelp();
    setTimeout(function(){var body=byId('modal-body')||byId('sheet-body'); if(body && body.innerHTML.indexOf('Architecture Projet / Affaires Chaudes')<0){body.insertAdjacentHTML('beforeend','<div class="card"><div class="card-title">Architecture Projet / Affaires Chaudes</div><div style="font-size:11px;color:var(--text2);line-height:1.55;"><p><strong>Projet :</strong> reste simple et succinct. Il indique le besoin global : statut, type, quantité, période, commentaire.</p><p><strong>Affaire chaude :</strong> traite le résultat détaillé véhicule par véhicule. Bouton + Ajouter un véhicule = ajoute une unité. Bouton × Dupliquer = copie un véhicule pour créer plusieurs unités identiques.</p><p><strong>Résultat :</strong> saisi uniquement dans Affaires Chaudes. Si perdu, concurrent et commentaire obligatoires.</p><p><strong>Archive :</strong> quand l’affaire est terminée, elle quitte les affaires actives et va dans Archives Affaires Chaudes.</p><p><strong>Livraisons :</strong> seuls les véhicules gagnés créent des lignes de Suivi Livraisons et alimentent les commissions.</p></div></div>');}},100);
  };

  // Hooks d'affichage
  var oldRenderAffaires=window.renderAffaires;
  var oldRenderProjets=window.renderProjets;
  if(typeof oldRenderProjets==='function')window.renderProjets=function(){oldRenderProjets();setTimeout(enhanceProjectButtons,80)};
  var oldScreen=window.renderScreen;
  window.renderScreen=function(name){var r;if(name==='affaires'){renderAffaires();return;} r=oldScreen?oldScreen(name):undefined; if(name==='projets')setTimeout(enhanceProjectButtons,80); cleanImportButtons(); return r;};
  document.addEventListener('click',function(){setTimeout(cleanImportButtons,50)},true);
  setTimeout(cleanImportButtons,500);
})();
</script>


<script>
// ===== PATCH FINAL V22 — PAGE AFFAIRES UNIQUE + ABANDON + SYNCHRO PROJETS =====
(function(){
  function $(id){return document.getElementById(id)}
  function qsa(s,root){return Array.prototype.slice.call((root||document).querySelectorAll(s));}
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function arr(v){return Array.isArray(v)?v:[];}
  function id(prefix){return (prefix||'id')+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);}
  function today(){return new Date().toISOString().slice(0,10)}
  function fmt(d){try{return d?new Date(d).toLocaleDateString('fr-FR'):'—'}catch(e){return d||'—'}}
  function toastSafe(m){try{toast(m)}catch(e){console.log(m)}}
  function storeGet(k){try{return DB.get(k)||[]}catch(e){try{return JSON.parse(localStorage.getItem(k)||'[]')}catch(_){return []}}}
  function storeSet(k,v){try{DB.set(k,v)}catch(e){localStorage.setItem(k,JSON.stringify(v))} try{autoSave()}catch(e){}}
  function clients(){try{return DB.getClients()||[]}catch(e){return []}}
  function projects(){try{return DB.getProjects()||[]}catch(e){return []}}
  function saveProjects(v){try{DB.saveProjects(v)}catch(e){storeSet('projects',v)}}
  function deals(){ if(typeof getHotDeals==='function'){try{return arr(getHotDeals())}catch(e){}} return arr(storeGet('hotDeals')); }
  function saveDeals(v){ if(typeof saveHotDeals==='function'){try{saveHotDeals(v);return}catch(e){}} storeSet('hotDeals',v); }
  function archives(){return arr(storeGet('hotDealArchives'))}
  function saveArchives(v){storeSet('hotDealArchives',v)}
  function deliveries(){ if(typeof getDeliveries==='function'){try{return arr(getDeliveries())}catch(e){}} return arr(storeGet('deliveries')); }
  function saveDeliveries(v){ if(typeof saveDeliveries==='function'){try{window.saveDeliveries(v);return}catch(e){}} storeSet('deliveries',v); }
  function cByTva(tva){return clients().find(function(c){return c.tva===tva})||{};}
  function siteKey(c){return c.key || ((c.tva||'')+'|'+(c.siret||c.ville||''));}
  function cBySiteKey(sk){return clients().find(function(c){return siteKey(c)===sk || c.key===sk || c.tva===sk})||{};}
  function pById(pid){return projects().find(function(p){return p.id===pid})||null;}
  function dealByProject(pid){return deals().find(function(d){return d.projectId===pid})||null;}
  function qty(l){return parseInt(l.qty||l.quantity||1)||1}
  function won(l){return parseInt(l.wonQty||l.gagne||0)||0}
  function lost(l){return parseInt(l.lostQty||l.perdu||0)||0}
  function totalPlanned(d){return arr(d.lines).reduce(function(a,l){return a+qty(l)},0)}
  function totalWon(d){return arr(d.lines).reduce(function(a,l){return a+won(l)},0)}
  function totalLost(d){return arr(d.lines).reduce(function(a,l){return a+lost(l)},0)}
  function statusLabel(s){var m={EN_COURS:'EN COURS',FUTUR:'FUTUR',GAGNE:'GAGNÉ',PERDU:'PERDU',REPORTE:'REPORTÉ',SANS_PROJET:'SANS PROJET',ABANDON:'ABANDON'};return m[s]||s||'EN COURS'}
  function statusClass(s){s=String(s||'EN_COURS').toLowerCase().replace('_','-'); if(s==='abandon')return 's-perdu'; return 's-'+s;}
  function dealComputedResult(d){
    if(d.status==='ABANDON')return 'ABANDON';
    var w=totalWon(d), l=totalLost(d), p=totalPlanned(d);
    if(w>0 && l>=0 && w+l>=Math.max(1,p))return 'GAGNE';
    if(w===0 && l>0 && l>=Math.max(1,p))return 'PERDU';
    return d.status||'EN_COURS';
  }
  function resultText(d){
    var parts=[]; var w=totalWon(d), l=totalLost(d);
    if(w) parts.push(w+' gagné(s)');
    if(l) parts.push(l+' perdu(s)');
    if(!parts.length) parts.push(statusLabel(d.status||'EN_COURS'));
    return parts.join(' · ');

  function syncProjectFromDealObj(d){
    if(!d || !d.projectId)return;

    var planned=totalPlanned(d);
    var types=Array.from(new Set(arr(d.lines).map(function(l){return l.type||''}).filter(Boolean))).join(' / ');

    if(types)p.type=types;

    p.hotDealId=d.id;
    p.affaireStatus=d.status||p.status||'EN_COURS';
    p.resultatAffaire=resultText(d);

    p.perdusAffaire=totalLost(d);

  function ensureDealForProject(pid){
    var ps=projects(); var p=ps.find(function(x){return x.id===pid}); if(!p)return null;
    var ds=deals(); var d=ds.find(function(x){return x.projectId===pid});
    if(d)return d;
    var c=cByTva(p.tva)||{};
    d={id:id('deal'),projectId:pid,created:p.created||p.date||today(),siteKey:siteKey(c)||p.tva,tva:p.tva||'',client:p.nom||c.nom||'',status:p.status||'EN_COURS',comment:p.commentaire||'',lines:[]};
    var n=parseInt(p.camions||0)||0;
    if(n>0){ d.lines.push({id:id('line'),created:d.created,type:p.type||'Tracteur',model:'',qty:n,wonQty:0,lostQty:0,concurrent:'',lossComment:''}); }
    ds.push(d); saveDeals(ds);

  function archiveDeal(dealId,forcedStatus){
    var ds=deals(); var idx=ds.findIndex(function(d){return d.id===dealId}); if(idx<0)return;

    var invalid=arr(d.lines).some(function(l){return lost(l)>0 && (!(l.concurrent||'').trim() || !(l.lossComment||l.comment||'').trim())});
    if(invalid){toastSafe('Concurrent et commentaire obligatoires pour les véhicules perdus');return;}
    // Crée les lignes de livraison pour véhicules gagnés.
    if(totalWon(d)>0){
      var liv=deliveries(); var created=0;
      arr(d.lines).forEach(function(l){for(var i=1;i<=won(l);i++){var sid=d.id+'|'+l.id+'|'+i; if(!liv.some(function(x){return x.sourceId===sid})){liv.push({id:id('del'),sourceId:sid,dealId:d.id,projectId:d.projectId||'',siteKey:d.siteKey,tva:d.tva,client:d.client,type:l.type,model:l.model,orderDate:'',deliveryDate:'',productionNo:'',bodybuilder:'',vnvo:'VN',maintenance:'Non',paccar:'Non',lessor:'',prime:0});created++;}}});

  function openDeal(dealId){showScreen('affaires');setTimeout(function(){var el=document.querySelector('[data-deal-id="'+dealId+'"]'); if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},150)}
  function saveDealLine(dealId,idx){

      '<div class="form-group"><label class="form-label">Quantité gagnée DAF</label><input type="number" min="0" class="form-input" id="aff-line-won" value="'+esc(won(l))+'"></div>'+

    if(activeProjects.length){html+='<div style="display:flex;flex-direction:column;gap:6px;">'; activeProjects.slice(0,20).forEach(function(p){var d=dealByProject(p.id); html+='<button class="btn btn-secondary btn-sm btn-open-proj-aff" data-pid="'+esc(p.id)+'" style="justify-content:space-between;"><span>'+esc(p.nom||p.tva||'Projet')+'</span><span>'+(d?'Ouvrir affaire':'Créer affaire')+'</span></button>';}); html+='</div>';} else html+='<div style="font-size:11px;color:var(--text3);">Aucun projet actif.</div>'; html+='</div>';
    if(!shown.length) html+='<div class="empty-state"><div class="empty-icon">🔥</div><div class="empty-title">Aucune affaire active</div><div class="empty-sub">Crée une affaire depuis un projet client.</div></div>';

      html+='<div style="overflow-x:auto;margin-top:8px;"><table style="width:100%;border-collapse:collapse;font-size:10px;"><tr style="color:var(--text3);text-align:left;"><th>Date</th><th>Type</th><th>Modèle</th><th>Qté</th><th>Gagné</th><th>Perdu</th><th>Concurrent</th><th></th></tr>';
      arr(d.lines).forEach(function(l,i){html+='<tr style="border-top:1px solid var(--border);"><td>'+fmt(l.created||d.created)+'</td><td>'+esc(l.type||'')+'</td><td>'+esc(l.model||'')+'</td><td>'+qty(l)+'</td><td style="color:var(--green);font-weight:800;">'+won(l)+'</td><td style="color:var(--red);font-weight:800;">'+lost(l)+'</td><td>'+esc(l.concurrent||'')+'</td><td><button class="btn btn-secondary btn-sm btn-line" data-id="'+esc(d.id)+'" data-idx="'+i+'">Modifier</button></td></tr>';});
      html+='</table></div><div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;"><button class="btn btn-secondary btn-sm btn-add-line" data-id="'+esc(d.id)+'">+ Ajouter un véhicule</button><button class="btn btn-secondary btn-sm btn-dupe-last" data-id="'+esc(d.id)+'">× Dupliquer dernier véhicule</button><button class="btn btn-green btn-sm btn-archive-won" data-id="'+esc(d.id)+'">Archiver / générer livraisons</button><button class="btn btn-red btn-sm btn-archive-abandon" data-id="'+esc(d.id)+'">Abandon</button></div></div>';

    var cont=$('affaires-content'); if(cont)cont.innerHTML=html;
    qsa('.btn-open-proj-aff').forEach(function(b){b.onclick=function(){var d=ensureDealForProject(b.dataset.pid); if(d)openDeal(d.id)}});

    qsa('.btn-archive-abandon').forEach(function(b){b.onclick=function(){archiveDeal(b.dataset.id,'ABANDON')}});
  };
  window.renderProjets=function(){

    var html='<div class="kpi-grid" style="margin-top:4px;"><div class="kpi-card c-blue"><div class="kpi-val">'+open.length+'</div><div class="kpi-lbl">Affaires ouvertes</div></div><div class="kpi-card c-green"><div class="kpi-val">'+wonN+'</div><div class="kpi-lbl">Gagnés</div></div><div class="kpi-card c-red"><div class="kpi-val">'+lostN+'</div><div class="kpi-lbl">Perdus</div></div></div>';
    html+='<div style="font-size:11px;color:var(--text3);padding:0 12px 8px;">Cette page est désormais une lecture simple. Le détail et les résultats sont dans AFFAIRES.</div>';

    var cont=$('projets-content'); if(cont)cont.innerHTML=html;
    qsa('#projets-content .proj-card').forEach(function(card){card.onclick=function(){var d=ensureDealForProject(card.dataset.pid); if(d)openDeal(d.id)}});
  };

    qsa('.nav-item[data-screen="affaires"] .nav-label').forEach(function(l){l.textContent='Affaires'});
  }

      bs.forEach(function(b){var t=(b.textContent||'').trim(); if(t==='Importer selon années/critères'||t==='Prévisualiser / filtrer l’import')b.style.display='none'; if(t==='Importer avec ces critères'||t==='Importer maintenant')b.textContent='Importer';});

<script>
// ===== PATCH V23 — VRAIE FUSION PROJETS + AFFAIRES EN UNE PAGE UNIQUE =====
(function(){
  function byId(id){return document.getElementById(id)}
  function qsa(s,r){return Array.prototype.slice.call((r||document).querySelectorAll(s));}
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function safeToast(m){try{toast(m)}catch(e){console.log(m)}}
  function arr(v){return Array.isArray(v)?v:[];}
  function uid(p){return (p||'id')+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,8)}
  function today(){return new Date().toISOString().slice(0,10)}
  function fmt(d){if(!d)return '—';try{return new Date(d).toLocaleDateString('fr-FR')}catch(e){return d}}
  function getStore(k){try{return DB.get(k)||[]}catch(e){try{return JSON.parse(localStorage.getItem(k)||'[]')}catch(_){return []}}}
  function setStore(k,v){try{DB.set(k,v)}catch(e){localStorage.setItem(k,JSON.stringify(v))}try{autoSave()}catch(e){}}
  function getProjectsSafe(){try{return DB.getProjects()||[]}catch(e){return getStore('projects')}}
  function saveProjectsSafe(v){try{DB.saveProjects(v)}catch(e){setStore('projects',v)}}
  function getDeals(){try{if(typeof getHotDeals==='function')return arr(getHotDeals())}catch(e){}return arr(getStore('hotDeals'))}
  function saveDeals(v){try{if(typeof saveHotDeals==='function'){saveHotDeals(v);return}}catch(e){}setStore('hotDeals',v)}
  function getArchives(){return arr(getStore('hotDealArchives'))}
  function saveArchives(v){setStore('hotDealArchives',v)}
  function getDeliveriesSafe(){try{if(typeof getDeliveries==='function')return arr(getDeliveries())}catch(e){}return arr(getStore('deliveries'))}
  function saveDeliveriesSafe(v){try{if(typeof saveDeliveries==='function'){saveDeliveries(v);return}}catch(e){}setStore('deliveries',v)}
  function getClientsSafe(){try{return DB.getClients()||[]}catch(e){return []}}
  function siteKey(c){try{if(typeof makeSiteKey==='function')return makeSiteKey(c)}catch(e){} return c.key || ((c.tva||'')+'|'+(c.siret||c.ville||c.nom||''));}
  function clientByTva(tva){return getClientsSafe().find(function(c){return c.tva===tva})||{};}
  function clientBySiteKey(sk){return getClientsSafe().find(function(c){return siteKey(c)===sk||c.key===sk||c.tva===sk})||{};}
  function planned(l){return parseInt(l.qty||l.quantity||l.plannedQty||1)||1}
  function won(l){return parseInt(l.wonQty||l.gagne||0)||0}
  function lost(l){return parseInt(l.lostQty||l.perdu||0)||0}
  function sum(d,fn){return arr(d.lines).reduce(function(a,l){return a+fn(l)},0)}
  function stLabel(s){var m={EN_COURS:'EN COURS',FUTUR:'FUTUR',GAGNE:'GAGNÉ',PERDU:'PERDU',REPORTE:'REPORTÉ',SANS_PROJET:'SANS PROJET',ABANDON:'ABANDON'};return m[s]||s||'EN COURS'}
  function stClass(s){s=String(s||'EN_COURS').toLowerCase().replace('_','-'); if(s==='abandon')return 's-perdu'; if(s==='en-cours')return 's-encours'; return 's-'+s;}
  function resultSummary(d){var w=sum(d,won), l=sum(d,lost); if(w||l){return (w?w+' gagné(s)':'')+(w&&l?' · ':'')+(l?l+' perdu(s)':'');} return stLabel(d.status||'EN_COURS');}
  function dealFromProject(pid){return getDeals().find(function(d){return d.projectId===pid})||null;}
  function projectById(pid){return getProjectsSafe().find(function(p){return p.id===pid})||null;}
  function syncProject(d){
    if(!d||!d.projectId)return;
    var ps=getProjectsSafe(), p=ps.find(function(x){return x.id===d.projectId}); if(!p)return;
    p.hotDealLinked=true; p.hotDealId=d.id;
    p.affaireStatus=d.status||p.status||'EN_COURS';
    p.resultatAffaire=resultSummary(d);
    p.gagnesAffaire=sum(d,won); p.perdusAffaire=sum(d,lost);
    var typ=Array.from(new Set(arr(d.lines).map(function(l){return l.type||''}).filter(Boolean))).join(' / ');
    if(typ)p.type=typ; p.camions=sum(d,planned)||p.camions||0; p.updated=new Date().toISOString();
    saveProjectsSafe(ps);
  }
  function ensureDeal(pid){
    var existing=dealFromProject(pid); if(existing)return existing;
    var p=projectById(pid); if(!p){safeToast('Projet introuvable');return null;}
    var c=clientByTva(p.tva)||{};
    var d={id:uid('deal'),projectId:pid,created:(p.created||p.date||today()).slice(0,10),siteKey:siteKey(c)||p.tva,tva:p.tva||c.tva||'',client:p.nom||c.nom||'',status:p.status||'EN_COURS',comment:p.commentaire||'',lines:[]};
    var n=parseInt(p.camions||p.nb||0)||0;
    if(n>0)d.lines.push({id:uid('line'),created:d.created,type:p.type||'Tracteur',model:'',qty:n,wonQty:0,lostQty:0,concurrent:'',lossComment:''});
    var ds=getDeals(); ds.push(d); saveDeals(ds); syncProject(d); return d;
  }
  function updateDeal(d){var ds=getDeals(); var i=ds.findIndex(function(x){return x.id===d.id}); if(i>=0)ds[i]=d; else ds.push(d); saveDeals(ds); syncProject(d);}
  function createDeliveriesForWon(d){
    var liv=getDeliveriesSafe(), created=0;
    arr(d.lines).forEach(function(l){for(var i=1;i<=won(l);i++){var sid=d.id+'|'+l.id+'|'+i;if(!liv.some(function(x){return x.sourceId===sid})){liv.push({id:uid('del'),sourceId:sid,dealId:d.id,projectId:d.projectId||'',siteKey:d.siteKey,tva:d.tva,client:d.client,type:l.type,model:l.model,orderDate:'',deliveryDate:'',productionNo:'',bodybuilder:'',vnvo:'VN',maintenance:'Non',paccar:'Non',lessor:'',prime:0});created++;}}});
    saveDeliveriesSafe(liv); return created;
  }
  function archiveDeal(dealId,forced){
    var ds=getDeals(), i=ds.findIndex(function(d){return d.id===dealId}); if(i<0)return;
    var d=ds[i]; if(forced)d.status=forced;
    var invalid=arr(d.lines).some(function(l){return lost(l)>0 && (!(l.concurrent||'').trim() || !(l.lossComment||l.comment||'').trim())});
    if(invalid){safeToast('Pour les véhicules perdus : concurrent + commentaire obligatoires');return;}
    if(sum(d,won)>0)createDeliveriesForWon(d);
    d.finalStatus=forced || (sum(d,won)>0?'GAGNE':(sum(d,lost)>0?'PERDU':(d.status||'EN_COURS')));
    d.archived=true; d.archivedDate=today(); d.resultatAffaire=resultSummary(d);
    var ar=getArchives(); ar.push(d); saveArchives(ar); ds.splice(i,1); saveDeals(ds); syncProject(d); safeToast('Affaire archivée'); renderAffaires();
  }
  function lineModal(dealId,idx){
    var ds=getDeals(), d=ds.find(function(x){return x.id===dealId}); if(!d)return;
    idx=parseInt(idx); var l=idx>=0?arr(d.lines)[idx]:{id:uid('line'),created:today(),type:'Tracteur',model:'',qty:1,wonQty:0,lostQty:0,concurrent:'',lossComment:''};
    var body='<div style="font-size:11px;color:var(--text3);margin-bottom:8px;">Le résultat se gère ici, dans AFFAIRES, pas dans la fiche client.</div>'+
    '<div class="form-group"><label class="form-label">Date création</label><input type="date" class="form-input" id="al-created" value="'+esc((l.created||today()).slice(0,10))+'"></div>'+
    '<div class="form-group"><label class="form-label">Nom client</label><input class="form-input" value="'+esc(d.client||'')+'" readonly></div>'+
    '<div class="form-group"><label class="form-label">Type véhicule</label><select class="form-input" id="al-type"><option '+(l.type==='Tracteur'?'selected':'')+'>Tracteur</option><option '+(l.type==='Porteur'?'selected':'')+'>Porteur</option></select></div>'+
    '<div class="form-group"><label class="form-label">Modèle</label><input class="form-input" id="al-model" value="'+esc(l.model||'')+'" placeholder="XF480, XB290 19t..."></div>'+
    '<div class="form-group"><label class="form-label">Quantité prévue</label><input type="number" min="0" class="form-input" id="al-qty" value="'+planned(l)+'"><div style="font-size:10px;color:var(--text3);margin-top:3px;">Le bouton Dupliquer crée une ligne identique ; la quantité reste utile pour synthèse et historique.</div></div>'+
    '<div class="form-group"><label class="form-label">Quantité gagnée DAF</label><input type="number" min="0" class="form-input" id="al-won" value="'+won(l)+'"></div>'+
    '<div class="form-group"><label class="form-label">Quantité perdue</label><input type="number" min="0" class="form-input" id="al-lost" value="'+lost(l)+'"></div>'+
    '<div class="form-group"><label class="form-label">Marque concurrente si perdu</label><input class="form-input" id="al-conc" value="'+esc(l.concurrent||'')+'"></div>'+
    '<div class="form-group"><label class="form-label">Commentaire perte / abandon si perdu</label><textarea class="form-input form-textarea" id="al-loss">'+esc(l.lossComment||l.comment||'')+'</textarea></div>';
    openModal(idx>=0?'Modifier véhicule':'Ajouter véhicule',body,[{label:'Annuler',cls:'btn-ghost'},{label:'Enregistrer',cls:'btn-primary',action:function(){var nl={id:l.id||uid('line'),created:(byId('al-created')||{}).value||today(),type:(byId('al-type')||{}).value||'Tracteur',model:(byId('al-model')||{}).value||'',qty:parseInt((byId('al-qty')||{}).value)||0,wonQty:parseInt((byId('al-won')||{}).value)||0,lostQty:parseInt((byId('al-lost')||{}).value)||0,concurrent:(byId('al-conc')||{}).value||'',lossComment:(byId('al-loss')||{}).value||''}; if(nl.lostQty<=0){nl.concurrent='';nl.lossComment='';} if(!d.lines)d.lines=[]; if(idx>=0)d.lines[idx]=nl; else d.lines.push(nl); updateDeal(d); renderAffaires();}}]);
  }
  function renderDealCard(d){
    var st=d.status||'EN_COURS'; var html='<div class="card hotdeal-card"><div style="display:flex;justify-content:space-between;gap:8px;align-items:flex-start;"><div><span class="proj-status '+stClass(st)+'">'+stLabel(st)+'</span><div style="font-size:14px;font-weight:800;margin-top:5px;">'+esc(d.client||'Client')+'</div><div style="font-size:10px;color:var(--text3);">Créée le '+fmt(d.created)+' · '+esc(resultSummary(d))+'</div></div><select class="form-input aff-status" data-id="'+esc(d.id)+'" style="width:126px;font-size:10px;padding:5px;"><option value="EN_COURS" '+(st==='EN_COURS'?'selected':'')+'>En cours</option><option value="FUTUR" '+(st==='FUTUR'?'selected':'')+'>Futur</option><option value="REPORTE" '+(st==='REPORTE'?'selected':'')+'>Reporté</option><option value="GAGNE" '+(st==='GAGNE'?'selected':'')+'>Gagné</option><option value="PERDU" '+(st==='PERDU'?'selected':'')+'>Perdu</option><option value="ABANDON" '+(st==='ABANDON'?'selected':'')+'>Abandon</option></select></div>';
    html+='<div style="overflow-x:auto;margin-top:8px;"><table style="width:100%;border-collapse:collapse;font-size:10px;"><tr style="color:var(--text3);text-align:left;"><th>Date</th><th>Type</th><th>Modèle</th><th>Qté</th><th>Gagné</th><th>Perdu</th><th>Concurrent</th><th></th></tr>';
    arr(d.lines).forEach(function(l,i){html+='<tr style="border-top:1px solid var(--border);"><td>'+fmt(l.created||d.created)+'</td><td>'+esc(l.type||'')+'</td><td>'+esc(l.model||'')+'</td><td>'+planned(l)+'</td><td style="color:var(--green);font-weight:800;">'+won(l)+'</td><td style="color:var(--red);font-weight:800;">'+lost(l)+'</td><td>'+esc(l.concurrent||'')+'</td><td><button class="btn btn-secondary btn-sm btn-aff-line" data-id="'+esc(d.id)+'" data-idx="'+i+'">Modifier</button></td></tr>';});
    html+='</table></div><div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;"><button class="btn btn-secondary btn-sm btn-add-line" data-id="'+esc(d.id)+'">+ Ajouter un véhicule</button><button class="btn btn-secondary btn-sm btn-dupe-line" data-id="'+esc(d.id)+'">× Dupliquer ce véhicule</button><button class="btn btn-green btn-sm btn-archive" data-id="'+esc(d.id)+'">Archiver / livraisons</button><button class="btn btn-red btn-sm btn-abandon" data-id="'+esc(d.id)+'">Abandon</button></div></div>';
    return html;
  }
  window.openDeal=function(dealId){var d=getDeals().find(function(x){return x.id===dealId})||getArchives().find(function(x){return x.id===dealId}); if(!d){safeToast('Affaire introuvable');return;} try{showScreen('affaires')}catch(e){} setTimeout(function(){var card=qsa('.hotdeal-card').find(function(c){return c.innerHTML.indexOf(dealId)>=0}); if(card)card.scrollIntoView({behavior:'smooth',block:'start'});},150)};
  window.renderAffaires=function(){
    var ds=getDeals(), ps=getProjectsSafe(); var q=(window.affairesSearch||'').toLowerCase(); var filt=ds.filter(function(d){return !q||(String(d.client||'')+' '+stLabel(d.status)+' '+(d.comment||'')).toLowerCase().indexOf(q)>=0});
    var html='<div class="kpi-grid" style="margin-top:4px;"><div class="kpi-card c-blue"><div class="kpi-val">'+filt.length+'</div><div class="kpi-lbl">Affaires</div></div><div class="kpi-card c-daf"><div class="kpi-val">'+filt.reduce(function(a,d){return a+sum(d,planned)},0)+'</div><div class="kpi-lbl">Prévu</div></div><div class="kpi-card c-green"><div class="kpi-val">'+filt.reduce(function(a,d){return a+sum(d,won)},0)+'</div><div class="kpi-lbl">Gagnés</div></div><div class="kpi-card c-red"><div class="kpi-val">'+filt.reduce(function(a,d){return a+sum(d,lost)},0)+'</div><div class="kpi-lbl">Perdus</div></div></div>';
    html+='<div class="search-bar"><span>🔍</span><input id="affaires-search" placeholder="Client, statut, commentaire…" value="'+esc(window.affairesSearch||'')+'"></div>';
    html+='<div class="card"><div class="card-title">Projets à ouvrir en affaire</div><div style="font-size:11px;color:var(--text2);line-height:1.4;margin-bottom:8px;">Le projet reste une lecture simple dans la fiche client. Clique ici pour créer ou ouvrir l’affaire complète.</div>';
    var active=ps.filter(function(p){return ['EN_COURS','FUTUR','REPORTE'].indexOf(p.status)>=0 || p.hotDealLinked});
    if(active.length){html+='<div style="display:flex;flex-direction:column;gap:6px;">'; active.slice(0,40).forEach(function(p){var d=dealFromProject(p.id); html+='<button class="btn btn-secondary btn-sm btn-open-proj-aff" data-pid="'+esc(p.id)+'" style="justify-content:space-between;"><span>'+esc(p.nom||p.tva||'Projet')+' · '+stLabel((d&&d.status)||p.status)+'</span><span>'+ (d?'Ouvrir':'Créer') +'</span></button>';}); html+='</div>';} else html+='<div style="font-size:11px;color:var(--text3);">Aucun projet actif.</div>'; html+='</div>';
    filt.forEach(function(d){html+=renderDealCard(d)});
    var ar=getArchives(); html+='<div class="card"><div class="card-title">Archives Affaires</div>'+(ar.length?ar.slice().reverse().map(function(d){return '<div class="diag-row"><div><strong>'+esc(d.client||'')+'</strong><br><span style="font-size:10px;color:var(--text3);">'+fmt(d.archivedDate)+' · '+stLabel(d.finalStatus)+' · '+esc(resultSummary(d))+'</span></div><button class="btn btn-secondary btn-sm" onclick="openDeal(\''+esc(d.id)+'\')">Voir</button></div>';}).join(''):'<div style="font-size:11px;color:var(--text3);">Aucune archive.</div>')+'</div>';
    var cont=byId('affaires-content'); if(cont)cont.innerHTML=html;
    var search=byId('affaires-search'); if(search)search.oninput=function(){window.affairesSearch=this.value;renderAffaires()};
    qsa('.btn-open-proj-aff').forEach(function(b){b.onclick=function(){var d=ensureDeal(b.dataset.pid); if(d)renderAffaires()}});
    qsa('.aff-status').forEach(function(s){s.onchange=function(){var d=getDeals().find(function(x){return x.id===s.dataset.id}); if(d){d.status=s.value;updateDeal(d);renderAffaires();}}});
    qsa('.btn-aff-line').forEach(function(b){b.onclick=function(){lineModal(b.dataset.id,b.dataset.idx)}});
    qsa('.btn-add-line').forEach(function(b){b.onclick=function(){lineModal(b.dataset.id,-1)}});
    qsa('.btn-dupe-line').forEach(function(b){b.onclick=function(){var ds=getDeals(), d=ds.find(function(x){return x.id===b.dataset.id}); if(!d)return; var last=arr(d.lines)[arr(d.lines).length-1]; if(!last){lineModal(d.id,-1);return;} var cp=JSON.parse(JSON.stringify(last)); cp.id=uid('line'); cp.created=today(); d.lines.push(cp); updateDeal(d); renderAffaires();}});
    qsa('.btn-archive').forEach(function(b){b.onclick=function(){archiveDeal(b.dataset.id)}});
    qsa('.btn-abandon').forEach(function(b){b.onclick=function(){archiveDeal(b.dataset.id,'ABANDON')}});
  };
  window.renderProjets=function(){renderAffaires();};
  function tuneNav(){
    qsa('.nav-item[data-screen="projets"]').forEach(function(n){n.remove();});
    qsa('.nav-item[data-screen="affaires"] .nav-label').forEach(function(l){l.textContent='Affaires';});
    qsa('#screen-affaires .screen-title').forEach(function(t){t.textContent='💼 Affaires';});
  }
  var oldShow=window.showScreen;
  window.showScreen=function(name){tuneNav(); if(name==='projets')name='affaires'; if(typeof oldShow==='function')return oldShow(name);};
  var oldRender=window.renderScreen;
  window.renderScreen=function(name){if(name==='projets'||name==='affaires'){renderAffaires();return;} if(typeof oldRender==='function')return oldRender(name);};
  function enhanceProjectCards(){
    qsa('#sheet-body .proj-card, #projets-content .proj-card').forEach(function(card){
      var pid=card.getAttribute('data-pid')||(card.dataset&&card.dataset.pid); if(!pid)return;
      card.onclick=function(e){e.preventDefault();e.stopPropagation();var d=ensureDeal(pid); if(d){try{showScreen('affaires')}catch(_){ } setTimeout(renderAffaires,50)}};
      qsa('button',card).forEach(function(b){var txt=(b.textContent||'').toLowerCase(); if(txt.indexOf('résultat')>=0||txt.indexOf('resultat')>=0)b.style.display='none';});
      if(card.innerHTML.indexOf('Ouvrir affaire')<0)card.insertAdjacentHTML('beforeend','<div style="font-size:10px;color:var(--daf);margin-top:5px;font-weight:800;">Cliquer pour ouvrir affaire</div>');
    });
  }
  // nettoyage doublon import immatriculations
  function cleanImportButtons(){
    qsa('button').forEach(function(b){var t=(b.textContent||'').trim(); if(t==='Importer selon années/critères')b.style.display='none'; if(t==='Importer avec ces critères')b.textContent='Importer';});
  }
  document.addEventListener('click',function(){setTimeout(function(){tuneNav();enhanceProjectCards();cleanImportButtons();},100)},true);
  setTimeout(function(){tuneNav();enhanceProjectCards();cleanImportButtons();},800);
})();
</script>



<script>
// ===== PATCH V24 — PROTOCOLE + AFFAIRES AUTO-ARCHIVE + TRI =====
(function(){
  function byId(id){return document.getElementById(id)}
  function qsa(s,r){return Array.prototype.slice.call((r||document).querySelectorAll(s));}
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function safeToast(m){try{toast(m)}catch(e){console.log(m)}}
  function arr(v){return Array.isArray(v)?v:[];}
  function uid(p){return (p||'id')+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,8)}
  function today(){return new Date().toISOString().slice(0,10)}
  function fmt(d){if(!d)return '—';try{return new Date(d).toLocaleDateString('fr-FR')}catch(e){return d}}
  function getStore(k){try{return DB.get(k)||[]}catch(e){try{return JSON.parse(localStorage.getItem(k)||'[]')}catch(_){return []}}}
  function setStore(k,v){try{DB.set(k,v)}catch(e){localStorage.setItem(k,JSON.stringify(v))}try{autoSave()}catch(e){}}
  function getProjectsSafe(){try{return DB.getProjects()||[]}catch(e){return getStore('projects')}}
  function saveProjectsSafe(v){try{DB.saveProjects(v)}catch(e){setStore('projects',v)}}
  function getDeals(){try{if(typeof getHotDeals==='function')return arr(getHotDeals())}catch(e){}return arr(getStore('hotDeals'))}
  function saveDeals(v){try{if(typeof saveHotDeals==='function'){saveHotDeals(v);return}}catch(e){}setStore('hotDeals',v)}
  function getArchives(){return arr(getStore('hotDealArchives'))}
  function saveArchives(v){setStore('hotDealArchives',v)}
  function getDeliveriesSafe(){try{if(typeof getDeliveries==='function')return arr(getDeliveries())}catch(e){}return arr(getStore('deliveries'))}
  function saveDeliveriesSafe(v){try{if(typeof saveDeliveries==='function'){saveDeliveries(v);return}}catch(e){}setStore('deliveries',v)}
  function getClientsSafe(){try{return DB.getClients()||[]}catch(e){return []}}
  function siteKey(c){try{if(typeof makeSiteKey==='function')return makeSiteKey(c)}catch(e){} return c.key || ((c.tva||'')+'|'+(c.siret||c.ville||c.nom||''));}
  function clientByTva(tva){return getClientsSafe().find(function(c){return c.tva===tva})||{};}
  function planned(l){return parseInt(l.qty||l.quantity||l.plannedQty||1)||1}
  function won(l){return parseInt(l.wonQty||l.gagne||0)||0}
  function lost(l){return parseInt(l.lostQty||l.perdu||0)||0}
  function sum(d,fn){return arr(d.lines).reduce(function(a,l){return a+fn(l)},0)}
  function statusLabel(s){var m={EN_COURS:'EN COURS',FUTUR:'FUTUR',GAGNE:'GAGNÉ',PERDU:'PERDU',REPORTE:'REPORTÉ',SANS_PROJET:'SANS PROJET',ABANDON:'ABANDON'};return m[s]||s||'EN COURS'}
  function stClass(s){s=String(s||'EN_COURS').toLowerCase().replace('_','-'); if(s==='abandon')return 's-perdu'; if(s==='en-cours')return 's-encours'; return 's-'+s;}
  function resultSummary(d){var w=sum(d,won), l=sum(d,lost); if(w||l){return (w?w+' gagné(s)':'')+(w&&l?' · ':'')+(l?l+' perdu(s)':'');} return d.reported?'REPORTÉ — EN COURS':statusLabel(d.status||'EN_COURS');}
  function dealFromProject(pid){return getDeals().find(function(d){return d.projectId===pid})||getArchives().find(function(d){return d.projectId===pid})||null;}
  function projectById(pid){return getProjectsSafe().find(function(p){return p.id===pid})||null;}
  function isProtocole(c){return !!String((c&&c.groupement)||'').trim();}

  try{var css=document.createElement('style');css.textContent='.badge.b-protocole{background:rgba(160,120,255,.16);color:#b99cff;border:1px solid rgba(185,156,255,.45)} .hotdeal-card{scroll-margin-top:70px}';document.head.appendChild(css);}catch(e){}

  function injectProtocoleButton(){
    var row=byId('tours-fpills'); if(!row || row.querySelector('[data-f="protocole"]'))return;
    var b=document.createElement('div'); b.className='fpill'; b.dataset.f='protocole'; b.textContent='Protocole';
    var flotte=row.querySelector('[data-f="flotte"]'); if(flotte&&flotte.nextSibling)row.insertBefore(b,flotte.nextSibling); else row.appendChild(b);
    b.onclick=function(){try{toursF='protocole'; qsa('#tours-fpills .fpill').forEach(function(x){x.classList.toggle('active',x===b)}); renderTours();}catch(e){console.error(e)}};
  }

  // Ajout PROTOCOLE dans les données et le filtre TOURNÉES
  var baseBuildToursData=window.buildToursData;
  window.buildToursData=function(){
    var rows=baseBuildToursData?baseBuildToursData():[];
    rows.forEach(function(r){
      var sites=[];
      try{ if(r.groupInfo&&r.groupInfo.hasGroup&&r.groupInfo.principal&&typeof _groupSites==='function')sites=_groupSites(r.groupInfo.group); }catch(e){}
      if(!sites.length)sites=[r];
      r.isProtocole=sites.some(isProtocole);
    });
    return rows;
  };

  window.renderClientRow=function(c){
    const badges=[];
    const isSecondary=!!(c.groupInfo&&c.groupInfo.hasGroup&&!c.groupInfo.principal);
    if(c.groupInfo&&c.groupInfo.hasGroup){
      badges.push('<span class="badge b-groupe">GROUPE</span>');
      badges.push('<span class="badge '+(c.groupInfo.principal?'b-projet':'')+'" style="'+(c.groupInfo.principal?'':'background:var(--bg3);color:var(--text3);border:1px solid var(--border);')+'">'+(c.groupInfo.principal?'SITE PRINCIPAL':'SITE SECONDAIRE')+'</span>');
      if(isSecondary)badges.push('<span class="badge" style="background:var(--bg3);color:var(--text2);border:1px solid var(--border);">INFO LOCALE</span>');
    }
    if(!isSecondary){
      if(c.isProtocole)badges.push('<span class="badge b-protocole">PROTOCOLE</span>');
      if(c.dafCount>0)badges.push('<span class="badge b-daf">DAF</span>');
      if(c.dafRenew>0)badges.push('<span class="badge b-daf">DAF RENOUV.</span>');
      if(c.horsRenew>0)badges.push('<span class="badge b-conc">CONC. RENOUV.</span>');
      if(c.isUrgent)badges.push('<span class="badge b-urgent">URGENT</span>');
      if(c.hasProjet)badges.push('<span class="badge b-projet">PROJET</span>');
      if(c.pasProjet)badges.push('<span class="badge" style="background:var(--bg3);color:var(--text3);border:1px solid var(--border);">SANS PROJET</span>');
      if(c.isFlotteRegionale)badges.push('<span class="badge b-flotte">FLOTTE RÉGIO.</span>');
      if(c.isFlotteCoordonnee)badges.push('<span class="badge b-flotte">FLOTTE COORD.</span>');
      if(c.isFlotteNationale)badges.push('<span class="badge b-flotte">FLOTTE NAT.</span>');
      if(c.isExclu)badges.push('<span class="badge" style="background:var(--bg3);color:var(--text3);border:1px solid var(--border);">EXCLU</span>');
      if(c.isInactif)badges.push('<span class="badge" style="background:var(--bg3);color:var(--text3);border:1px solid var(--border);">INACTIF</span>');
    }
    const sub=isSecondary?`Site secondaire · infos locales · Parc local:${c.parc} · DAF:${c.dafCount}`:`Parc:${c.parc} · DAF:${c.dafCount} · Renouv.:${c.dafRenew+c.horsRenew}${c._isGroupPrincipal?' · consolidé groupe':''}`;
    return`<div class="client-row" data-sk="${esc(c._siteKey)}"><div class="c-info"><div class="c-name">${esc(c.nom)}</div><div class="c-badges">${badges.join('')}</div><div class="c-sub">${sub}</div></div><div class="c-score"><div class="score-val">${isSecondary?'—':c.score}</div><div class="score-lbl">${isSecondary?'info':'pts'}</div></div></div>`;
  };

  window.renderTours=function(){
    injectProtocoleButton();
    const data=buildToursData();
    const search=(window.toursSearch||'').toLowerCase().trim();
    let shown=data.filter(function(c){
      if(typeof passesToursExclusions==='function'&&!passesToursExclusions(c))return false;
      if(search){const q=search;if(![c.nom,c.ville,c.canton,c.vendeur,c.profil,c.tva,c.siret,c.groupement].join(' ').toLowerCase().includes(q))return false;}
      switch(window.toursF||toursF){
        case 'daf_with':return c.dafCount>0;
        case 'no_daf':return c.dafCount===0;
        case 'urgent':return c.isUrgent;
        case 'flotte':return c.isFlotte;
        case 'protocole':return c.isProtocole;
        default:return true;
      }
    });

  function projectStatusForDeal(d,finalStatus){

      ['Affaire','Une affaire est le suivi détaillé d’un projet commercial. Elle est créée depuis la fiche client/projet.','Alimente historique projet, livraisons, commissions et KPI affaires.','Créer projet en fiche site puis ouvrir AFFAIRES.'],

      ['Reporté','Devient projet futur, reste actif.','Compté en Futur/reporté, pas archivé.','KPI Futur/reporté.'],
      ['Gagné','Crée lignes dans Suivi Livraisons et commissions.','Alimente KPI gagnés, livraisons, commissions.','Vérifier Suivi Livraisons.']
    ]));

      ['Commission prise ordre','Tracteur VN 400€, Porteur VN 550€, VO 400€.','Calcul commission au mois de prise d’ordre.','Vérifier Type + VN/VO + Qté.'],
      ['Contrat entretien','Care+ 100€, Xtra Care 200€, FlexCare/FullCare 300€.','Commission livraison.','Vérifier type de contrat.'],
      ['PACCAR Financial','300€ par véhicule concerné.','Commission livraison.','Case PACCAR = OUI.'],
      ['Prime marge restante','Montant manuel. % marge restante sert à la performance.','Ajout au total commission.','Vérifier champ prime et marge %.'],
      ['Cases reçues ✅','Chaque commission peut être cochée reçue/non reçue.','Calcule touchées et restant à percevoir.','Comparer total théorique, touché, reste.']
    ]));
    html+=sec('8. QUALITÉ',table([
      ['Sans vendeur/pays/département','Liste les sites dont une donnée commerciale manque.','N’influence pas directement les KPI, mais signale un problème d’import.','Comparer colonne CRM.'],

  };

<script>
// ===== PATCH V28 — AFFAIRES ROBUSTE : corrige écran noir + projets visibles =====
(function(){
  function byId(id){return document.getElementById(id);}
  function qsa(sel,root){return Array.prototype.slice.call((root||document).querySelectorAll(sel));}
  function esc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function arr(v){return Array.isArray(v)?v:[];}
  function uid(p){return (p||'id')+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);}
  function today(){return new Date().toISOString().slice(0,10);}
  function fmt(d){if(!d)return '—'; try{return new Date(d).toLocaleDateString('fr-FR');}catch(e){return String(d);}}
  function toastOk(m){try{toast(m);}catch(e){console.log(m);}}
  function getProjectsSafe(){try{return arr(DB.getProjects());}catch(e){try{return arr(DB.get('projects'));}catch(_){return [];}}}
  function saveProjectsSafe(v){try{DB.saveProjects(v);}catch(e){try{DB.set('projects',v);}catch(_){}} try{autoSave();}catch(e){}}
  function getDealsSafe(){try{if(typeof getHotDeals==='function')return arr(getHotDeals());}catch(e){} try{return arr(DB.get('hotDeals'));}catch(e){try{return arr(JSON.parse(localStorage.getItem('hotDeals')||'[]'));}catch(_){return [];}}}
  function saveDealsSafe(v){try{if(typeof saveHotDeals==='function'){saveHotDeals(v);return;}}catch(e){} try{DB.set('hotDeals',v);}catch(e){localStorage.setItem('hotDeals',JSON.stringify(v));} try{autoSave();}catch(e){}}
  function getArchivesSafe(){try{return arr(DB.get('hotDealArchives'));}catch(e){try{return arr(JSON.parse(localStorage.getItem('hotDealArchives')||'[]'));}catch(_){return [];}}}
  function saveArchivesSafe(v){try{DB.set('hotDealArchives',v);}catch(e){localStorage.setItem('hotDealArchives',JSON.stringify(v));} try{autoSave();}catch(e){}}
  function getDeliveriesSafe(){try{if(typeof getDeliveries==='function')return arr(getDeliveries());}catch(e){} try{return arr(DB.get('deliveries'));}catch(e){return [];}}
  function saveDeliveriesSafe(v){try{if(typeof saveDeliveries==='function'){saveDeliveries(v);return;}}catch(e){} try{DB.set('deliveries',v);}catch(e){} try{autoSave();}catch(e){}}
  function clientByTva(tva){try{return (DB.getClients()||[]).find(function(c){return c.tva===tva;})||{};}catch(e){return {};}}
  function projectLabel(p){var c=clientByTva(p.tva||'');return p.nom||p.client||c.nom||p.tva||'Client';}
  function statusText(s){return ({EN_COURS:'EN COURS',PROJET:'EN COURS',FUTUR:'FUTUR',GAGNE:'GAGNÉ',PERDU:'PERDU',ABANDON:'ABANDON',REPORTE:'REPORTÉ',SANS_PROJET:'SANS PROJET'}[s]||s||'EN COURS');}
  function statusClass(s){s=String(s||'EN_COURS'); if(s==='GAGNE')return 's-gagne'; if(s==='PERDU'||s==='ABANDON')return 's-perdu'; if(s==='FUTUR'||s==='REPORTE')return 's-futur'; return 's-encours';}
  function lineQty(l){return parseInt(l.qty||l.quantity||l.plannedQty||0,10)||0;}
  function lineWon(l){return parseInt(l.wonQty||0,10)||0;}
  function lineLost(l){return parseInt(l.lostQty||0,10)||0;}
  function sumLines(d,fn){return arr(d.lines).reduce(function(a,l){return a+fn(l);},0);}
  function resultText(d){var w=sumLines(d,lineWon), l=sumLines(d,lineLost); if(w||l)return (w?w+' gagné(s)':'')+(w&&l?' / ':'')+(l?l+' perdu(s)':''); return statusText(d.status||'EN_COURS');}
  function activeStatus(s){return ['EN_COURS','PROJET','FUTUR','REPORTE'].indexOf(s||'EN_COURS')>=0;}
  function dealFromProject(pid){return getDealsSafe().find(function(d){return d.projectId===pid;})||getArchivesSafe().find(function(d){return d.projectId===pid;})||null;}
  function normalizeProjectToDeal(p){
    var q=parseInt(p.camions||p.qty||p.quantity||p.nbVehicules||p.nb||0,10)||0;
    return {
      id:uid('deal'), projectId:p.id||uid('proj'), tva:p.tva||'', siteKey:p.siteKey||p.key||'', client:projectLabel(p), created:p.created||p.date||today(), status:(p.status==='PROJET'?'EN_COURS':(p.status||'EN_COURS')), comment:p.comment||p.commentaire||'', lines:[{id:uid('line'),created:p.created||today(),type:p.type||p.typeVehicule||'Tracteur',model:p.modele||p.model||'',qty:q||1,wonQty:0,lostQty:0,concurrent:'',lossComment:''}]
    };
  }
  function ensureDealFromProject(pid){
    var deals=getDealsSafe(); var d=deals.find(function(x){return x.projectId===pid;}); if(d)return d;
    var p=getProjectsSafe().find(function(x){return x.id===pid;}); if(!p)return null;
    d=normalizeProjectToDeal(p); deals.push(d); saveDealsSafe(deals); return d;
  }
  function ensureAllProjectDeals(){
    var projects=getProjectsSafe().filter(function(p){return activeStatus(p.status||'EN_COURS') && p.status!=='SANS_PROJET';});
    var deals=getDealsSafe(); var changed=false;
    projects.forEach(function(p){if(!p.id)p.id=uid('proj'); if(!deals.some(function(d){return d.projectId===p.id;})) { deals.push(normalizeProjectToDeal(p)); changed=true; }});
    if(changed){saveDealsSafe(deals); saveProjectsSafe(projects.concat(getProjectsSafe().filter(function(p){return !projects.includes(p);})));}
    return deals;
  }
  function syncProjectFromDeal(d, finalStatus){
    var ps=getProjectsSafe(); var p=ps.find(function(x){return x.id===d.projectId;}); if(!p)return;
    p.status=finalStatus || d.status || 'EN_COURS';
    p.resultat=resultText(d); p.dateResultat=finalStatus?today():''; p.updated=today();
    saveProjectsSafe(ps);
  }
  function createDeliveriesFromDeal(d){
    var deliveries=getDeliveriesSafe();

<script>

  function toastMsg(m){try{toast(m)}catch(e){console.log(m)}}
  function planned(l){return int(l.qty||l.plannedQty||l.quantity||1)}
  function won(l){return int(l.wonQty||0)}
  function lost(l){return int(l.lostQty||0)}
  function reported(l){return int(l.reportQty||0)}
  function abandoned(l){return int(l.abandonQty||0)}
  function remaining(l){return Math.max(0, planned(l)-won(l)-lost(l)-reported(l)-abandoned(l))}
  function sum(d,fn){return arr(d.lines).reduce(function(a,l){return a+fn(l)},0)}
  function labelStatus(st){st=String(st||'EN_COURS').toUpperCase();return st==='GAGNE'?'GAGNÉ':st==='PERDU'?'PERDU':st==='ABANDON'?'ABANDON':(st==='FUTUR'||st==='REPORTE')?'FUTUR / REPORTÉ':'EN COURS'}
  function lineStatus(l){if(remaining(l)>0)return 'EN COURS'; if(won(l)>0 && lost(l)+abandoned(l)+reported(l)===0)return 'GAGNÉ'; if(lost(l)>0 && won(l)===0)return 'PERDU'; if(reported(l)>0 && won(l)+lost(l)+abandoned(l)===0)return 'REPORTÉ'; if(abandoned(l)>0 && won(l)+lost(l)+reported(l)===0)return 'ABANDON'; return 'MIXTE'}
  function dealSummary(d){var parts=[]; var w=sum(d,won), l=sum(d,lost), r=sum(d,reported), a=sum(d,abandoned), rem=sum(d,remaining); if(w)parts.push(w+' gagné(s)'); if(l)parts.push(l+' perdu(s)'); if(r)parts.push(r+' reporté(s)'); if(a)parts.push(a+' abandon'); if(rem)parts.push(rem+' en cours'); return parts.join(' · ')||'En cours'}
  function dealCurrentStatus(d){var rem=sum(d,remaining), w=sum(d,won), l=sum(d,lost), r=sum(d,reported), a=sum(d,abandoned); if(r>0 && rem+r>=sum(d,planned))return 'FUTUR'; if(rem>0)return 'EN_COURS'; if(w>0)return 'GAGNE'; if(l>0)return 'PERDU'; if(a>0)return 'ABANDON'; return d.status||'EN_COURS'}
  function orderComm(d){var q=int(d.qty||1); if(String(d.vnvo||'VN').toUpperCase()==='VO')return 400*q; return (String(d.type||'').toLowerCase().indexOf('porteur')>=0?550:400)*q}
  function maintComm(m,q){m=String(m||'Non').toUpperCase();q=int(q||1); if(m==='CARE+')return 100*q; if(m==='XTRA CARE')return 200*q; if(m==='FLEXCARE'||m==='FULLCARE')return 300*q; return 0}

<script>

(function(){
  function $(id){return document.getElementById(id)}
  function qsa(sel,root){return Array.prototype.slice.call((root||document).querySelectorAll(sel))}
  function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
  function arr(v){return Array.isArray(v)?v:[]}
  function num(v){var x=parseFloat(String(v||0).replace(',','.'));return isNaN(x)?0:x}
  function int(v){var x=parseInt(v,10);return isNaN(x)?0:x}
  function fmt(d){if(!d)return '—';var x=new Date(d);return isNaN(x)?String(d):x.toLocaleDateString('fr-FR')}
  function ym(d){if(!d)return '';var s=String(d).slice(0,7);return /^\d{4}-\d{2}$/.test(s)?s:''}
  function ymLabel(k){if(!k)return 'Sans date';var a=String(k).split('-');var m=['','Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];return (m[parseInt(a[1],10)]||a[1])+' '+a[0]}
  function get(k){try{return DB.get(k)||[]}catch(e){try{return JSON.parse(localStorage.getItem(k)||'[]')}catch(_){return []}}}
  function set(k,v){try{DB.set(k,v);try{autoSave()}catch(_){}}catch(e){localStorage.setItem(k,JSON.stringify(v))}}
  function deliveries(){return arr(get('deliveries'))}
  function saveDeliveries(v){set('deliveries',arr(v))}
  function lineQty(d){return Math.max(1,int(d.qty||d.quantity||1))}
  function orderComm(d){var q=lineQty(d);if(String(d.vnvo||'VN').toUpperCase()==='VO')return 400*q;return (String(d.type||'').toLowerCase().indexOf('port')>=0?550:400)*q}
  function maintComm(type,qty){var q=Math.max(1,int(qty||1));var t=String(type||'Non').toLowerCase();if(t.indexOf('xtra')>=0)return 200*q;if(t.indexOf('flex')>=0||t.indexOf('full')>=0)return 300*q;if(t.indexOf('care+')>=0)return 100*q;return 0}
  function paccarComm(d){return String(d.paccar||'Non').toLowerCase()==='oui'?300*lineQty(d):0}
  function primeComm(d){return num(d.prime)}

  function receivedComm(d){return (d.rcvOrder?orderComm(d):0)+(d.rcvMaint?maintComm(d.maintenance,d.qty):0)+(d.rcvPaccar?paccarComm(d):0)+(d.rcvPrime?primeComm(d):0)}

  function syncAllDeliveriesSafe(){try{if(typeof syncAllDeliveries==='function')syncAllDeliveries()}catch(e){}}
