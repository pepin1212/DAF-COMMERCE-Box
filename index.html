  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
  function num(v){var n=parseFloat(String(v==null?'':v).replace(',','.'));return isNaN(n)?0:n}
  function qty(d){var n=parseInt((d&&d.qty)||1,10);return isNaN(n)||n<1?1:n}
  function uid(p){return (p||'id')+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8)}
  function getStore(k){try{return arr(DB.get(k))}catch(e){try{return arr(JSON.parse(localStorage.getItem(k)||'[]'))}catch(_){return []}}}
  function setStore(k,v){try{DB.set(k,arr(v));try{autoSave()}catch(_){}}catch(e){try{localStorage.setItem(k,JSON.stringify(arr(v)))}catch(_){}}}
  function getDeals(){return getStore('hotDeals')}
  function getDeliveries(){var d=getStore('deliveries');if(!d.length){var l=getStore('livraisons');if(l.length)d=l}return d}
  function saveDeliveries(v){setStore('deliveries',v)}
  function normalizeDate(v){if(!v)return '';var s=String(v).trim();if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);var m=s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})/);if(m){var y=m[3].length===2?'20'+m[3]:m[3];return y+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[1]).padStart(2,'0')}return s.slice(0,10)}
  function ym(v){var d=normalizeDate(v);var m=d.match(/^(\d{4})-(\d{2})/);return m?m[1]+'-'+m[2]:''}
  function curYm(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
  function curYear(){return String(new Date().getFullYear())}
  function fmt(v){var d=normalizeDate(v);var m=d.match(/^(\d{4})-(\d{2})-(\d{2})/);return m?m[3]+'/'+m[2]+'/'+String(m[1]).slice(2):'—'}
  function labelMonth(k){var p=String(k||'').split('-');var names=['','Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];return (names[parseInt(p[1],10)]||p[1]||'Sans mois')+' '+(p[0]||'')}
  function euro(v){return Math.round(num(v)).toLocaleString('fr-FR')+'€'}
  function orderCommission(d){var q=qty(d);if(String((d&&d.vnvo)||'VN').toUpperCase()==='VO')return 400*q;return (String((d&&d.type)||'').toLowerCase().indexOf('porteur')>=0?550:400)*q}
  function maintenanceCommission(d){var m=String((d&&d.maintenance)||'Non').toUpperCase();var v=0;if(m==='CARE+')v=100;else if(m==='XTRA CARE')v=200;else if(m==='FLEXCARE'||m==='FULLCARE')v=300;return v*qty(d)}
  function paccarCommission(d){return String((d&&d.paccar)||'Non').toLowerCase()==='oui'?300*qty(d):0}
  function primeCommission(d){return num(d&&d.prime)}
  function deliveryCommission(d){return ym(d&&d.deliveryDate)?maintenanceCommission(d)+paccarCommission(d)+primeCommission(d):0}
  function orderReceived(d){return d&&d.rcvOrder?orderCommission(d):0}
  function deliveryReceived(d){return (d&&d.rcvMaint?maintenanceCommission(d):0)+(d&&d.rcvPaccar?paccarCommission(d):0)+(d&&d.rcvPrime?primeCommission(d):0)}
  function deliveryRest(d){return deliveryCommission(d)-deliveryReceived(d)}
  function syncDeliveries(){
    var list=getDeliveries();var bySrc={};list.forEach(function(d){if(d.sourceId)bySrc[d.sourceId]=d});var changed=false;
    getDeals().forEach(function(deal){arr(deal.lines).forEach(function(l){
      if(String((l&&l.result)||'EN_COURS').toUpperCase().replace('É','E')!=='GAGNE')return;
      if(!l.id)l.id=uid('line');
      var src=deal.id+'|'+l.id;var old=bySrc[src]||{};
      var row=Object.assign({},old,{id:old.id||uid('liv'),sourceId:src,dealId:deal.id,client:deal.client||old.client||'',qty:qty(l),type:l.type||old.type||'',model:l.model||old.model||'',carrosserie:l.carrosserie||old.carrosserie||'',orderDate:l.orderDate||old.orderDate||'',deliveryDate:l.deliveryDate||old.deliveryDate||'',productionNo:l.productionNo||old.productionNo||'',bodybuilder:l.bodybuilder||l.carrossier||old.bodybuilder||'',vnvo:l.vnvo||old.vnvo||'VN',maintenance:l.maintenance||old.maintenance||'Non',lessor:l.lessor||old.lessor||'',paccar:l.paccar||old.paccar||'Non',marginPct:l.marginPct||old.marginPct||'',prime:(l.prime!=null?num(l.prime):num(old.prime))});
      if(!bySrc[src]){list.push(row);changed=true}else{var idx=list.findIndex(function(x){return x.sourceId===src});if(idx>=0){list[idx]=row;changed=true}}
    })});
    if(changed)saveDeliveries(list);return list;
  }
  function searchable(d){return [d.client,d.model,d.type,d.bodybuilder,d.productionNo,d.maintenance,d.paccar,d.carrosserie].join(' ').toLowerCase()}
  function buildEntries(rows){var out=[];rows.forEach(function(d){if(ym(d.orderDate))out.push({kind:'order',month:ym(d.orderDate),date:normalizeDate(d.orderDate),amount:orderCommission(d),d:d});if(ym(d.deliveryDate)&&deliveryCommission(d)>0)out.push({kind:'delivery',month:ym(d.deliveryDate),date:normalizeDate(d.deliveryDate),amount:deliveryCommission(d),d:d})});return out}
  function matchesFilter(e,f){var cy=curYear(),cm=curYm();if(!f||f==='all')return true;if(f==='yearTotal')return e.month.slice(0,4)===cy;if(f==='deliveredUnpaid')return e.kind==='delivery'&&e.month<cm&&deliveryRest(e.d)>0;if(f==='monthTotal')return e.month===cm;return true}

  // ── rowHtml ──────────────────────────────────────────────────────
  function rowHtml(e){
    var d=e.d;
    var date=e.kind==='order'?d.orderDate:d.deliveryDate;
    var isOrder=e.kind==='order';
    var amtColor=isOrder?'var(--daf)':'var(--green,#3ab87a)';
    var prodBadge=d.productionNo
      ?'<span style="background:var(--bg4,#e8eaed);color:var(--text);font-weight:800;padding:2px 7px;border-radius:5px;font-size:11px;letter-spacing:.3px;">N° '+esc(d.productionNo)+'</span>'
      :'';

    var html='<div class="comm-v213-line" data-deal="'+esc(d.dealId||'')+'" style="border-top:1px solid var(--border);padding:10px 0;cursor:pointer;">'
      +'<div style="display:flex;gap:10px;align-items:flex-start;">'
      +'<div style="flex:1;min-width:0;">'
      // Amount + link
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">'
      +'<div style="font-size:20px;font-weight:900;color:'+amtColor+';letter-spacing:-.5px;line-height:1;">'+euro(e.amount)+'</div>'
      +'<button class="comm-v213-open btn btn-ghost btn-sm" data-id="'+esc(d.dealId||'')+'" onclick="event.stopPropagation()" style="font-size:10px;color:var(--daf);font-weight:700;padding:3px 8px;border:1px solid var(--daf);border-radius:20px;">\u2192 Voir l&#39;affaire</button>'
      +'</div>'
      // Date + client + prod badge
      +'<div style="font-size:12px;color:var(--text);margin-bottom:4px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;">'
      +'<span><strong style="color:var(--text2);">'+fmt(date)+'</strong> \u2014 '+esc(d.client||'Client')+'</span>'
      +prodBadge
      +'</div>'
      // Qty + type
      +'<div style="font-size:10px;color:var(--text3);margin-bottom:6px;">x'+qty(d)+' <strong style="color:var(--text2);">'+esc(d.type||'')+'</strong>'+(d.model?' '+esc(d.model):'')+'</div>';

    if(isOrder){
      // Single order checkbox
      var checked=!!d.rcvOrder;
      html+='<div style="display:flex;align-items:center;gap:8px;padding:4px 0;">'
        +'<input type="checkbox" class="comm-v213-check" data-id="'+esc(d.id)+'" data-k="rcvOrder" '+(checked?'checked':'')+' onclick="event.stopPropagation()" style="width:15px;height:15px;accent-color:var(--daf);cursor:pointer;">'
        +'<span style="font-size:11px;color:'+(checked?'var(--green)':'var(--text3)')+';">'
        +'Commission commande <strong>'+euro(orderCommission(d))+'</strong> '+(checked?'\u2705 Per\u00e7ue':'\u23f3 Non per\u00e7ue')
        +'</span></div>';
    } else {
      // Three delivery checkboxes
      var mc=maintenanceCommission(d),pc=paccarCommission(d),pr=primeCommission(d);
      function delivLine(label,val,key,rcv){
        if(!val)return '';
        return '<div style="display:flex;align-items:center;gap:8px;padding:3px 0;">'
          +'<input type="checkbox" class="comm-v213-check" data-id="'+esc(d.id)+'" data-k="'+key+'" '+(rcv?'checked':'')+' onclick="event.stopPropagation()" style="width:15px;height:15px;accent-color:var(--green,#3ab87a);cursor:pointer;">'
          +'<span style="font-size:11px;color:'+(rcv?'var(--green)':'var(--text3)')+';">'
          +esc(label)+' <strong>'+euro(val)+'</strong> '+(rcv?'\u2705 Per\u00e7ue':'\u23f3 Non per\u00e7ue')
          +'</span></div>';
      }
      html+=delivLine('Contrat '+esc(d.maintenance||''),mc,'rcvMaint',!!d.rcvMaint);
      html+=delivLine('Prime marge',pr,'rcvPrime',!!d.rcvPrime);
      html+=delivLine('PACCAR Financement',pc,'rcvPaccar',!!d.rcvPaccar);
    }

    html+='</div></div></div>';
    return html;
  }

  // ── MAIN RENDER ──────────────────────────────────────────────────
  function renderCommissionsV213(){
    try{
      var cont=byId('livraisons-content');if(!cont)return;
      var all=syncDeliveries();var entries=buildEntries(all);
      var cy=curYear(),cm=curYm();
      var filter=window.commFilterV212||'all';
      var stickyEl=byId('comm-search-sticky');
      var q=String(stickyEl?stickyEl.value:(window.commSearchV212||'')).toLowerCase().trim();
      var sort=window.commSortV212||localStorage.getItem('commSortV212')||'desc';

      // ── KPI row 1: Commissions
      var yearTotal=entries.filter(function(e){return e.month.slice(0,4)===cy}).reduce(function(a,e){return a+e.amount},0);
      // deliveredUnpaid = livraisons des mois PASSÉS (< cm), non perçues
      var deliveredUnpaid=entries.filter(function(e){return e.kind==='delivery'&&e.month<cm}).reduce(function(a,e){return a+deliveryRest(e.d)},0);
      var monthTotal=entries.filter(function(e){return e.month===cm}).reduce(function(a,e){return a+e.amount},0);

      // ── KPI row 2: Véhicules
      var allDeliveries=getDeliveries();
      // Commandes année en cours: orderDate dans cy
      var cmdsYear=allDeliveries.filter(function(d){return normalizeDate(d.orderDate).slice(0,4)===cy});
      // Livrés = deliveryDate dans mois passés de cy
      var livresYear=allDeliveries.filter(function(d){var yd=normalizeDate(d.deliveryDate);return yd.slice(0,4)===cy&&ym(d.deliveryDate)<cm});
      // À livrer = deliveryDate dans cm ou futur de cy
      var aLivrerYear=allDeliveries.filter(function(d){var yd=normalizeDate(d.deliveryDate);return yd.slice(0,4)===cy&&ym(d.deliveryDate)>=cm});
      // Marge moy livraisons année en cours
      var livAll=allDeliveries.filter(function(d){return normalizeDate(d.deliveryDate).slice(0,4)===cy});
      var margSum=0,margQty=0;
      livAll.forEach(function(d){var mp=num(d.marginPct);var q2=qty(d);if(mp>0){margSum+=mp*q2;margQty+=q2}});
      var margAvg=margQty?Math.round((margSum/margQty)*10)/10:0;
      var cmdsQty=cmdsYear.reduce(function(a,d){return a+qty(d)},0);
      var livresQty=livresYear.reduce(function(a,d){return a+qty(d)},0);
      var aLivrerQty=aLivrerYear.reduce(function(a,d){return a+qty(d)},0);

      // Filter entries
      var visible=entries.filter(function(e){return matchesFilter(e,filter)&&(!q||searchable(e.d).indexOf(q)>=0)});

      var html='<div style="padding:0 12px 4px;"><div style="font-size:10px;color:var(--text3);font-weight:800;letter-spacing:.8px;text-transform:uppercase;">DAF_COMMERCE-Box \u2014 Commissions</div></div>';

      // KPI row 1 — Commissions
      function kpiCard(id,val,lbl,cls){
        var active=filter===id;
        return '<div class="kpi-card '+cls+(active?' active':'')+' comm-v212-kpi" data-f="'+id+'" style="cursor:pointer;'+(active?'outline:2px solid var(--daf);outline-offset:2px;':'')+'"><div class="kpi-val">'+euro(val)+'</div><div class="kpi-lbl" style="font-size:8px;line-height:1.3;">'+lbl+'</div></div>'
      }
      html+='<div class="kpi-grid" style="margin:4px 12px 4px;grid-template-columns:repeat(3,1fr);gap:6px;">'
        +kpiCard('yearTotal',yearTotal,'COMMISSIONS TOTALES<br>ann\u00e9e en cours','c-daf')
        +kpiCard('deliveredUnpaid',deliveredUnpaid,'COMMISSIONS NON PER\u00c7UES<br>livr\u00e9es toutes dates','c-red')
        +kpiCard('monthTotal',monthTotal,'COMMISSIONS TOTALES<br>mois en cours','c-blue')
        +'</div>';

      // KPI row 2 — Véhicules
      html+='<div class="kpi-grid" style="margin:0 12px 8px;grid-template-columns:repeat(4,1fr);gap:6px;">'
        +'<div class="kpi-card c-blue"><div class="kpi-val" style="font-size:18px;">'+cmdsQty+'</div><div class="kpi-lbl" style="font-size:8px;line-height:1.3;">Cmds ann\u00e9e<br>en cours</div></div>'
        +'<div class="kpi-card c-green"><div class="kpi-val" style="font-size:18px;">'+livresQty+'</div><div class="kpi-lbl" style="font-size:8px;line-height:1.3;">Livr\u00e9s ann\u00e9e<br>mois pass\u00e9s</div></div>'
        +'<div class="kpi-card c-orange"><div class="kpi-val" style="font-size:18px;">'+aLivrerQty+'</div><div class="kpi-lbl" style="font-size:8px;line-height:1.3;">\u00c0 livrer<br>mois \u2265 en cours</div></div>'
        +'<div class="kpi-card c-purple"><div class="kpi-val" style="font-size:18px;">'+(margAvg?margAvg+'%':'—')+'</div><div class="kpi-lbl" style="font-size:8px;line-height:1.3;">Marge moy.<br>Liv. ann\u00e9e</div></div>'
        +'</div>';

      // Toolbar
      html+='<div style="display:flex;gap:6px;align-items:center;padding:0 12px 8px;flex-wrap:wrap;">'
        +'<button class="btn btn-secondary btn-sm comm-v212-kpi'+(filter==='all'?' btn-primary':'')+'" data-f="all" style="font-size:10px;">Tous</button>'
        +'<button class="btn btn-secondary btn-sm" id="comm-v213-open-all" style="font-size:10px;">\u25bc Tout ouvrir</button>'
        +'<button class="btn btn-secondary btn-sm" id="comm-v213-close-all" style="font-size:10px;">\u25b6 Tout fermer</button>'
        +'<button class="btn btn-secondary btn-sm" id="comm-v212-sort" style="font-size:10px;margin-left:auto;">'+(sort==='asc'?'\u2b06 Plus ancien':'\u2b07 Plus r\u00e9cent')+'</button>'
        +'</div>';

      // Group by month
      var map={};
      visible.forEach(function(e){if(!map[e.month])map[e.month]=[];map[e.month].push(e)});
      var keys=Object.keys(map).sort();if(sort==='desc')keys.reverse();
      window.commOpenStateV212=window.commOpenStateV212||{};

      if(!keys.length){html+='<div class="card" style="margin:0 12px;"><div style="font-size:11px;color:var(--text3);">Aucune commission selon le filtre actuel.</div></div>';}

      keys.forEach(function(k){
        var es=map[k].slice().sort(function(a,b){return sort==='asc'?a.date.localeCompare(b.date):b.date.localeCompare(a.date)});
        var theo=es.reduce(function(a,e){return a+e.amount},0);
        var rec=es.reduce(function(a,e){return a+(e.kind==='order'?orderReceived(e.d):deliveryReceived(e.d))},0);
        var rest=theo-rec;
        var isOpen=Object.prototype.hasOwnProperty.call(window.commOpenStateV212,k)?!!window.commOpenStateV212[k]:(k===cm);

        html+='<div style="margin:0 12px 8px;">'
          +'<div class="comm-v212-month" data-k="'+esc(k)+'" style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg3);border-radius:'+(isOpen?'var(--radius) var(--radius) 0 0':'var(--radius)')+';cursor:pointer;border-left:3px solid '+(rest===0?'var(--green,#3ab87a)':'var(--daf)')+';">'
          +'<div>'
          +'<div style="font-size:13px;font-weight:800;color:var(--text);">'+esc(labelMonth(k))+' '+(isOpen?'\u25bc':'\u25b6')+'</div>'
          +'<div style="font-size:10px;color:var(--text3);margin-top:2px;">'+euro(theo)+' th\u00e9oriques \u00b7 <span style="color:'+(rest===0?'var(--green,#3ab87a)':'var(--red)')+';">'+euro(rest)+' restant</span>'+(rest===0?' \u2705':'')+'</div>'
          +'</div>'
          +'<div style="font-size:20px;font-weight:900;color:var(--daf);">'+euro(theo)+'</div>'
          +'</div>';

        if(isOpen){
          html+='<div style="background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:0 12px;">';

          var orders=es.filter(function(e){return e.kind==='order'});
          var livs=es.filter(function(e){return e.kind==='delivery'});

          html+='<div style="padding:10px 0 4px;">'
            +'<div style="font-size:11px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:var(--daf);border-bottom:2px solid var(--daf);padding-bottom:5px;margin-bottom:8px;">COMMANDES<span style="font-weight:400;color:var(--text3);margin-left:8px;font-size:10px;letter-spacing:0;">('+orders.length+')</span></div>';
          if(!orders.length){html+='<div style="font-size:11px;color:var(--text3);padding-bottom:8px;">Aucune commande sur ce mois.</div>';}
          orders.forEach(function(e){html+=rowHtml(e)});
          html+='</div>';

          html+='<div style="padding:4px 0 10px;">'
            +'<div style="font-size:11px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:var(--green,#3ab87a);border-bottom:2px solid var(--green,#3ab87a);padding-bottom:5px;margin-bottom:8px;">LIVRAISONS<span style="font-weight:400;color:var(--text3);margin-left:8px;font-size:10px;letter-spacing:0;">('+livs.length+')</span></div>';
          if(!livs.length){html+='<div style="font-size:11px;color:var(--text3);">Aucune livraison sur ce mois.</div>';}
          livs.forEach(function(e){html+=rowHtml(e)});
          html+='</div>';

          html+='</div>';
        }
        html+='</div>';
      });

      cont.innerHTML=html;

      // Sticky search
      var stEl=byId('comm-search-sticky');
      if(stEl){stEl.oninput=function(){window.commSearchV212=this.value;renderCommissionsV213()}}

      // Sort
      var sortBtn=byId('comm-v212-sort');
      if(sortBtn)sortBtn.onclick=function(){window.commSortV212=(sort==='asc'?'desc':'asc');localStorage.setItem('commSortV212',window.commSortV212);renderCommissionsV213()};

      // Open/close all
      var openAll=byId('comm-v213-open-all');
      if(openAll)openAll.onclick=function(){keys.forEach(function(k){window.commOpenStateV212[k]=true});renderCommissionsV213()};
      var closeAll=byId('comm-v213-close-all');
      if(closeAll)closeAll.onclick=function(){keys.forEach(function(k){window.commOpenStateV212[k]=false});renderCommissionsV213()};

      // KPI filters
      qsa('.comm-v212-kpi').forEach(function(x){x.onclick=function(){window.commFilterV212=this.dataset.f||'all';renderCommissionsV213()}});

      // Month toggle
      qsa('.comm-v212-month').forEach(function(x){x.onclick=function(){
        var k=this.dataset.k;
        var cur=Object.prototype.hasOwnProperty.call(window.commOpenStateV212,k)?!!window.commOpenStateV212[k]:(k===curYm());
        window.commOpenStateV212[k]=!cur;
        renderCommissionsV213();
      }});

      // Checkboxes
      qsa('.comm-v213-check').forEach(function(cb){cb.onchange=function(e){
        e.stopPropagation();
        var list=getDeliveries();
        var d=list.find(function(x){return String(x.id)===String(cb.dataset.id)});
        if(!d)return;
        d[cb.dataset.k]=cb.checked;
        saveDeliveries(list);
        renderCommissionsV213();
      }});

      // Open deal buttons
      qsa('.comm-v213-open').forEach(function(b){b.onclick=function(){
        if(this.dataset.id)openDealV213(this.dataset.id);
      }});

    }catch(e){
      console.error('Erreur COMMISSIONS v2.1.3',e);
      var cont=byId('livraisons-content');
      if(cont)cont.innerHTML='<div class="card"><div class="card-title">Erreur COMMISSIONS</div><div style="color:var(--red);font-size:12px;line-height:1.5;">'+esc(e.message||e)+'</div></div>';
    }
  }

  function openDealV213(dealId){
    var deals=getDeals();
    var deal=deals.find(function(x){return String(x.id)===String(dealId)});
    if(deal){var st=arr(deal.lines).map(function(l){return String((l&&l.result)||'EN_COURS').toUpperCase().replace('É','E')});window.affairesFilter=st.indexOf('GAGNE')>=0?'GAGNE':(st[0]||'ALL');}
    else{window.affairesFilter='ALL';}
    try{if(typeof window.showScreen==='function')window.showScreen('affaires');}catch(e){}
    setTimeout(function(){
      try{if(typeof window.renderAffaires==='function')window.renderAffaires();}catch(e){}
      setTimeout(function(){
        var el=document.querySelector('[data-deal-id="'+dealId+'"]');
        if(el){el.scrollIntoView({behavior:'smooth',block:'start'});var orig=el.style.outline;el.style.outline='2px solid var(--daf)';el.style.outlineOffset='3px';setTimeout(function(){el.style.outline=orig||'';el.style.outlineOffset='';},2000);}
      },100);
    },80);
  }

  function bindAffairesSearch(){
    var el=byId('affaires-search-sticky');
    if(el&&!el._bound){el._bound=true;el.oninput=function(){window.affairesSearch=this.value;if(typeof window.renderAffaires==='function')window.renderAffaires()};if(window.affairesSearch)el.value=window.affairesSearch;}
  }

  function renameNav(){
    qsa('.nav-item[data-screen="livraisons"] .nav-icon').forEach(function(e){e.textContent='💶'});
    qsa('.nav-item[data-screen="livraisons"] .nav-label').forEach(function(e){e.textContent='Commissions'});

(function(){

      try{
        var d=deals.find(function(x){return x.id===dealId});

        if(d&&idx2>=0){

          window._logActivity({type:'LINE_UPDATE',clientNom:d.client||'',tva:d.tva||'',dealId:d.id,description:res+' · '+(l.type||'')+(l.model?' '+l.model:'')});

<script>
/* DAF_COMMERCE-Box — Correctif fiche client : Accessible à côté d'Exclu + État prospection en liste, sans carte fixe */
(function(){
  'use strict';
  function $(id){return document.getElementById(id);}
  function qsa(sel,root){return Array.prototype.slice.call((root||document).querySelectorAll(sel));}
  function getSettings(){try{return DB.getSettings()||{};}catch(e){return {};}}
  function saveSettings(st){try{DB.saveSettings(st); if(typeof autoSave==='function')autoSave();}catch(e){}}
  function siteKey(c){try{return makeSiteKey(c);}catch(e){return (c&&c.tva)||'';}}
  function isAccessible(c){
    var st=getSettings(), m=st.accessibleOverrides||{}, sk=siteKey(c);
    if(Object.prototype.hasOwnProperty.call(m,sk)) return !!m[sk];
    if(Object.prototype.hasOwnProperty.call(m,(c&&c.tva)||'')) return !!m[(c&&c.tva)||''];
    var acc=String((c&&c.accessible)||'').trim().toUpperCase();
    return !(acc==='0'||acc==='NON'||acc==='FALSE'||acc==='FAUX');
  }
  function setAccessible(c,val){
    var st=getSettings(), sk=siteKey(c);
    st.accessibleOverrides=st.accessibleOverrides||{};
    st.accessibleOverrides[sk]=!!val;
    saveSettings(st);
    try{buildIndex();}catch(e){}
    try{if(currentScreen==='tours')renderTours();}catch(e){}
    try{toast(val?'Client accessible':'Client non accessible');}catch(e){}
  }
  function cleanAndPlaceControls(sk){
    var body=$('sheet-body'); if(!body) return;
    var c=null; try{c=IDX.cBySite[sk];}catch(e){} if(!c) return;

    // Supprime les éléments ajoutés au mauvais endroit.
    var wrongInline=$('cb-accessible-inline'); if(wrongInline) wrongInline.remove();
    var wrongCard=$('cb-etat-prospection-card'); if(wrongCard) wrongCard.remove();
    var wrongCard2=$('cb-accessible-card'); if(wrongCard2) wrongCard2.remove();

    var excl=$('tog-exclu-client');
    if(!excl) return;
    var row=excl.closest('div[style*="background:var(--bg3)"]') || excl.closest('div');
    if(!row) return;

    // ACCESSIBLE doit être dans la même ligne, immédiatement après EXCLU.
    if(!$('cb-tog-accessible-row')){
      var exclBlock=excl.closest('div[style*="display:flex"]') || excl.parentNode;
      var access=document.createElement('div');

      if(exclBlock && exclBlock.parentNode===row){
        row.insertBefore(access, exclBlock.nextSibling);
      }else{
        row.insertBefore(access, row.firstChild ? row.firstChild.nextSibling : null);
      }
      var tog=$('cb-tog-accessible-row');
      if(tog) tog.onchange=function(){setAccessible(c,this.checked);};
    }else{
      var t=$('cb-tog-accessible-row'); if(t) t.checked=isAccessible(c);
    }

    // La liste État prospection doit rester dans cette ligne à droite, pas dans une carte fixe.
    var select=$('site-etat-prosp');
    if(select){
      var wrapper=select.closest('div');
      if(wrapper && wrapper.parentNode!==row){
        row.appendChild(wrapper);
      }
      if(wrapper){
        wrapper.style.flex='1';
        wrapper.style.minWidth='150px';
        wrapper.style.marginLeft='auto';
      }
    }

    setTimeout(function(){cleanAndPlaceControls(sk);},60);
    setTimeout(function(){cleanAndPlaceControls(sk);},180);
    setTimeout(function(){cleanAndPlaceControls(sk);},420);
    return r;
  };
})();
</script>

<script>

  function ensureProfileState(){
    if(typeof GF!=='object')return;

  }
  function selected(kind){ensureProfileState();return kind==='marche'?GF.cbMarcheProfils:GF.cbToursProfils;}
  function setSelected(kind,arr){ensureProfileState();if(kind==='marche')GF.cbMarcheProfils=arr||[];else GF.cbToursProfils=arr||[];}
  function profileMatchesClient(c,kind){

  function profileLabel(kind){

  // ---------- AFFAIRES : pense-bête + filtres date multi-sélection + recherche conservée ----------
  function dateFromProject(p){var d=p.date||p.mois||p.created||p.createdAt||''; var dt=new Date(d); return isNaN(dt)?null:dt}
  function addMonths(dt,n){var d=new Date(dt); d.setMonth(d.getMonth()+n); return d}

  function injectAffairesDateControls(){
    var cont=byId('affaires-content'); if(!cont)return;
    if(!byId('cb-reminders')){var rh=reminderHtml(); if(rh){var tmp=document.createElement('div'); tmp.innerHTML=rh; cont.insertBefore(tmp.firstChild,cont.firstChild)}}
    if(!byId('cb-aff-datefilters')){
      var years={}; var months={}; deals().concat(archives()).forEach(function(d){var dt=new Date(d.created||d.date||''); if(!isNaN(dt)){years[dt.getFullYear()]=1; months[dt.getMonth()+1]=1}}); projects().forEach(function(p){var dt=dateFromProject(p); if(dt){years[dt.getFullYear()]=1; months[dt.getMonth()+1]=1}});
      var ys=Object.keys(years).sort(function(a,b){return b-a}).map(function(y){return '<label class="gf-chip-opt cb-date-chip"><input type="checkbox" class="cb-aff-year" value="'+y+'" style="display:none;">'+y+'</label>'}).join('')||'<span style="font-size:11px;color:var(--text3);">Aucune année</span>';
      var noms=['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc']; var ms=noms.map(function(n,i){return '<label class="gf-chip-opt cb-date-chip"><input type="checkbox" class="cb-aff-month" value="'+(i+1)+'" style="display:none;">'+n+'</label>'}).join('');
      var box=document.createElement('div'); box.id='cb-aff-datefilters'; box.className='card'; box.style.padding='9px 12px';
      box.innerHTML='<div class="card-title" style="margin-bottom:6px;">Filtres Affaires — dates</div><div style="font-size:10px;color:var(--text3);margin-bottom:5px;">Années</div><div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px;">'+ys+'</div><div style="font-size:10px;color:var(--text3);margin-bottom:5px;">Mois</div><div style="display:flex;gap:4px;flex-wrap:wrap;">'+ms+'</div>';

    }
    qsa('.cb-rem-client').forEach(function(b){if(b._cbBound)return;b._cbBound=true;b.onclick=function(e){e.stopPropagation();var p=projects().find(function(x){return String(x.id)===String(b.dataset.pid)}); if(p)openClientFromTva(p.tva)}});
    qsa('.cb-rem-deal').forEach(function(b){if(b._cbBound)return;b._cbBound=true;b.onclick=function(e){e.stopPropagation();var p=projects().find(function(x){return String(x.id)===String(b.dataset.pid)}); var d=ensureDealFromProjectLocal(p); if(d){showScreen('affaires'); setTimeout(function(){if(window.openDealV27)openDealV27(d.id); else if(window.openDealV213)openDealV213(d.id)},100)}}});
    applyAffairesDateFilters();
  }
  function applyAffairesDateFilters(){
    var ys=qsa('.cb-aff-year:checked').map(function(x){return String(x.value)}); var ms=qsa('.cb-aff-month:checked').map(function(x){return String(x.value)});
    var dmap={}; deals().concat(archives()).forEach(function(d){dmap[String(d.id)]=d});
    qsa('#affaires-content [data-deal-id]').forEach(function(card){var d=dmap[String(card.dataset.dealId)]; var ok=true; if(d){var dt=new Date(d.created||d.date||''); if(!isNaN(dt)){if(ys.length&&ys.indexOf(String(dt.getFullYear()))<0)ok=false; if(ms.length&&ms.indexOf(String(dt.getMonth()+1))<0)ok=false}} card.style.display=ok?'':'none'});

  // ---------- Hooks robustes ----------
  var oldShow=window.showScreen; window.showScreen=function(name){ensureActivityScreen(); if(name==='activite'){qsa('.screen').forEach(function(s){s.classList.remove('active')}); qsa('.nav-item').forEach(function(n){n.classList.toggle('active',n.dataset.screen==='activite')}); byId('screen-activite').classList.add('active'); window.currentScreen='activite'; renderActivity(); return;} var r=oldShow?oldShow.apply(this,arguments):undefined; if(name==='affaires')setTimeout(injectAffairesDateControls,120); if(name==='livraisons'){syncWonDealsToDeliveries();} return r };

<script>
/* DAF_COMMERCE-Box — BUILD002C : correctifs AFFAIRES
   - Supprime le double filtre Dates
   - Remplace par une liste déroulante multi-sélection Année/Mois
   - Affiche toujours le pense-bête Projets futurs
   - Corrige le bouton Fiche client depuis une affaire */
(function(){
  'use strict';
  window.DAF_COMMERCEBOX_BUILD='FOUNDATION-B002C';
  function $(id){return document.getElementById(id)}
  function qsa(s,r){return Array.prototype.slice.call((r||document).querySelectorAll(s))}
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
  function nrm(s){try{return norm(s)}catch(e){return String(s||'').trim().toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}}
  function notify(m){try{toast(m)}catch(e){console.log(m)}}
  function projects(){try{return DB.getProjects()||[]}catch(e){return []}}
  function clients(){try{return DB.getClients()||[]}catch(e){return []}}
  function deals(){try{return (window.getHotDeals?window.getHotDeals():JSON.parse(localStorage.getItem('hotDeals')||'[]'))||[]}catch(e){return []}}
  function saveDeals(v){try{if(window.saveHotDeals){window.saveHotDeals(v);return}}catch(e){}try{localStorage.setItem('hotDeals',JSON.stringify(v||[]))}catch(e){}}
  function dateObj(v){if(!v)return null;var d=new Date(v);return isNaN(d)?null:d}
  function dealDate(d){return dateObj(d.created||d.date||d.projectDate||d.mois)||dateObj((d.lines&&d.lines[0]&&(d.lines[0].created||d.lines[0].date)))||null}
  function monthName(m){return ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'][m-1]||String(m)}
  function getDealId(card){return card&&card.getAttribute('data-deal-id')}
  function findDeal(id){return deals().find(function(d){return String(d.id)===String(id)})||null}
  function findClientByAny(tva,name,siteKey){
    var list=clients();
    if(siteKey){var c=list.find(function(x){try{return makeSiteKey(x)===siteKey}catch(e){return false}}); if(c)return c;}
    if(tva){var c2=list.find(function(x){return String(x.tva||'')===String(tva||'')}); if(c2)return c2;}
    if(name){var nn=nrm(name);var c3=list.find(function(x){return nrm(x.nom)===nn})||list.find(function(x){var xn=nrm(x.nom);return xn.indexOf(nn)>=0||nn.indexOf(xn)>=0}); if(c3)return c3;}
    return null;
  }
  function openClientRobust(tva,name,siteKey){
    var c=findClientByAny(tva,name,siteKey);
    if(!c){notify('Fiche client introuvable');return;}
    try{if(typeof openSiteSheet==='function'&&typeof makeSiteKey==='function'){openSiteSheet(makeSiteKey(c));return;}}catch(e){}
    try{if(typeof openClientSheet==='function'){openClientSheet(c.tva);return;}}catch(e){}
    notify('Fiche client introuvable');
  }
  window.cbOpenClientRobust=openClientRobust;

  function bindAffaireClientLinks(){
    qsa('#affaires-content .aff-client-link, #affaires-content [data-action="fiche-client"], #affaires-content .cb-open-client').forEach(function(b){
      if(b._cbClientFixed)return; b._cbClientFixed=true;
      b.onclick=function(e){
        e.preventDefault();e.stopPropagation();
        var card=b.closest('[data-deal-id]'); var d=card?findDeal(getDealId(card)):null;
        openClientRobust(b.dataset.tva||(d&&d.tva), (d&&d.client)||b.dataset.client, (d&&d.siteKey)||b.dataset.siteKey);
      };
    });
    // Sécurité : si aucun bouton n'existe dans une carte affaire, on en ajoute un discret.
    qsa('#affaires-content [data-deal-id]').forEach(function(card){
      if(card.querySelector('.aff-client-link,.cb-open-client'))return;

      var top=card.querySelector('div'); if(top)top.appendChild(btn); else card.insertBefore(btn,card.firstChild);
    });
  }

  function futureProjectsList(){
    return projects().filter(function(p){
      var st=String(p.status||'').toUpperCase();
      return st==='FUTUR'||st==='REPORTE'||st==='REPORTÉ';
    }).sort(function(a,b){return String(a.date||a.mois||'9999').localeCompare(String(b.date||b.mois||'9999'))});
  }
  function projectName(p){
    if(p.nom||p.client||p.clientNom)return p.nom||p.client||p.clientNom;
    var c=findClientByAny(p.tva,'',p.siteKey);return (c&&c.nom)||p.tva||'Client';
  }
  function ensureDealFromProject(p){
    var ds=deals();
    var d=ds.find(function(x){return String(x.projectId||'')===String(p.id||'')});
    if(d)return d;
    d={id:'deal_'+Date.now()+'_'+Math.floor(Math.random()*999),projectId:p.id||'',tva:p.tva||'',siteKey:p.siteKey||'',client:projectName(p),status:String(p.status||'FUTUR').toUpperCase(),created:p.created||p.date||new Date().toISOString(),lines:[{id:'line_'+Date.now(),created:p.created||new Date().toISOString(),type:p.type||'Tracteur',model:p.model||p.modele||'',qty:Number(p.camions||p.qty||p.quantite||1)||1}]};

    },250);

    if(!list.length){
      html+='<div style="font-size:11px;color:var(--text2);padding:6px 0;">Aucun projet futur enregistré.</div>';
    }else{
      list.slice(0,12).forEach(function(p){
        html+='<div style="padding:8px 0;border-top:1px solid var(--daf-border);display:flex;gap:8px;align-items:center;justify-content:space-between;">'
          +'<div style="min-width:0;flex:1;"><div style="font-size:12px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(projectName(p))+'</div>'
          +'<div style="font-size:10px;color:var(--text2);">'+esc(p.date||p.mois||'Date non définie')+' · '+esc(p.camions||p.qty||p.quantite||'')+' véhicule(s) '+esc(p.type||'')+'</div>'
          +'<div style="font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(p.commentaire||p.comment||'')+'</div></div>'
          +'<div style="display:flex;gap:5px;flex-shrink:0;"><button class="btn btn-ghost btn-sm cb-rem-client-hard" data-pid="'+esc(p.id)+'" style="font-size:9px;">Fiche</button><button class="btn btn-primary btn-sm cb-rem-deal-hard" data-pid="'+esc(p.id)+'" style="font-size:9px;">Affaire</button></div></div>';
      });
    }
    html+='</div>';

    cont.insertBefore(tmp.firstChild,cont.firstChild);
    qsa('.cb-rem-client-hard').forEach(function(b){b.onclick=function(e){e.stopPropagation();var p=projects().find(function(x){return String(x.id)===String(b.dataset.pid)}); if(p)openClientRobust(p.tva,projectName(p),p.siteKey)}});
    qsa('.cb-rem-deal-hard').forEach(function(b){b.onclick=function(e){e.stopPropagation();var p=projects().find(function(x){return String(x.id)===String(b.dataset.pid)}); if(p)openDealFromProject(p)}});
  }

  function getDistinctDealDates(){
    var ys={},ms={};
    deals().forEach(function(d){var dt=dealDate(d); if(dt){ys[dt.getFullYear()]=true;ms[dt.getMonth()+1]=true;}});
    projects().forEach(function(p){var dt=dateObj(p.date||p.mois||p.created); if(dt){ys[dt.getFullYear()]=true;ms[dt.getMonth()+1]=true;}});
    return {years:Object.keys(ys).sort(function(a,b){return b-a}),months:Object.keys(ms).sort(function(a,b){return Number(a)-Number(b)})};

  window.cbAffairesYears=window.cbAffairesYears||[];
  window.cbAffairesMonths=window.cbAffairesMonths||[];
  function selectedLabel(){
    var y=window.cbAffairesYears||[], m=window.cbAffairesMonths||[];

  function injectDateDropdown(){
    var cont=$('affaires-content'); if(!cont)return;
    // Supprime tous les anciens filtres date, y compris les filtres boutons déjà injectés.
    qsa('#cb-affaires-datefilters,#cb-affaires-datefilters-hard,#cb-affaires-datefilters select,#cb-affaires-datefilters input').forEach(function(x){var box=x.id==='cb-affaires-datefilters'||x.id==='cb-affaires-datefilters-hard'?x:x.closest('#cb-affaires-datefilters,#cb-affaires-datefilters-hard'); if(box)box.remove();});
    if($('cb-affaires-datefilters-hard'))return;
    var box=document.createElement('div');
    box.id='cb-affaires-datefilters-hard';
    box.className='card';
    box.style.cssText='padding:9px 12px;margin-top:0;';
    box.innerHTML='<div style="display:flex;gap:7px;align-items:center;justify-content:space-between;"><div><div class="card-title" style="margin-bottom:2px;">Filtre affaires — dates</div><div id="cb-aff-date-label" style="font-size:10px;color:var(--text3);">'+esc(selectedLabel())+'</div></div><div style="display:flex;gap:6px;"><button class="btn btn-secondary btn-sm" id="cb-aff-date-open" style="font-size:10px;">Dates ▼</button><button class="btn btn-ghost btn-sm" id="cb-aff-date-reset" style="font-size:10px;">Tous</button></div></div>';
    // Après le pense-bête si présent, sinon en haut.
    var rem=$('cb-reminders-hard');
    if(rem&&rem.nextSibling) cont.insertBefore(box,rem.nextSibling); else cont.insertBefore(box,cont.firstChild);
    var op=$('cb-aff-date-open'); if(op)op.onclick=openDateModal;
    var rs=$('cb-aff-date-reset'); if(rs)rs.onclick=function(){window.cbAffairesYears=[];window.cbAffairesMonths=[];applyDateFilter();};
  }
  function openDateModal(){
    var dd=getDistinctDealDates();
    var ysel=new Set(window.cbAffairesYears||[]), msel=new Set((window.cbAffairesMonths||[]).map(String));
    var html='<div class="form-group"><label class="form-label">Années</label><div style="display:flex;flex-wrap:wrap;gap:6px;">';
    if(!dd.years.length)html+='<span style="font-size:11px;color:var(--text3);">Aucune année détectée</span>';
    dd.years.forEach(function(y){html+='<label class="gf-chip-opt '+(ysel.has(String(y))?'on':'')+'"><input type="checkbox" class="cb-year" value="'+esc(y)+'" '+(ysel.has(String(y))?'checked':'')+' style="display:none;">'+esc(y)+'</label>'});
    html+='</div></div><div class="form-group"><label class="form-label">Mois</label><div style="display:flex;flex-wrap:wrap;gap:6px;">';
    dd.months.forEach(function(m){html+='<label class="gf-chip-opt '+(msel.has(String(m))?'on':'')+'"><input type="checkbox" class="cb-month" value="'+esc(m)+'" '+(msel.has(String(m))?'checked':'')+' style="display:none;">'+esc(monthName(Number(m)))+'</label>'});
    html+='</div></div>';
    openModal('Filtrer les affaires par dates',html,[
      {label:'Tout afficher',cls:'btn-ghost',action:function(){window.cbAffairesYears=[];window.cbAffairesMonths=[];applyDateFilter();try{closeModal()}catch(e){}}},
      {label:'Appliquer',cls:'btn-primary',action:function(){window.cbAffairesYears=qsa('.cb-year:checked').map(function(i){return String(i.value)});window.cbAffairesMonths=qsa('.cb-month:checked').map(function(i){return String(i.value)});applyDateFilter();try{closeModal()}catch(e){}}}
    ]);
    setTimeout(function(){qsa('#modal .gf-chip-opt').forEach(function(l){l.onclick=function(){var inp=l.querySelector('input');setTimeout(function(){l.classList.toggle('on',inp.checked)},0)}})},50);
  }
  function applyDateFilter(){
    var ysel=new Set((window.cbAffairesYears||[]).map(String)), msel=new Set((window.cbAffairesMonths||[]).map(String));
    qsa('#affaires-content [data-deal-id]').forEach(function(card){
      var d=findDeal(getDealId(card)); var dt=d?dealDate(d):null; var ok=true;
      if(dt){ if(ysel.size&&!ysel.has(String(dt.getFullYear())))ok=false; if(msel.size&&!msel.has(String(dt.getMonth()+1)))ok=false; }
      else if(ysel.size||msel.size) ok=false;
      card.style.display=ok?'':'none';
    });
    var lab=$('cb-aff-date-label'); if(lab)lab.textContent=selectedLabel();
  }

  function applyHardAffairesFix(){
    if(!($('screen-affaires')&&$('screen-affaires').classList.contains('active')))return;
    // On laisse la barre recherche Claude/Affaires existante en place, on corrige seulement les ajouts.
    injectReminders();
    injectDateDropdown();
    applyDateFilter();
    bindAffaireClientLinks();
  }
  window.cbApplyHardAffairesFix=applyHardAffairesFix;

  var oldShow=window.showScreen;
  window.showScreen=function(name){var r=oldShow?oldShow.apply(this,arguments):undefined; if(name==='affaires'){setTimeout(applyHardAffairesFix,80);setTimeout(applyHardAffairesFix,250);setTimeout(applyHardAffairesFix,500);} return r;};
  var oldRenderScreen=window.renderScreen;
  window.renderScreen=function(name){var r=oldRenderScreen?oldRenderScreen.apply(this,arguments):undefined; if(name==='affaires'){setTimeout(applyHardAffairesFix,80);setTimeout(applyHardAffairesFix,250);} return r;};
  var oldRA=window.renderAffaires;
  if(typeof oldRA==='function'){
    window.renderAffaires=function(){var r=oldRA.apply(this,arguments);setTimeout(applyHardAffairesFix,80);setTimeout(applyHardAffairesFix,250);return r;};
  }
  document.addEventListener('click',function(e){
    var b=e.target&&e.target.closest&&e.target.closest('.aff-client-link,.cb-open-client');
    if(b&&b.closest('#affaires-content')){e.preventDefault();e.stopPropagation();var card=b.closest('[data-deal-id]');var d=card?findDeal(getDealId(card)):null;openClientRobust(b.dataset.tva||(d&&d.tva),(d&&d.client)||b.dataset.client,(d&&d.siteKey)||b.dataset.siteKey);}
  },true);
  document.addEventListener('DOMContentLoaded',function(){setTimeout(applyHardAffairesFix,400);});
  setTimeout(applyHardAffairesFix,600);
})();
</script>


<script>
/* ============================================================
   DAF_COMMERCE-Box — BUILD002E STABILISATION
   Base: BUILD002C_AFFAIRES_FIX
   Correctifs ciblés :
   1) suppression réelle du double filtre Affaires — Dates
   2) réduction du flash visuel Affaires/Commissions
   3) ajout Vue croisée dans le listing Marché sans remplacer le listing existant
   ============================================================ */
(function(){
  'use strict';
  window.DAF_COMMERCEBOX_BUILD='FOUNDATION-B002E-STABLE';
  function $(id){return document.getElementById(id)}
  function qsa(sel,root){return Array.prototype.slice.call((root||document).querySelectorAll(sel));}
  function safeEsc(v){try{return escH(String(v==null?'':v));}catch(e){return String(v==null?'':v).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})}}
  function notify(m){try{toast(m)}catch(e){console.log(m)}}
  function getRowsFromMatrix(){var det=$('pdm-matrix-detail');return det&&Array.isArray(det._dcboxRows)?det._dcboxRows:[];}
  function getClientForVehicle(v){try{return (IDX&&IDX.cByTva&&IDX.cByTva[v.tva])||(DB.getClients()||[]).find(function(c){return String(c.tva||'')===String(v.tva||'')})||{};}catch(e){return {}}}
  function yearOf(v){try{return getYear(v.date)}catch(e){var d=new Date(v&&v.date);return isNaN(d)?'':d.getFullYear();}}
  function openTargetFiche(v){try{var c=getClientForVehicle(v);if(c&&c.tva&&typeof openSiteSheet==='function'&&typeof makeSiteKey==='function'){openSiteSheet(makeSiteKey(c));return;}if(c&&c.tva&&typeof openClientSheet==='function'){openClientSheet(c.tva);return;}}catch(e){}notify('Fiche client introuvable');}

  // ---------- AFFAIRES : filtre Dates unique ----------
  function removeLegacyAffairesDateFilters(){
    // Supprime les deux anciens filtres sous forme de boutons, sans supprimer le nouveau dropdown.
    qsa('#cb-affaires-datefilters,#cb-aff-datefilters').forEach(function(x){x.remove();});
    // Sécurité : certains anciens filtres ont été injectés sans id clair.
    qsa('#affaires-content .card').forEach(function(card){
      if(card.id==='cb-affaires-datefilters-hard')return;
      var t=(card.textContent||'').replace(/\s+/g,' ').trim().toLowerCase();
      if(t.indexOf('filtres affaires')>=0 && t.indexOf('années')>=0 && t.indexOf('mois')>=0){card.remove();}
    });
  }
  function applyAffairesStableFix(){
    var cont=$('affaires-content'); if(!cont)return;
    removeLegacyAffairesDateFilters();
    if(typeof window.cbApplyHardAffairesFix==='function'){
      try{window.cbApplyHardAffairesFix();}catch(e){console.warn('cbApplyHardAffairesFix',e)}
    }
    removeLegacyAffairesDateFilters();
  }

  // Limite le flash : on cache uniquement pendant le micro-rendu, puis on réaffiche.
  function wrapNoFlash(fnName, after){
    var old=window[fnName];
    if(typeof old!=='function' || old._dcboxNoFlash)return;
    var wrapped=function(){
      var id=fnName==='renderAffaires'?'affaires-content':(fnName==='renderLivraisons'?'livraisons-content':'');
      var el=id?$(id):null;
      if(el)el.style.visibility='hidden';
      var r;
      try{r=old.apply(this,arguments);}finally{
        try{if(after)after();}catch(e){console.warn(e)}
        if(el)el.style.visibility='visible';
      }
      return r;
    };
    wrapped._dcboxNoFlash=true;
    window[fnName]=wrapped;
  }
  wrapNoFlash('renderAffaires', applyAffairesStableFix);
  wrapNoFlash('renderLivraisons', null);

  var oldShow=window.showScreen;
  if(typeof oldShow==='function' && !oldShow._dcboxB002E){
    window.showScreen=function(name){
      var r=oldShow.apply(this,arguments);
      if(name==='affaires')setTimeout(applyAffairesStableFix,0);
      if(name==='livraisons')setTimeout(function(){var c=$('livraisons-content'); if(c)c.style.visibility='visible';},0);
      return r;
    };
    window.showScreen._dcboxB002E=true;
  }

  // ---------- MARCHÉ : Vue croisée ajoutée au listing existant ----------
  function exportPivot(rows,years){
    if(typeof XLSX==='undefined'){notify('xlsx.full.min.js requis');return;}
    var aoa=[['Client'].concat(years).concat(['Total'])];
    rows.forEach(function(r){aoa.push([r.name].concat(years.map(function(y){return r[y]||0})).concat([r.total||0]));});
    var wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(aoa),'Vue croisée');
    XLSX.writeFile(wb,'DAF_CommerceBox_vue_croisee_cible.xlsx');
  }
  function buildPivotHtml(vehicles){
    var years=Array.from(new Set(vehicles.map(yearOf).filter(Boolean))).sort();
    var map={};
    vehicles.forEach(function(v){
      var c=getClientForVehicle(v), name=c.nom||v.client||v.tva||'Client', y=yearOf(v); if(!y)return;
      if(!map[name])map[name]={name:name,total:0,vehicle:v};
      map[name][y]=(map[name][y]||0)+1; map[name].total++;
    });
    var rows=Object.keys(map).map(function(k){return map[k];}).sort(function(a,b){return (b.total||0)-(a.total||0)||a.name.localeCompare(b.name);});
    var html='<div id="dcbox-pivot-view" style="padding:7px 8px;">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px;"><div style="font-size:10px;color:var(--text3);">Vue croisée : CLIENTS × ANNÉES · '+rows.length+' client(s)</div><button class="btn btn-secondary btn-sm" id="dcbox-export-pivot" style="font-size:10px;">Exporter vue croisée XLSX</button></div>'
      +'<div style="overflow-x:auto;"><table style="border-collapse:collapse;font-size:10px;width:100%;"><tr><th style="padding:4px 8px;text-align:left;color:var(--text3);position:sticky;left:0;background:var(--bg3);">Client</th>'
      +years.map(function(y){return '<th style="padding:4px 8px;text-align:center;color:var(--text3);">'+y+'</th>';}).join('')
      +'<th style="padding:4px 8px;text-align:center;color:var(--daf);">Total</th><th></th></tr>';
    rows.forEach(function(r,i){
      html+='<tr style="border-top:1px solid var(--border);"><td style="padding:4px 8px;font-weight:700;position:sticky;left:0;background:var(--bg3);min-width:150px;">'+safeEsc(r.name)+'</td>'
        +years.map(function(y){return '<td style="padding:4px 8px;text-align:center;">'+(r[y]||'—')+'</td>';}).join('')
        +'<td style="padding:4px 8px;text-align:center;font-weight:800;color:var(--daf);">'+(r.total||0)+'</td><td><button class="btn btn-secondary btn-sm dcbox-pivot-fiche" data-i="'+i+'">Fiche</button></td></tr>';
    });
    html+='</table></div></div>';
    return {html:html, rows:rows, years:years};
  }
  function ensurePivotButton(){
    var det=$('pdm-matrix-detail'); if(!det || !det.innerHTML.trim())return;
    var rows=getRowsFromMatrix(); if(!rows.length)return;
    if(!det.querySelector('#dcbox-pivot-toggle')){
      var header=det.querySelector('div[style*="justify-content:space-between"]')||det.firstElementChild;
      if(header){
        var btn=document.createElement('button'); btn.id='dcbox-pivot-toggle'; btn.className='btn btn-secondary btn-sm'; btn.style.fontSize='10px'; btn.textContent='Vue croisée';
        var close=det.querySelector('#dcbox-close-matrix,[data-dcb-close-target],[data-close-mat]');
        if(close&&close.parentNode===header) header.insertBefore(btn,close); else header.appendChild(btn);
        btn.onclick=function(e){e.preventDefault();e.stopPropagation();showPivot();};
      }
    }
    var close=det.querySelector('#dcbox-close-matrix,[data-dcb-close-target],[data-close-mat]');
    if(close && !close._dcboxCloseFixed){close._dcboxCloseFixed=true;close.onclick=function(e){e.preventDefault();e.stopPropagation();det.innerHTML='';};}
  }
  function showPivot(){
    var det=$('pdm-matrix-detail'); if(!det)return;
    var vehicles=getRowsFromMatrix(); if(!vehicles.length){notify('Aucune cible disponible');return;}
    var saved=det.querySelector('#dcb-target-list')||det.querySelector('table')&&det.querySelector('table').parentElement;
    var pivot=buildPivotHtml(vehicles);
    var container=det.querySelector('#dcb-target-list')||det.querySelector('div[style*="overflow-x:auto"]');
    if(container){container.outerHTML=pivot.html;}else{det.insertAdjacentHTML('beforeend',pivot.html);}
    det._dcboxPivotRows=pivot.rows; det._dcboxPivotYears=pivot.years;
    var exp=$('dcbox-export-pivot'); if(exp)exp.onclick=function(e){e.stopPropagation();exportPivot(det._dcboxPivotRows||[],det._dcboxPivotYears||[]);};
    qsa('.dcbox-pivot-fiche',det).forEach(function(b){b.onclick=function(e){e.stopPropagation();var r=(det._dcboxPivotRows||[])[parseInt(b.dataset.i,10)];if(r&&r.vehicle)openTargetFiche(r.vehicle);};});
  }
  var mo=null;
  function watchMatrixDetail(){
    var det=$('pdm-matrix-detail'); if(!det || det._dcboxPivotWatched)return;
    det._dcboxPivotWatched=true;
    mo=new MutationObserver(function(){setTimeout(ensurePivotButton,0);});
    mo.observe(det,{childList:true,subtree:true});
    ensurePivotButton();
  }
  var oldRenderMarche=window.renderMarche;
  if(typeof oldRenderMarche==='function' && !oldRenderMarche._dcboxPivotWrap){
    window.renderMarche=function(){var r=oldRenderMarche.apply(this,arguments);setTimeout(watchMatrixDetail,80);setTimeout(ensurePivotButton,250);return r;};
    window.renderMarche._dcboxPivotWrap=true;
  }
  document.addEventListener('click',function(e){if(e.target&&e.target.closest&&e.target.closest('.mat-cell')){setTimeout(function(){watchMatrixDetail();ensurePivotButton();},260);}},true);

  document.addEventListener('DOMContentLoaded',function(){setTimeout(function(){applyAffairesStableFix();watchMatrixDetail();},500);});
  setTimeout(function(){applyAffairesStableFix();watchMatrixDetail();},900);
})();
</script>


<script>
/* DAF_COMMERCE-Box FOUNDATION B002G SAFE FIX
   Base: B002E stable. Correctifs uniquement défensifs :
   1) AFFAIRES : masquer l'ancien filtre Mois/Année à boutons si présent.
   2) MARCHÉ : nettoyer le double bouton Export XLSX dans le listing cible.
   Tout est encapsulé en try/catch pour éviter toute page blanche. */
(function(){
  function byId(id){return document.getElementById(id);}
  function all(sel,root){try{return Array.prototype.slice.call((root||document).querySelectorAll(sel));}catch(e){return [];}}
  function txt(el){return (el&&el.textContent||'').replace(/\s+/g,' ').trim();}
  function hideLegacyAffairesDateButtons(){try{
    var root=byId('affaires-content'); if(!root) return;
    all('.card, .filter-row, div',root).forEach(function(el){
      var t=txt(el).toLowerCase();
      var hasOldButtons=(t.indexOf('affaires')>=0 && t.indexOf('dates')>=0 && t.indexOf('202')>=0 && t.indexOf('jan')>=0) ||
                       (t.indexOf('année')>=0 && t.indexOf('mois')>=0 && t.indexOf('tous')>=0 && all('.fpill,.gf-chip,.btn',el).length>=3);
      var hasNewSelect=(t.indexOf('dates')>=0 && (el.querySelector('select') || t.indexOf('▼')>=0));
      if(hasOldButtons && !hasNewSelect){ el.style.display='none'; el.setAttribute('data-dcb-hidden-old-date-filter','1'); }
    });
  }catch(e){console.warn('B002G affaires filter cleanup',e);}}
  function cleanupMarketTargetListing(){try{
    var candidates=['pdm-matrix-detail','market-detail','marche-detail','graph-detail','chart-detail'];
    var roots=[];
    candidates.forEach(function(id){var el=byId(id); if(el) roots.push(el);});
    // Fallback : tout bloc contenant Exporter cette cible XLSX
    all('div').forEach(function(d){ if(txt(d).indexOf('Exporter cette cible XLSX')>=0 && roots.indexOf(d)<0) roots.push(d); });
    roots.forEach(function(root){
      var buttons=all('button',root).filter(function(b){return txt(b).indexOf('Exporter cette cible XLSX')>=0;});
      if(buttons.length>1){ buttons.slice(1).forEach(function(b){ try{b.remove();}catch(e){b.style.display='none';} }); }
      // S'il existe plusieurs gros listings superposés, masquer ceux sans Vue croisée/Fiche si un listing enrichi existe.
      var enriched=all('button',root).some(function(b){var t=txt(b);return t.indexOf('Vue croisée')>=0 || t==='Fiche' || t.indexOf('Fiche client')>=0;});
      if(enriched){
        var children=all(':scope > div',root);
        if(children.length>1){
          children.forEach(function(ch,i){
            var ct=txt(ch);
            if(i<children.length-1 && ct.indexOf('Exporter cette cible XLSX')>=0 && ct.indexOf('Vue croisée')<0 && ct.indexOf('Fiche')<0){ ch.style.display='none'; }
          });
        }
      }
    });
  }catch(e){console.warn('B002G market listing cleanup',e);}}
  function runFixes(){hideLegacyAffairesDateButtons(); cleanupMarketTargetListing();}
  document.addEventListener('DOMContentLoaded',function(){setTimeout(runFixes,50);setTimeout(runFixes,300);});
  document.addEventListener('click',function(){setTimeout(runFixes,80);setTimeout(runFixes,300);},true);
  window.DAF_COMMERCEBOX_B002G_FIX=runFixes;
})();
</script>


<script>
/* ============================================================
   DAF_COMMERCE-Box — BUILD002H
   Correctif ciblé demandé :
   - supprimer définitivement l'ancien filtre AFFAIRES Dates sous forme de boutons
   - réduire le flash ancien rendu AFFAIRES / COMMISSIONS sans modifier le visuel
   ============================================================ */
(function(){
  'use strict';
  window.DAF_COMMERCEBOX_BUILD='FOUNDATION-B002H-AFFAIRES-CLEAN-FIX';
  function byId(id){return document.getElementById(id);}
  function all(sel,root){return Array.prototype.slice.call((root||document).querySelectorAll(sel));}
  function txt(el){return ((el&&el.textContent)||'').replace(/\s+/g,' ').trim();}

  // CSS de sécurité : les anciens conteneurs connus ne doivent plus être visibles.
  var style=document.createElement('style');
  style.textContent = [
    '#cb-affaires-datefilters{display:none!important;}',
    '#cb-aff-datefilters{display:none!important;}',
    '#cb-affaires-datefilters-hard{display:block!important;}',
    '.dcb-rendering-safe{opacity:0!important;}',
    '.dcb-rendering-ready{opacity:1!important;transition:opacity .04s linear;}'
  ].join('\n');
  document.head.appendChild(style);

  function isLegacyDateFilter(el){
    if(!el || !el.closest) return false;
    if(el.id==='cb-affaires-datefilters' || el.id==='cb-aff-datefilters') return true;
    if(el.id==='cb-affaires-datefilters-hard') return false;
    if(el.closest('#cb-affaires-datefilters-hard')) return false;
    var t=txt(el).toLowerCase();
    if(!t) return false;
    // Ancien filtre : titre + boutons années/mois visibles dans la page.
    var looksLikeOld = (t.indexOf('filtres affaires')>=0 && t.indexOf('années')>=0 && t.indexOf('mois')>=0);
    var hasManyButtons = all('label,button,.gf-chip-opt,.fpill',el).length >= 4;
    var hasDropdown = (t.indexOf('dates')>=0 && t.indexOf('▼')>=0) || !!el.querySelector('select');
    return looksLikeOld && hasManyButtons && !hasDropdown;
  }

  function hardRemoveLegacyAffairesDateFilters(){
    var root=byId('affaires-content');
    if(!root) return;
    // 1) suppression par id connu.
    all('#cb-affaires-datefilters,#cb-aff-datefilters',root).forEach(function(el){try{el.remove();}catch(e){el.style.display='none';}});
    // 2) suppression par contenu, même si l'ancien bloc a été recréé sans id.
    all('.card, .filter-row, div',root).forEach(function(el){
      if(isLegacyDateFilter(el)){try{el.remove();}catch(e){el.style.display='none';}}
    });
  }

  function getScreenContent(name){
    if(name==='affaires') return byId('affaires-content');
    if(name==='livraisons') return byId('livraisons-content');
    return null;
  }

  function safeReveal(name){
    var el=getScreenContent(name);
    if(!el) return;
    if(name==='affaires') hardRemoveLegacyAffairesDateFilters();
    requestAnimationFrame(function(){
      if(name==='affaires') hardRemoveLegacyAffairesDateFilters();
      el.classList.remove('dcb-rendering-safe');
      el.classList.add('dcb-rendering-ready');
      setTimeout(function(){el.classList.remove('dcb-rendering-ready');},120);
    });
  }

  // Masque uniquement pendant le rendu pour éviter l'image fantôme de l'ancien moteur.
  function wrapRender(fnName,name){
    var old=window[fnName];
    if(typeof old!=='function' || old._dcb002hWrapped) return;
    var wrapped=function(){
      var el=getScreenContent(name);
      if(el) el.classList.add('dcb-rendering-safe');
      var r;
      try{ r=old.apply(this,arguments); }
      finally{ setTimeout(function(){safeReveal(name);},0); }
      return r;
    };
    wrapped._dcb002hWrapped=true;
    window[fnName]=wrapped;
  }

  wrapRender('renderAffaires','affaires');
  wrapRender('renderLivraisons','livraisons');
  wrapRender('renderCommissions','livraisons');

  var oldShow=window.showScreen;
  if(typeof oldShow==='function' && !oldShow._dcb002hWrapped){
    var showWrapped=function(name){
      var el=getScreenContent(name);
      if(el) el.classList.add('dcb-rendering-safe');
      var r=oldShow.apply(this,arguments);
      if(name==='affaires' || name==='livraisons') setTimeout(function(){safeReveal(name);},0);
      return r;
    };
    showWrapped._dcb002hWrapped=true;
    window.showScreen=showWrapped;
  }

<script>
/* ============================================================
   DAF_COMMERCE-Box — BUILD002I

          setTimeout(keepCommissionsVisible,0);
          setTimeout(keepCommissionsVisible,80);
          setTimeout(keepCommissionsVisible,220);
        }
        return r;

})();

<script>

   DAF_COMMERCE-Box — BUILD002J

   2) COMMISSIONS : rendu final sans sursaut, sans ancien showScreen.

(function(){
  'use strict';
  window.DAF_COMMERCEBOX_BUILD='FOUNDATION-B002J-COMMISSIONS-REMINDER-FIX';

  function byId(id){return document.getElementById(id)}
  function qsa(sel,root){return Array.prototype.slice.call((root||document).querySelectorAll(sel))}
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
  function num(v){var n=parseFloat(String(v==null?'':v).replace(',','.').replace(/[^0-9.\-]/g,''));return isNaN(n)?0:n}
  function qty(d){var q=Number(d&&d.qty);return q>0?q:1}
  function norm(s){return String(s||'').trim().toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
  function euro(v){return (Math.round(num(v)*100)/100).toLocaleString('fr-FR')+' €'}
  function dateObj(v){if(!v)return null;var d=new Date(v);return isNaN(d)?null:d}

  function labelMonth(k){var p=String(k||'').split('-');if(p.length<2)return k||'Sans date';var d=new Date(Number(p[0]),Number(p[1])-1,1);return d.toLocaleDateString('fr-FR',{month:'long',year:'numeric'}).replace(/^./,c=>c.toUpperCase())}

  function getDeliveriesFinal(){

    try{var c=JSON.parse(localStorage.getItem('daf_pro_'+((DB&&DB.getBase&&DB.getBase())||'base1')+'_deliveries')||'[]');if(Array.isArray(c))return c}catch(e){}

  }

  function orderCommission(d){
    var q=qty(d);var type=norm((d&&d.type)||'');var vnvo=norm((d&&d.vnvo)||'VN');
    if(vnvo==='VO'||vnvo.indexOf('OCCAS')>=0)return 400*q;
    if(type.indexOf('PORTEUR')>=0)return 550*q;

  function maintenanceCommission(d){
    var q=qty(d);var m=norm((d&&d.maintenance)||'');
    if(!m||m==='NON'||m==='SANS')return 0;
    if(m.indexOf('CARE+')>=0)return 100*q;
    if(m.indexOf('XTRA')>=0)return 100*q;
    if(m.indexOf('FLEX')>=0)return 300*q;
    if(m.indexOf('FULL')>=0)return 300*q;

  }
  function paccarCommission(d){var p=norm((d&&d.paccar)||'');return (p==='OUI'||p==='YES'||p==='1'||p.indexOf('PACCAR')>=0)?300*qty(d):0}
  function primeCommission(d){return num(d&&d.prime)}
  function deliveryCommission(d){return maintenanceCommission(d)+paccarCommission(d)+primeCommission(d)}
  function orderReceived(d){return d&&d.rcvOrder?orderCommission(d):0}
  function deliveryReceived(d){return (d&&d.rcvMaint?maintenanceCommission(d):0)+(d&&d.rcvPaccar?paccarCommission(d):0)+(d&&d.rcvPrime?primeCommission(d):0)}
  function orderRest(d){return Math.max(0,orderCommission(d)-orderReceived(d))}
  function deliveryRest(d){return Math.max(0,deliveryCommission(d)-deliveryReceived(d))}
  function totalEntryAmount(e){return e.kind==='order'?orderCommission(e.d):deliveryCommission(e.d)}
  function receivedEntryAmount(e){return e.kind==='order'?orderReceived(e.d):deliveryReceived(e.d)}

  function buildEntries(rows){

  function matchesFilter(e,f){

      +'<div style="flex:1;min-width:0;">'

      +'<div style="font-size:12px;color:var(--text);margin-top:2px;"><strong style="color:var(--text2);">'+fmt(date)+'</strong> - '+esc(d.client||'Client')+'</div>'
      +'<div style="font-size:10px;color:var(--text3);margin-top:2px;">x'+qty(d)+' '+esc(d.type||'Véhicule')+' - '+prod+'</div>';
    if(!isOrder){
      line+='<div style="font-size:10px;color:var(--text3);margin-top:5px;line-height:1.55;">'
        +'C.E.R : '+euro(maintenanceCommission(d))+' · PACCAR : '+euro(paccarCommission(d))+' · Prime : '+euro(primeCommission(d))+'</div>';
    }
    line+='</div></div></div>';
    return line;
  }

  function renderCommissionsFinal(){
    var cont=byId('livraisons-content');if(!cont)return;
    var rows=getDeliveriesFinal();
    var entries=buildEntries(rows);
    var cm=currentYm();var cy=String(new Date().getFullYear());
    var filter=window.commFilterFinal||'all';
    var qEl=byId('comm-search-sticky');var q=String(qEl?qEl.value:(window.commSearchFinal||'')).toLowerCase().trim();
    var sort=window.commSortFinal||localStorage.getItem('commSortFinal')||'desc';

    var yearTotal=entries.filter(e=>e.month.slice(0,4)===cy).reduce((a,e)=>a+e.amount,0);
    var unpaidPast=entries.filter(e=>matchesFilter(e,'unpaidPast')).reduce(function(a,e){return a+(e.kind==='order'?orderRest(e.d):deliveryRest(e.d));},0);
    var monthTotal=entries.filter(e=>e.month===cm).reduce((a,e)=>a+e.amount,0);
    var visible=entries.filter(e=>matchesFilter(e,filter)&&(!q||searchable(e.d).indexOf(q)>=0));

    var html='<div style="padding:0 12px 4px;"><div style="font-size:10px;color:var(--text3);font-weight:800;letter-spacing:.8px;text-transform:uppercase;">DAF_COMMERCE-Box — Commissions</div></div>';
    function kpi(id,val,lbl,cls){var active=filter===id;return '<div class="kpi-card '+cls+(active?' active':'')+' comm-final-kpi" data-f="'+id+'" style="cursor:pointer;'+(active?'outline:2px solid var(--daf);outline-offset:2px;':'')+'"><div class="kpi-val">'+euro(val)+'</div><div class="kpi-lbl" style="font-size:8px;line-height:1.3;">'+lbl+'</div></div>'}
    html+='<div class="kpi-grid" style="margin:4px 12px 8px;grid-template-columns:repeat(3,1fr);gap:6px;">'

      +kpi('unpaidPast',unpaidPast,'COMMISSIONS NON PERÇUES<br>mois passés','c-red')
      +kpi('monthTotal',monthTotal,'COMMISSIONS TOTALES<br>mois en cours','c-blue')+'</div>';
    html+='<div style="display:flex;gap:6px;align-items:center;padding:0 12px 8px;flex-wrap:wrap;">'
      +'<button class="btn btn-secondary btn-sm comm-final-kpi '+(filter==='all'?'btn-primary':'')+'" data-f="all" style="font-size:10px;">Tous</button>'
      +'<button class="btn btn-secondary btn-sm" id="comm-final-sort" style="font-size:10px;margin-left:auto;">'+(sort==='asc'?'⬆ Plus ancien':'⬇ Plus récent')+'</button></div>';

    var map={};visible.forEach(function(e){(map[e.month]=map[e.month]||[]).push(e)});
    var keys=Object.keys(map).sort();if(sort==='desc')keys.reverse();
    window.commOpenStateFinal=window.commOpenStateFinal||{};

    keys.forEach(function(k){

      var theo=es.reduce((a,e)=>a+totalEntryAmount(e),0), rec=es.reduce((a,e)=>a+receivedEntryAmount(e),0), rest=theo-rec;
      var open=Object.prototype.hasOwnProperty.call(window.commOpenStateFinal,k)?!!window.commOpenStateFinal[k]:(k===cm);
      html+='<div style="margin:0 12px 8px;"><div class="comm-final-month" data-k="'+esc(k)+'" style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg3);border-radius:'+(open?'var(--radius) var(--radius) 0 0':'var(--radius)')+';cursor:pointer;border-left:3px solid '+(rest<=0?'var(--green)':'var(--daf)')+';">'
        +'<div><div style="font-size:13px;font-weight:800;color:var(--text);">'+esc(labelMonth(k))+' '+(open?'▼':'▶')+'</div><div style="font-size:10px;color:var(--text3);margin-top:2px;">'+euro(theo)+' · <span style="color:'+(rest<=0?'var(--green)':'var(--red)')+';">'+euro(rest)+' restant</span>'+(rest<=0?' ✅':'')+'</div></div>'
        +'<div style="font-size:20px;font-weight:900;color:var(--daf);">'+euro(theo)+'</div></div>';
      if(open){
        var orders=es.filter(e=>e.kind==='order'), livs=es.filter(e=>e.kind==='delivery');
        html+='<div style="background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:0 12px;">'
          +'<div style="padding:10px 0 4px;"><div style="font-size:12px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:var(--daf);border-bottom:2px solid var(--daf);padding-bottom:5px;margin-bottom:8px;">COMMANDES</div>';
        if(!orders.length)html+='<div style="font-size:11px;color:var(--text3);padding-bottom:8px;">Aucune commande sur ce mois.</div>';

  function bindCommissionsFinal(){

})();

(function(){

  function euro(v){return (Math.round(num(v)*100)/100).toLocaleString('fr-FR')+' €'}

<script>

   1) Un seul pense-bête projets futurs : suppression du doublon tout en haut.

  'use strict';
