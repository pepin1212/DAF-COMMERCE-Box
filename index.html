<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0c0f">
<link rel="manifest" href="manifest.json">
<title>DAF_COMMERCE-Box</title>
<script src="xlsx.full.min.js" onerror="window._xlsxLoadError=true;"></script>
<style>
:root{--bg:#0a0c0f;--bg2:#111418;--bg3:#1a1e24;--bg4:#222830;--border:#2a3040;--border2:#3a4255;--text:#e8eaf0;--text2:#a0a8b8;--text3:#606880;--daf:#e8a020;--daf2:#f0b840;--daf-bg:rgba(232,160,32,.12);--daf-border:rgba(232,160,32,.3);--blue:#4a90d9;--blue-bg:rgba(74,144,217,.12);--green:#3ab87a;--green-bg:rgba(58,184,122,.12);--red:#e05050;--red-bg:rgba(224,80,80,.12);--orange:#e07830;--orange-bg:rgba(224,120,48,.12);--purple:#8060d0;--purple-bg:rgba(128,96,208,.12);--radius:12px;--radius-sm:8px;--nav-h:68px;--safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,"SF Pro Display","Helvetica Neue",sans-serif;font-size:14px}
#app{width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden}
.screen{display:none;flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(var(--nav-h) + var(--safe-b) + 8px);-webkit-overflow-scrolling:touch}
.screen.active{display:block}
#nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-b));background:rgba(10,12,15,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:8px;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:0 2px;cursor:pointer;transition:all .2s}
.nav-icon{font-size:22px;line-height:1}
.nav-label{font-size:9px;font-weight:600;letter-spacing:.3px;color:var(--text3);text-transform:uppercase}
.nav-item.active .nav-label{color:var(--daf)}
.nav-item.active .nav-icon{transform:translateY(-1px)}
.screen-header{padding:10px 14px 6px;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--border)}
.screen-title{font-size:19px;font-weight:700;display:flex;align-items:center;gap:7px}
.screen-sub{font-size:10px;color:var(--text3);margin-top:1px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 13px;margin:0 12px 9px}
.card-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:8px}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:0 12px 9px}
.kpi-grid-3{grid-template-columns:1fr 1fr 1fr}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 9px;cursor:pointer;transition:all .15s}
.kpi-card:active{transform:scale(.97)}
.kpi-card.active{border-color:var(--daf);background:var(--daf-bg)}
.kpi-val{font-size:22px;font-weight:800;line-height:1;color:var(--text)}
.kpi-lbl{font-size:9px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
.kpi-card.c-daf .kpi-val{color:var(--daf)}.kpi-card.c-green .kpi-val{color:var(--green)}.kpi-card.c-blue .kpi-val{color:var(--blue)}.kpi-card.c-red .kpi-val{color:var(--red)}.kpi-card.c-orange .kpi-val{color:var(--orange)}.kpi-card.c-purple .kpi-val{color:var(--purple)}
.badge{display:inline-flex;align-items:center;padding:2px 6px;border-radius:20px;font-size:8px;font-weight:800;letter-spacing:.4px;text-transform:uppercase}
.b-daf{background:var(--daf-bg);color:var(--daf);border:1px solid var(--daf-border)}
.b-flotte{background:rgba(255,230,0,.22);color:#ffe600;border:1px solid rgba(255,230,0,.7)}
.b-conc{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(74,144,217,.3)}
.b-urgent{background:var(--red-bg);color:var(--red);border:1px solid rgba(224,80,80,.3)}
.b-projet{background:var(--green-bg);color:var(--green);border:1px solid rgba(58,184,122,.3)}
.client-row{display:flex;align-items:center;padding:10px 13px;background:var(--bg2);border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.client-row:active{background:var(--bg3)}
.c-info{flex:1;min-width:0}
.c-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-sub{font-size:10px;color:var(--text3);margin-top:1px}
.c-badges{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.c-score{display:flex;flex-direction:column;align-items:flex-end;min-width:40px}
.score-val{font-size:17px;font-weight:800;color:var(--daf)}
.score-lbl{font-size:8px;color:var(--text3)}
.sec-hdr{padding:8px 13px;background:var(--bg3);border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.sec-hdr-title{font-size:13px;font-weight:700}
.sec-chevron{font-size:10px;color:var(--text3);transition:transform .2s}
.sec-open .sec-chevron{transform:rotate(90deg)}
.subsec-hdr{padding:6px 13px 6px 22px;background:var(--bg2);border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:9px 13px;margin:7px 12px}
.search-bar input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:15px}
.search-bar input::placeholder{color:var(--text3)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:9px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;border:none;cursor:pointer;transition:all .15s;gap:5px}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--daf);color:#000}.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-green{background:var(--green);color:#fff}.btn-red{background:var(--red);color:#fff}.btn-blue{background:var(--blue);color:#fff}.btn-orange{background:var(--orange);color:#fff}
.btn-sm{padding:5px 10px;font-size:11px}
input[type=file]{display:none}
.file-zone{border:2px dashed var(--border2);border-radius:var(--radius);padding:16px;text-align:center;margin:0 0 8px;cursor:pointer;transition:all .2s}
.file-zone:active{border-color:var(--daf);background:var(--daf-bg)}
.fz-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:2px}
.fz-sub{font-size:10px;color:var(--text3)}
#sheet-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200}
#sheet-ov.open{display:block}
#sheet{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-radius:20px 20px 0 0;z-index:201;max-height:93vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
#sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 0}
.sheet-hdr{padding:11px 14px 9px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.sheet-title{font-size:16px;font-weight:700}
.sheet-close{width:27px;height:27px;border-radius:50%;background:var(--bg3);border:none;color:var(--text2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sheet-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 calc(var(--safe-b) + 10px)}
#modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;align-items:center;justify-content:center;padding:18px}
#modal-ov.open{display:flex}
#modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:360px;max-height:84vh;display:flex;flex-direction:column}
.modal-hdr{padding:13px 15px;border-bottom:1px solid var(--border)}
.modal-title{font-size:15px;font-weight:700}
.modal-body{flex:1;overflow-y:auto;padding:13px 15px}
.modal-foot{padding:10px 13px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.form-group{margin-bottom:11px}
.form-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:4px;display:block}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text);font-size:14px;outline:none}
.form-input:focus{border-color:var(--daf)}
.form-textarea{resize:vertical;min-height:66px}
#toast{position:fixed;top:max(16px,calc(var(--safe-t)+10px));left:50%;transform:translateX(-50%) translateY(-100px);background:var(--bg4);border:1px solid var(--border2);color:var(--text);padding:8px 16px;border-radius:20px;font-size:12px;font-weight:600;z-index:999;transition:transform .28s;white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
.v-row{padding:8px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.v-info{flex:1;min-width:0}
.v-plaque{font-size:11px;font-weight:700;font-family:"Courier New",monospace;color:var(--text)}
.v-detail{font-size:9px;color:var(--text3);margin-top:1px}
.poss-btn{padding:3px 8px;border-radius:20px;font-size:8px;font-weight:800;border:none;cursor:pointer}
.p-oui{background:var(--green-bg);color:var(--green);border:1px solid rgba(58,184,122,.4)}
.p-non{background:var(--red-bg);color:var(--red);border:1px solid rgba(224,80,80,.4)}
.proj-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin:0 12px 7px;cursor:pointer;transition:background .15s}
.proj-card:active{background:var(--bg3)}
.proj-status{font-size:9px;font-weight:800;padding:2px 6px;border-radius:10px;display:inline-block;margin-bottom:4px;text-transform:uppercase}
.s-encours{background:var(--blue-bg);color:var(--blue)}.s-futur{background:var(--purple-bg);color:var(--purple)}.s-gagne{background:var(--green-bg);color:var(--green)}.s-perdu{background:var(--red-bg);color:var(--red)}.s-reporte{background:var(--orange-bg);color:var(--orange)}
.diag-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.diag-lbl{font-size:11px;color:var(--text2)}
.diag-val{font-size:11px;font-weight:700}
.d-ok{color:var(--green)}.d-warn{color:var(--orange)}.d-err{color:var(--red)}
.filter-row{display:flex;gap:5px;overflow-x:auto;padding:5px 12px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.fpill{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);white-space:nowrap;cursor:pointer;transition:all .15s}
.fpill.active{background:var(--daf-bg);border-color:var(--daf);color:var(--daf)}
.mkt-row{padding:6px 0}.mkt-brand{display:flex;justify-content:space-between;margin-bottom:3px}.mkt-name{font-size:11px;font-weight:600;color:var(--text2)}.mkt-count{font-size:11px;font-weight:700}
.mkt-bar-wrap{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.mkt-bar{height:100%;border-radius:3px;transition:width .4s}
.rank-row{display:flex;align-items:center;padding:8px 13px;border-bottom:1px solid var(--border);gap:8px;cursor:pointer}
.rank-row:active{background:var(--bg3)}
.rank-num{font-size:12px;font-weight:800;color:var(--text3);width:18px}
.rank-info{flex:1;min-width:0}
.rank-bar-wrap{height:3px;background:var(--bg3);border-radius:2px;margin-top:2px;overflow:hidden}
.rank-bar{height:100%;border-radius:2px}
.hist-row{padding:8px 13px;border-bottom:1px solid var(--border);position:relative}
.hist-date{font-size:9px;color:var(--text3);margin-bottom:1px}
.hist-text{font-size:11px;color:var(--text2)}
.hist-del{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--red-bg);color:var(--red);border:none;border-radius:50%;width:20px;height:20px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pdm-circle{display:flex;flex-direction:column;align-items:center;justify-content:center;width:84px;height:84px;border-radius:50%;border:4px solid var(--daf);margin:0 auto 10px}
.pdm-pct{font-size:20px;font-weight:800;color:var(--daf)}
.pdm-lbl{font-size:8px;color:var(--text3);font-weight:600;text-transform:uppercase}
.empty-state{text-align:center;padding:46px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:9px}
.empty-title{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:4px}
.obj-bar-wrap{margin:6px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:9px 11px}
.obj-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.obj-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3)}
.obj-pct{font-size:12px;font-weight:800;color:var(--daf)}
.obj-track{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;position:relative}
.obj-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--daf),var(--daf2));transition:width .5s}
.obj-target-line{position:absolute;top:0;bottom:0;width:2px;background:rgba(255,255,255,.3);left:15%}
.gf-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 12px;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;align-items:center;flex-shrink:0}
.gf-bar::-webkit-scrollbar{display:none}
.gf-chip{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:9px;font-weight:700;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);white-space:nowrap;cursor:pointer;transition:all .15s}
.gf-chip.on{background:var(--daf-bg);border-color:var(--daf);color:var(--daf)}
.gf-chip.disabled{opacity:.4;pointer-events:none}
.save-bar{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--text3);padding:3px 0}
.save-dot{width:5px;height:5px;border-radius:50%;background:var(--text3)}
.save-dot.ok{background:var(--green)}.save-dot.warn{background:var(--orange)}.save-dot.err{background:var(--red)}
.toggle{position:relative;width:40px;height:23px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.tgl-sl{position:absolute;inset:0;background:var(--bg3);border-radius:12px;border:1px solid var(--border);cursor:pointer;transition:.2s}
.tgl-sl:before{content:"";position:absolute;width:17px;height:17px;left:2px;top:2px;background:var(--text3);border-radius:50%;transition:.2s}
.toggle input:checked+.tgl-sl{background:var(--daf);border-color:var(--daf)}
.toggle input:checked+.tgl-sl:before{transform:translateX(17px);background:#000}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0}
.toggle-lbl{font-size:12px;color:var(--text2)}
.sep{height:1px;background:var(--border);margin:5px 0}
.daf-logo{font-size:11px;font-weight:900;letter-spacing:2px;color:var(--daf)}
.base-item{display:flex;align-items:center;padding:10px 13px;border-bottom:1px solid var(--border);gap:8px;cursor:pointer}
.base-dot{width:8px;height:8px;border-radius:50%}
.base-dot.on{background:var(--daf)}.base-dot.off{background:var(--text3)}
.xlsx-missing{background:var(--red-bg);border:1px solid rgba(224,80,80,.3);border-radius:var(--radius);padding:12px;margin:0 12px 9px}
.ville-counts{display:flex;gap:6px;padding:2px 0 4px 22px;font-size:8px;color:var(--text3)}
.vc-item{display:flex;align-items:center;gap:2px}
#nav-save-btn .nav-icon{transition:transform .2s}
#nav-save-btn:active .nav-icon{transform:scale(.85)}
@keyframes pulse-save{0%,100%{opacity:1}50%{opacity:.4}}
.nav-save-pulse{animation:pulse-save 1.2s ease-in-out infinite}
.gf-btn{display:inline-flex;align-items:center;padding:4px 9px;border-radius:20px;font-size:9px;font-weight:700;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);white-space:nowrap;cursor:pointer;transition:all .15s}
.gf-btn.gf-on{background:var(--daf-bg);border-color:var(--daf);color:var(--daf)}
.gf-chip-opt{display:inline-flex;align-items:center;padding:3px 8px;border-radius:12px;font-size:9px;font-weight:600;border:1px solid var(--border);background:var(--bg3);color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap}
.gf-chip-opt.on{background:var(--daf-bg);border-color:var(--daf);color:var(--daf)}
.gf-sel{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text2);cursor:pointer;transition:all .15s;appearance:none;-webkit-appearance:none;}
.gf-sel-active{background:var(--daf-bg);border-color:var(--daf);color:var(--daf);}
.gf-sel option{background:var(--bg3);color:var(--text);}
</style>
<!-- HTML BODY -->
<body>
<div id="app">
<div class="screen active" id="screen-marche">
  <div class="screen-header">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div><div class="screen-title"><span class="daf-logo">DAF</span> CommerceBox</div><div class="screen-sub" id="marche-sub">Chargez vos fichiers Excel</div></div>
      <div style="display:flex;gap:6px;align-items:center;">
        <div class="save-bar"><div class="save-dot" id="save-dot"></div><span id="save-lbl">—</span></div>
        <button class="btn btn-secondary btn-sm" id="btn-base-hdr">🗂 <span id="base-name-hdr">Base 1</span></button>
      </div>
    </div>
  </div>
  <div id="marche-content" style="padding-top:6px;"></div>
</div>

<div class="screen" id="screen-tours">
  <div class="screen-header">
    <div class="screen-title">🗺 Tournées</div>
  </div>
  <div class="search-bar"><span>🔍</span><input type="text" id="tours-search" placeholder="Client, ville, canton, vendeur…"></div>
  <div class="filter-row" id="tours-fpills" style="position:sticky;top:0;z-index:10;background:var(--bg2);">
    <div class="fpill active" data-f="all">Tous</div>
    <div class="fpill" data-f="daf_with">Avec DAF</div>
    <div class="fpill" data-f="no_daf">Sans DAF</div>
    <div class="fpill" data-f="urgent">Urgents</div>
    <div class="fpill" data-f="flotte">Flotte</div>
  </div>
  <div id="tours-mask-bar" style="display:flex;align-items:center;flex-wrap:wrap;gap:5px;padding:6px 12px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:40px;z-index:200;overflow:visible;">
    <button class="gf-chip" id="btn-mask-exclus">Exclus ON</button>
    <button class="gf-chip" id="btn-mask-inactifs">Inactifs ON</button>
    <button class="gf-chip" id="btn-mask-flotte-nat">Flotte Nat. ON</button>
    <button class="gf-chip" id="btn-mask-projets">Projets ON</button>
    <button class="gf-chip" id="btn-mask-sites-sec">Sites sec. ON</button>
    <select class="form-input" id="tours-sort-sel" style="font-size:10px;padding:4px 7px;min-width:110px;">
      <option value="score">Score &#9660;</option>
      <option value="parc_desc">Parc total &#9660;</option>
      <option value="parc_asc">Parc total &#9650;</option>
      <option value="nom_asc">Nom A&#8594;Z</option>
      <option value="renew_desc">Renouvellement &#9660;</option>
    </select>
    <div style="display:flex;gap:5px;margin-left:auto;">
      <button class="btn btn-secondary btn-sm" id="btn-expand">Ouvrir</button>
      <button class="btn btn-secondary btn-sm" id="btn-collapse">Fermer</button>
      <button class="btn btn-ghost btn-sm" id="btn-tours-reset">Tous</button>
    </div>
  </div>
  <div id="tours-counters" class="kpi-grid" style="margin-bottom:3px;"></div>
  <div id="tours-list"></div>
</div>

<div class="screen" id="screen-projets">
  <div class="screen-header"><div class="screen-title">📋 Projets</div></div>
  <div id="projets-content" style="padding-top:6px;"></div>
</div>

<div class="screen" id="screen-affaires">

// ===== DEBOUNCE =====
function debounce(fn, ms) {
  var _dt; return function() { var _da=arguments; clearTimeout(_dt); _dt=setTimeout(function(){fn.apply(null,_da);}, ms); };
}

// ===== UTILS =====
var $ = function(id){return document.getElementById(id);};
var QA = function(s){return document.querySelectorAll(s);};
function safeOn(id,evt,fn){var el=typeof id==='string'?document.getElementById(id):id;if(el)el.addEventListener(evt,fn);}
function toast(msg, dur) { if(dur===undefined)dur=2400;
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),dur);
}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(d){if(!d)return '—';const dt=new Date(d);if(isNaN(dt))return String(d);return dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});}
function getYear(d){if(!d)return null;const y=typeof d==='number'?new Date(Math.round((d-25569)*86400000)).getFullYear():new Date(d).getFullYear();return isNaN(y)?null:y;}
function parseDate(d){
  if(!d)return null;
  if(typeof d==='number'){return new Date(Math.round((d-25569)*86400000)).toISOString().split('T')[0];}
  let s=String(d).trim();
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)){var _dparts=s.split('/');return _dparts[2]+'-'+_dparts[1]+'-'+_dparts[0];}
  if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.split('T')[0];
  if(/^\d{2}-\d{2}-\d{4}$/.test(s)){var _dparts2=s.split('-');return _dparts2[2]+'-'+_dparts2[1]+'-'+_dparts2[0];}
  const dt=new Date(s); return isNaN(dt)?null:dt.toISOString().split('T')[0];
}
function norm(s){return String(s||'').trim().toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
// Normalise un SIRET : supprime espaces, tirets, points, gere notation scientifique Excel
function normSiret(s){
  if(!s&&s!==0)return '';
  var str=String(s).trim();
  if(/^[\d.]+[eE][+\-]?\d+$/.test(str)){try{str=Number(str).toFixed(0);}catch(e){}}
  str=str.replace(/\.0+$/,'');
  str=str.replace(/[\s\.\-]/g,'');
  if(/^\d+$/.test(str)&&str.length<14){str=str.padStart(14,'0');}
  return str;
}

// ===== COLUMN MAPPING =====
function findCol(headers, keys) {
  const hn = headers.map(h=>norm(h));
  // Passe 1 : correspondance exacte
  for(var _foi=0;_foi<keys.length;_foi++){
    const kn=norm(keys[_foi]);
    const idx=hn.findIndex(h=>h===kn);
    if(idx>=0)return idx;
  }
  // Passe 2 : l'en-tête contient la clé (pas l'inverse)
  for(var _foi2=0;_foi2<keys.length;_foi2++){
    const kn=norm(keys[_foi2]);
    if(kn.length<3)continue;
    const idx=hn.findIndex(h=>h.includes(kn));
    if(idx>=0)return idx;
  }
  return -1;
}

function mapClientRow(row, headers) {
  var f=function(keys,def){if(def===undefined)def='';var i=findCol(headers,keys);return i>=0?String(row[i]||'').trim():def;};
  const tva=f(['N° TVA','TVA','CLIENT/N° TVA','NTVA','NUM TVA']);
  const siren=f(['SIREN']);
  const siret=normSiret(f(['SIRET']));
  const ville=f(['VILLE','COMMUNE','CITY']);
  const key = siret?`${tva}|${siret}`:siren&&ville?`${tva}|${siren}|${ville}`:ville?`${tva}|${ville}`:tva;
  var profilDirect=f(['PROFIL_COMMERCIAL','PROFIL COMMERCIAL','PROFIL COMMERCIAL CLIENT','PROFIL COMMERCIAL ACTUEL','PROFIL CLIENT','PROFIL_CLIENT','TYPE CLIENT','TYPE_CLIENT','SEGMENT','SEGMENT CLIENT','CATEGORIE','CATÉGORIE','CATEGORIE CLIENT','CATÉGORIE CLIENT','CLASSEMENT','FAMILLE CLIENT','FLOTTE','TYPE FLOTTE','STATUT FLOTTE','PROFIL']);
  // Sécurité import : si le nom de colonne n'est pas reconnu, on récupère quand même
  // une valeur de ligne qui contient clairement FLOTTE / REGIONALE / COORDONNEE / NATIONALE.
  var profilAuto='';
  if(!profilDirect){
    for(var _pri=0;_pri<row.length;_pri++){
      var _pv=String(row[_pri]||'').trim();
      if(/flotte|r[eé]gionale|r[eé]gio|coordonn[eé]e|coord|nationale|nat/i.test(_pv)){profilAuto=_pv;break;}
    }
  }
  var profilFinal=profilDirect||profilAuto;
  return {
    tva, key,
    nom:f(['NOM','CLIENT','RAISON SOCIALE','RAISON_SOCIALE','ENTREPRISE','NAME']),
    ville,
    canton:f(['CANTON','SECTEUR','ZONE']),
    accessible:f(['ACCESSIBLE','ACCESS']),
    profil:profilFinal,
    priorite:f(['PRIORITE_FORCEE','PRIORITE FORCEE','PRIORITE']),
    exclu:f(['EXCLU_MANU','EXCLU_MANUEL','EXCLU']),
    vendeur:f(['VENDEUR','COMMERCIAL','NOM VENDEUR','NOM DU VENDEUR']),
    pays:f(['PAYS','COUNTRY']),
    dept:f(['DEPARTEMENT','DÉPARTEMENT','DEPT','CODE DEPARTEMENT','CODE DÉPARTEMENT']),
    siren, siret,
    adresse:f(['RUE','ADRESSE','ADRESSE CLIENT','ADRESSE SITE','ADRESSE ETABLISSEMENT']),
    groupement:f(['GROUPEMENT','GROUPEMENT CLIENT','GROUPMENT','GROUPE CLIENT','GROUPE']),
    etatProspection:f(['ETAT PROSPECTION','ÉTAT PROSPECTION','ETAT_PROSPECTION','STATUT PROSPECTION','STATUT_PROSPECTION','PROSPECTION']),
  };
}

function mapVehicleRow(row, headers) {
  var f=function(keys,def){if(def===undefined)def='';var i=findCol(headers,keys);return i>=0?String(row[i]||'').trim():def;};
  const raw=findCol(headers,['DATE D\'IMMATRICULATION','DATE IMMATRICULATION','DATE','DATE_IMMAT']);
  const rawVal=raw>=0?row[raw]:null;

    marque:f(['MARQUE','BRAND','MAKE']),

}

// ===== EXCEL PARSE =====
function _neededAliasesForImport(){
  return [
    'N° TVA','TVA','CLIENT/N° TVA','NTVA','NUM TVA','SIREN','SIRET','VILLE','COMMUNE','CITY','CANTON','SECTEUR','ZONE','ACCESSIBLE','ACCESS','PROFIL_COMMERCIAL','PROFIL COMMERCIAL','PROFIL','PRIORITE_FORCEE','PRIORITE FORCEE','PRIORITE','EXCLU_MANU','EXCLU_MANUEL','EXCLU','VENDEUR','COMMERCIAL','NOM VENDEUR','NOM DU VENDEUR','PAYS','COUNTRY','DEPARTEMENT','DÉPARTEMENT','DEPT','CODE DEPARTEMENT','CODE DÉPARTEMENT','RUE','ADRESSE','ADRESSE CLIENT','ADRESSE SITE','ADRESSE ETABLISSEMENT','NOM','CLIENT','RAISON SOCIALE','RAISON_SOCIALE','ENTREPRISE','NAME','GROUPEMENT','ETAT PROSPECTION','ÉTAT PROSPECTION',
    'DATE D\'IMMATRICULATION','DATE IMMATRICULATION','DATE','DATE_IMMAT','PLAQUE D\'IMMATRICULATION','PLAQUE IMMATRICULATION','PLAQUE','TYPE CHASSIS','TYPE CHÂSSIS','TYPE VEHICULE','TYPE VÉHICULE','TYPE','MARQUE','BRAND','MAKE','CARROSSERIE','BODY','MODÈLE','MODELE','MODEL','NUMÉRO DE CHÂSSIS','NUMERO DE CHASSIS','NUM CHASSIS'
  ];
}
function _compactSheet(ws){
  var ref=ws['!ref']; if(!ref)return [[]];
  var range=XLSX.utils.decode_range(ref);
  var rawHeaders=[];
  for(var c=range.s.c;c<=range.e.c;c++){
    var cell=ws[XLSX.utils.encode_cell({r:range.s.r,c:c})];
    rawHeaders.push(cell?String(cell.v||'').trim():'');
  }
  var aliases=_neededAliasesForImport().map(function(x){return norm(x);});
  var keep=[];
  rawHeaders.forEach(function(h,i){
    if(!h)return;
    var nh=norm(h);
    if(aliases.some(function(a){return nh===a||nh.indexOf(a)>=0||a.indexOf(nh)>=0;})) keep.push(i);
  });
  if(!keep.length){keep=rawHeaders.map(function(_,i){return i;}).filter(function(i){return rawHeaders[i];});}
  var headers=keep.map(function(i){return rawHeaders[i];});
  var out=[headers];
  for(var r=range.s.r+1;r<=range.e.r;r++){
    var row=[], has=false;
    for(var k=0;k<keep.length;k++){
      var cell=ws[XLSX.utils.encode_cell({r:r,c:keep[k]})];
      var v=cell?cell.v:'';
      if(v!==''&&v!==null&&v!==undefined)has=true;
      row.push(v===undefined||v===null?'':v);
    }
    if(has)out.push(row);
    if(out.length%2500===0 && typeof console!=='undefined') console.log('Import compact',out.length,'lignes');
  }
  return out;
}
// ===== EXCEL PARSE optimisé iPhone =====
function parseExcel(file){
  return new Promise((resolve,reject)=>{
    if(typeof XLSX==='undefined'){reject(new Error('xlsx.full.min.js non chargé'));return;}
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array',cellDates:false,dense:false,cellStyles:false,cellNF:false,cellHTML:false});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const data=_compactSheet(ws);
        resolve(data);
      }catch(err){reject(err);}
    };
    reader.onerror=reject;
    reader.readAsArrayBuffer(file);
  });
}

function importCRM(data){
  if(!data||data.length<2)return{clients:[],cols:[],stats:{}};
  const headers=data[0].map(h=>String(h||'').trim());
  const rows=data.slice(1).filter(r=>r.some(c=>c!==''));
  const raw=rows.map(r=>mapClientRow(r,headers)).filter(c=>c.tva);
  const seen=new Set(); const dups=[];
  const unique=raw.filter(c=>{
    if(seen.has(c.key)){dups.push(c.key);return false;}
    seen.add(c.key);return true;
  });
  const sansTva=raw.filter(c=>!c.tva).length;
  const sansNom=unique.filter(c=>!c.nom).length;
  const sansVille=unique.filter(c=>!c.ville).length;
  const sansCanton=unique.filter(c=>!c.canton).length;
  return{clients:unique,cols:headers.filter(Boolean),stats:{total:rows.length,reconnus:unique.length,sansTva,sansNom,sansVille,sansCanton,dups:dups.length}};
}

function importVehicles(data, possession){
  if(!data||data.length<2)return{vehicles:[],cols:[],stats:{}};
  const headers=data[0].map(h=>String(h||'').trim());
  const rows=data.slice(1).filter(r=>r.some(c=>c!==''));
  const raw=rows.map(r=>mapVehicleRow(r,headers)).filter(v=>v.tva);
  const seen=new Set(); const dups=[];
  const unique=raw.filter(v=>{
    const k=`${v.tva}|${v.plaque}|${norm(v.marque)}|${v.date}|${norm(v.type)}`;
    if(seen.has(k)){dups.push(k);return false;}
    seen.add(k);return true;
  });
  // Restore possession
  if(possession){
    unique.forEach(v=>{
      const vk=`${v.tva}|${v.plaque}`;
      if(possession[vk]===false)v.possession=false;
    });
  }
  const sansTva=raw.filter(v=>!v.tva).length;
  const sansDate=unique.filter(v=>!v.date).length;
  const sansPlaque=unique.filter(v=>!v.plaque).length;
  const sansType=unique.filter(v=>!v.type).length;
  const sansMarque=unique.filter(v=>!v.marque).length;
  return{vehicles:unique,cols:headers.filter(Boolean),stats:{total:rows.length,reconnus:unique.length,sansTva,sansDate,sansPlaque,sansType,sansMarque,dups:dups.length}};
}

// ===== INDEX BUILDING =====
let IDX = {vByTva:{}, vBySite:{}, sitesByTva:{}, pByTva:{}, pBySite:{}, cByTva:{}, cByKey:{}, cBySite:{}};

// Memoization cache
var _statsCache = {};
var _filteredCache = null;
var _filteredCacheKey = '';

function invalidateCache(){_statsCache={};_filteredCache=null;_filteredCacheKey='';}

function getStatsCached(tva,sk){
  var key=sk||tva;
  if(_statsCache[key])return _statsCache[key];
  const s=getStats(tva,sk);_statsCache[key]=s;return s;
}

function buildIndex(){
  invalidateCache();
  const clients=DB.getClients();
  const vehicles=DB.getVehicles();
  const projects=DB.getProjects();
  const possession=DB.getPossession();

  // === INDEX CLIENTS ===
  IDX.cBySiret={};
  IDX.cByTva={};
  IDX.cByKey={};
  IDX.sitesByTva={};
  IDX.cBySite={};
  clients.forEach(function(c){
    var sk=makeSiteKey(c);
    c._siteKey=sk;
    IDX.cByKey[c.key]=c;
    // cByTva : dernier site pour cette TVA (utilisé pour lookups ponctuels)
    IDX.cByTva[c.tva]=c;
    if(c.siret)IDX.cBySiret[normSiret(c.siret)]=c;
    if(!IDX.sitesByTva[c.tva])IDX.sitesByTva[c.tva]=[];
    IDX.sitesByTva[c.tva].push(c);
    IDX.cBySite[sk]=c;
  });

  // === INDEX VÉHICULES — UNIQUEMENT PAR SIRET ===
  // vBySite[sk] = véhicules du site exact (TVA+SIRET)
  // vByTva[tva] = union de tous les sites pour cette TVA (Marché uniquement)
  IDX.vBySiret={};
  IDX.vBySite={};
  IDX.vByTva={};
  vehicles.forEach(function(v){
    const vk=`${v.tva}|${v.plaque}`;
    if(possession[vk]===false)v.possession=false;
    else delete v.possession;
    var _vsiret=normSiret(v.siret);
    if(!_vsiret)return; // orphelin sans SIRET
    var clientS=IDX.cBySiret[_vsiret];
    if(!clientS)return; // orphelin SIRET inconnu
    // Index par SIRET brut
    if(!IDX.vBySiret[_vsiret])IDX.vBySiret[_vsiret]=[];
    IDX.vBySiret[_vsiret].push(v);
    // Index par site exact (TVA+SIRET) — source de vérité pour tous les calculs
    var sk=clientS._siteKey||makeSiteKey(clientS);
    if(!IDX.vBySite[sk])IDX.vBySite[sk]=[];
    IDX.vBySite[sk].push(v);
    // Index par TVA (union multi-sites) — pour Marché uniquement
    if(!IDX.vByTva[clientS.tva])IDX.vByTva[clientS.tva]=[];
    IDX.vByTva[clientS.tva].push(v);
  });
}

// ===== BUSINESS LOGIC =====
// ===== DAF_COMMERCE-Box — normalisation marché unique =====
// Tous les calculs Marché doivent utiliser cette famille de marque.
// Objectif : KPI, graphiques, matrices et exports parlent le même langage.
function marketBrand(v){
  var raw = String((v && v.marque) || 'Inconnu').trim();
  var n = norm(raw).replace(/[\._\-\/]+/g,' ').replace(/\s+/g,' ').trim();
  if(!n)return 'Inconnu';
  if(n==='DAF' || n==='DAF TRUCKS' || n.indexOf('DAF')>=0)return 'DAF';
  if(n.indexOf('MERCEDES')>=0 || n.indexOf('BENZ')>=0)return 'MERCEDES';
  if(n.indexOf('RENAULT')>=0)return 'RENAULT';
  if(n.indexOf('VOLVO')>=0)return 'VOLVO';
  if(n.indexOf('SCANIA')>=0)return 'SCANIA';
  if(n==='MAN' || n.indexOf(' MAN ')>=0 || n.indexOf('MAN TRUCK')>=0)return 'MAN';
  if(n.indexOf('IVECO')>=0)return 'IVECO';
  if(n.indexOf('FORD')>=0)return 'FORD';
  return raw.toUpperCase();
}
function marketYearKey(v){
  var y=getYear(v&&v.date);
  return y || 'Date ?';
}
function marketYearSort(a,b){
  if(a==='Date ?')return 1;
  if(b==='Date ?')return -1;
  return Number(a)-Number(b);
}
function isDaf(v){
  return marketBrand(v)==='DAF';
}
function vehicleTypeCategory(v){
  var txt=norm(((v&&v.type)||'')+' '+((v&&v.carrosserie)||''));
  if(/TRACT|SEMI|CABINE|TETE|TÊTE/.test(txt))return 'tracteur';
  if(/PORTEUR|FOURGON|BENNE|FRIGO|PLATEAU|CITERNE|AMPLIROLL|BRAS|REMORQUEUR/.test(txt))return 'porteur';
  return 'verifier';
}
function isTracteur(v){return vehicleTypeCategory(v)==='tracteur';}
function isPorteur(v){return vehicleTypeCategory(v)==='porteur';}
function isTypeVerifier(v){return vehicleTypeCategory(v)==='verifier';}
function profilNorm(c){
  return norm((c&&c.profil)||'')
    .replace(/[\._\-\/]+/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}
function hasWord(txt, words){
  txt=' '+norm(txt).replace(/[\._\-\/]+/g,' ').replace(/\s+/g,' ').trim()+' ';
  return words.some(function(w){return txt.indexOf(' '+norm(w)+' ')>=0;});
}
function isFlotteProfile(c){
  var p=profilNorm(c);
  // Détection volontairement robuste : certains fichiers importés indiquent
  // seulement "REGIONALE", "COORDONNEE" ou "NATIONALE" sans le mot FLOTTE.
  return /(^| )FLOTTES?( |$)/.test(p)
    || /(^| )REGIONALES?( |$)/.test(p) || /(^| )REGIO( |$)/.test(p)
    || /(^| )COORDONNEES?( |$)/.test(p) || /(^| )COORD( |$)/.test(p)
    || /(^| )NATIONALES?( |$)/.test(p) || /(^| )NAT( |$)/.test(p);
}
function isFlotteNationale(c){
  var p=profilNorm(c);
  // Flotte nationale : accepte "FLOTTE NATIONALE", "NATIONALE COORDONNEE", "NAT".
  return /(^| )NATIONALES?( |$)/.test(p)||/(^| )NAT( |$)/.test(p);
}
function isFlotteRegionale(c){
  var p=profilNorm(c);
  return /(^| )REGIONALES?( |$)/.test(p)||/(^| )REGIO( |$)/.test(p)||/(^| )REG( |$)/.test(p);
}
function isFlotteCoordonnee(c){
  var p=profilNorm(c);
  return /(^| )COORDONNEES?( |$)/.test(p)||/(^| )COORD( |$)/.test(p);
}
function isFlotteBadge(c){
  return isFlotteProfile(c);
}
function getExclusionRec(tva){return DB.getExclusions()[tva]||{};}
function isClientExcluded(c){
  var ex=getExclusionRec(c.tva);
  if(ex.manual)return ex.excluded===true;
  var acc=c.accessible;
  if(acc=='0'||acc===0||String(acc).toUpperCase()==='NON'||acc===false)return true;
  if(norm(c.exclu||'')==='OUI')return true;
  return false;
}
function isClientUrgent(c){
  var ex=getExclusionRec(c.tva);
  if(ex.manualUrgent)return ex.urgent===true;
  var p=String(c.priorite||'').trim();
  return p!==''&&p!=='0'&&p.toUpperCase()!=='NON';
}
function isVehicleRenewableCore(v){
  const y=getYear(v.date); if(!y)return false;
  if(isTracteur(v))return y>=YEAR-6&&y<=YEAR-4;
  if(isPorteur(v))return y>=YEAR-7&&y<=YEAR-5;
  return false;
}
function isInactiveClient(tva,sk){
  var veh=_getSiteVeh(tva,sk).filter(function(v){return v.possession!==false&&matchesMarcheVehicle(v);});
  if(!veh.length)return true;
  var hasRecent=veh.some(function(v){return getYear(v.date)>=YEAR-4;});
  var hasRenewable=veh.some(isVehicleRenewableCore);
  return !hasRecent && !hasRenewable;
}

// Règles MARCHÉ : marché total = toutes les immatriculations, même non possédées.
function isInactiveClientMarche(tva,sk){
  var veh=_getSiteVeh(tva,sk).filter(function(v){return v.possession!==false;});
  if(!veh.length)return true;
  var hasRecent=veh.some(function(v){return getYear(v.date)>=YEAR-4;});
  var hasRenewable=veh.some(isVehicleRenewableCore);
  return !hasRecent && !hasRenewable;
}
function matchesMarcheVehicle(v){
  if(GF.marcheTypeFilter==='tracteur'&&!isTracteur(v))return false;
  if(GF.marcheTypeFilter==='porteur'&&!isPorteur(v))return false;
  // Récupérer le client via SIRET uniquement
  var clientObj=v.siret&&IDX.cBySiret?IDX.cBySiret[v.siret]:null;
  // Filtre vendeurs multi-sélection
  if(GF.vendeursMarche&&GF.vendeursMarche.length){
    var vVendeur=clientObj?clientObj.vendeur:(v.vendeur||'');
    if(!GF.vendeursMarche.some(function(vd){return norm(vVendeur)===norm(vd);}))return false;
  }
  if(GF.exclExclusionMarche){
    if(clientObj&&isClientExcluded(clientObj))return false;
    if(clientObj&&isInactiveClientMarche(clientObj.tva,clientObj._siteKey||makeSiteKey(clientObj)))return false;
  }
  if(GF.exclFlotteNationaleMarche&&clientObj&&isFlotteNationale(clientObj))return false;
  return true;
}
// isInactiveClientTours : version Tournées sans les exclusions Marché
function isInactiveClientTours(tva,sk){
  var veh=_getSiteVeh(tva,sk).filter(function(v){return v.possession!==false&&matchesToursVehicle(v);});
  if(!veh.length)return true;
  var hasRecent=veh.some(function(v){return getYear(v.date)>=YEAR-4;});
  var hasRenewable=veh.some(isVehicleRenewableCore);
  return !hasRecent && !hasRenewable;
}
// matchesToursVehicle : filtre véhicule pour Tournées — sans les exclusions Marché
// Les exclusions Tournées se gèrent au niveau client via passesToursExclusions
function matchesToursVehicle(v){
  if(GF.marcheTypeFilter==='tracteur'&&!isTracteur(v))return false;
  if(GF.marcheTypeFilter==='porteur'&&!isPorteur(v))return false;
  // Important : le filtre VENDEUR de MARCHÉ n'impacte pas TOURNÉES.
  return true;
}
function matchesMarcheClient(c){
  if(GF.vendeursMarche&&GF.vendeursMarche.length&&!GF.vendeursMarche.some(function(v){return norm(c.vendeur||'')===norm(v);}))return false;
  if(GF.exclExclusionMarche){
    if(isClientExcluded(c))return false;
    if(isInactiveClientMarche(c.tva,c._siteKey||makeSiteKey(c)))return false;
  }
  if(GF.exclFlotteNationaleMarche&&isFlotteNationale(c))return false;
  return true;
}
function isVehicleRenewable(v){
  if(v.possession===false)return false;
  return isVehicleRenewableCore(v);
}
function isRenewDafMarche(v){return v.possession!==false&&isDaf(v)&&matchesMarcheVehicle(v)&&isVehicleRenewable(v);}
function isRenewHorsMarche(v){return v.possession!==false&&!isDaf(v)&&matchesMarcheVehicle(v)&&isVehicleRenewable(v);}
function isActifMarche(v){
  if(!matchesMarcheVehicle(v))return false;
  const y=getYear(v.date); if(!y)return false;
  return y>=YEAR-4;
}
function scoreClientMarche(tva,sk){
  const veh=_getSiteVeh(tva,sk).filter(matchesMarcheVehicle);
  const ren=Math.min(veh.filter(function(v){return isRenewDafMarche(v)||isRenewHorsMarche(v);}).length,8);
  const ac=Math.min(veh.filter(isActifMarche).length,6);
  return Math.min(ren*12+ac*2,100);
}
function getStatsMarche(tva,sk){
  const veh=_getSiteVeh(tva,sk).filter(matchesMarcheVehicle);
  const dafRenew=veh.filter(isRenewDafMarche);
  const horsRenew=veh.filter(isRenewHorsMarche);
  return{parc:veh.length,dafCount:veh.filter(isDaf).length,dafRenew:dafRenew.length,horsRenew:horsRenew.length,score:scoreClientMarche(tva,sk),allVehicles:_getSiteVeh(tva,sk)};
}
function saveExclusionRec(tva,updates){
  var ex=DB.getExclusions();
  if(!ex[tva])ex[tva]={};
  Object.assign(ex[tva],updates);
  DB.saveExclusions(ex);
  autoSave();
}
function matchesGF(v,screen){
  if(GF.marcheTypeFilter==='tracteur'&&!isTracteur(v))return false;
  if(GF.marcheTypeFilter==='porteur'&&!isPorteur(v))return false;
  return true;
}
function clientMatchesGF(c){
  if(GF.vendeur&&norm(c.vendeur||'')!==norm(GF.vendeur))return false;
  if(GF.pays&&norm(c.pays||'')!==norm(GF.pays))return false;
  if(GF.dept&&norm(c.dept||'')!==norm(GF.dept))return false;
  if(GF.profils&&GF.profils.length&&!GF.profils.some(function(p){return norm(c.profil||'')===norm(p);}))return false;
  return true;
}
// _getSiteVeh : source de vérité unique — véhicules du site exact via vBySite
// Pas de fallback : si le site n'a pas de véhicules rattachés par SIRET, retourne []
function _getSiteVeh(tva,sk){
  if(sk&&IDX.vBySite&&IDX.vBySite[sk])return IDX.vBySite[sk];
  return [];
}
function getVehiclesForCalc(tva,sk){return _getSiteVeh(tva,sk).filter(function(v){return v.possession!==false&&matchesMarcheVehicle(v);});}
function isInactive(tva,sk){return isInactiveClient(tva,sk);}
function isRenewDaf(v){return v.possession!==false&&isDaf(v)&&matchesToursVehicle(v)&&isVehicleRenewable(v);}
function isRenewHors(v){return v.possession!==false&&!isDaf(v)&&matchesToursVehicle(v)&&isVehicleRenewable(v);}
function isActif(v){
  if(v.possession===false||!matchesMarcheVehicle(v))return false;
  const y=getYear(v.date); if(!y)return false;
  return y>=YEAR-4;
}
function scoreClient(tva,sk){
  const veh=getVehiclesForCalc(tva,sk);
  const ren=Math.min(veh.filter(function(v){return isRenewDaf(v)||isRenewHors(v);}).length,8);
  const ac=Math.min(veh.filter(isActif).length,6);
  return Math.min(ren*12+ac*2,100);
}
function getStats(tva,sk){
  const all=_getSiteVeh(tva,sk);
  const veh=getVehiclesForCalc(tva,sk);
  const dafRenew=veh.filter(isRenewDaf);
  const horsRenew=veh.filter(isRenewHors);
  return{parc:veh.length,dafCount:veh.filter(isDaf).length,dafRenew:dafRenew.length,horsRenew:horsRenew.length,score:scoreClient(tva,sk),allVehicles:all};
}
function hasOpenProject(tva){return (IDX.pByTva[tva]||[]).some(function(p){return p.status==='EN_COURS'||p.status==='FUTUR'||p.status==='PROJET'||p.status==='REPORTÉ'||p.status==='REPORTE';});}
function hasPasProjet(tva){const crm=DB.getCRM();const e=crm[tva];return !!(e&&e.pas_projet_year===YEAR);}
function applyGlobalFilters(clients,screen){return clients.filter(clientMatchesGF);}


// ===== MULTI-SITES HELPERS =====
function makeSiteKey(o){
  var t=String((o&&o.tva)||'').trim();
  var s=String((o&&o.siret)||'').trim();
  if(!t)return '';
  if(s)return t+'|'+s;
  // Pas de SIRET : on conserve une clé technique pour affichage, mais QUALITÉ le signalera.
  return t+'|SIRET_MANQUANT|'+norm((o&&o.ville)||'')+'|'+norm((o&&o.nom)||o.client||'');
}
function getSiteDecisionnaire(sk){
  var st=DB.getSettings()||{};
  if(!st.siteDecisionnaires)st.siteDecisionnaires={};
  return st.siteDecisionnaires[sk]!==false; // OUI par défaut
}
function setSiteDecisionnaire(sk,val){
  var st=DB.getSettings()||{};
  if(!st.siteDecisionnaires)st.siteDecisionnaires={};
  st.siteDecisionnaires[sk]=val!==false;
  DB.saveSettings(st);autoSave();
}
function getEnterpriseSites(tva){return (IDX.sitesByTva&&IDX.sitesByTva[tva])?IDX.sitesByTva[tva]:DB.getClients().filter(function(c){return c.tva===tva;});}
function getSiteVehicles(sk){return (IDX.vBySite&&IDX.vBySite[sk])?IDX.vBySite[sk]:[];}
function getSiteStats(sk){
  var all=getSiteVehicles(sk);
  var veh=all.filter(function(v){return v.possession!==false&&matchesGF(v);});
  return {parc:veh.length,dafCount:veh.filter(isDaf).length,dafRenew:veh.filter(isRenewDaf).length,horsRenew:veh.filter(isRenewHors).length,allVehicles:all,score:Math.min(Math.min(veh.filter(function(v){return isRenewDaf(v)||isRenewHors(v);}).length,8)*12+Math.min(veh.filter(isActif).length,6)*2,100)};
}
function getEnterpriseName(tva){var sites=getEnterpriseSites(tva);return (sites[0]&&sites[0].nom)||tva||'Entreprise';}
// ===== DETECT DISTINCT VALUES =====
function getDistinctVendeurs(){const s=new Set();DB.getClients().forEach(c=>{if(c.vendeur)s.add(c.vendeur);});return Array.from(s).sort();}
function getDistinctPays(){const s=new Set();DB.getClients().forEach(c=>{if(c.pays)s.add(c.pays);});return Array.from(s).sort();}
function getDistinctDepts(){const s=new Set();DB.getClients().forEach(c=>{if(c.dept)s.add(c.dept);});return Array.from(s).sort();}
function getDistinctProfils(){const s=new Set();DB.getClients().forEach(c=>{if(c.profil)s.add(c.profil);});return Array.from(s).sort();}
function getDistinctAnnees(){const s=new Set();DB.getVehicles().forEach(v=>{const y=getYear(v.date);if(y)s.add(String(y));});return Array.from(s).sort((a,b)=>b-a);}
function getDistinctCarrosseries(){const s=new Set();DB.getVehicles().forEach(v=>{if(v.carrosserie)s.add(v.carrosserie);});return Array.from(s).sort();}

// ===== GLOBAL FILTER BAR =====
function _vendeurDropHtml(screen){
  var vendeurs=getDistinctVendeurs();
  if(!vendeurs.length)return '';
  var sel=(GF.vendeursMarche||[]);
  var nbSel=sel.length;
  var label=nbSel?'Vendeur ('+nbSel+')':'Vendeurs ▼';
  var btnClass='gf-chip'+(nbSel?' on':'');
  return '<div style="position:relative;display:inline-block;" id="gf-vendeur-wrap-'+screen+'">'
    +'<button class="'+btnClass+'" id="gf-vendeur-btn-'+screen+'" style="font-size:10px;padding:4px 10px;">'+escH(label)+'</button>'
    +'<div id="gf-vendeur-drop-'+screen+'" style="display:none;position:fixed;z-index:9999;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);min-width:180px;max-height:260px;overflow-y:auto;box-shadow:0 6px 24px rgba(0,0,0,.7);">'
    +'<div style="padding:6px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">'
    +'<span style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;">Vendeurs</span>'
    +'<button id="gf-vendeur-reset-'+screen+'" style="background:none;border:none;color:var(--daf);font-size:10px;cursor:pointer;font-weight:700;">Tous</button>'
    +'</div>'
    +vendeurs.map(function(v){
      var checked=sel.indexOf(v)>=0;
      return '<label style="display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;border-bottom:1px solid var(--border);font-size:12px;">'
        +'<input type="checkbox" data-vendeur="'+escH(v)+'" data-screen="'+screen+'" '+(checked?'checked':'')+' style="accent-color:var(--daf);width:14px;height:14px;">'
        +'<span>'+escH(v)+'</span>'
        +'</label>';
    }).join('')
    +'</div></div>';
}
function _bindVendeurDrop(screen){
  var btn=$('gf-vendeur-btn-'+screen);
  var drop=$('gf-vendeur-drop-'+screen);
  var wrap=$('gf-vendeur-wrap-'+screen);
  if(!btn||!drop)return;
  btn.onclick=function(e){
    e.stopPropagation();
    var open=drop.style.display==='block';
    drop.style.display=open?'none':'block';
    if(!open){
      // Positionner en fixed sous le bouton
      var r=btn.getBoundingClientRect();
      drop.style.top=(r.bottom+4)+'px';
      drop.style.left=r.left+'px';
    }
  };
  var resetBtn=$('gf-vendeur-reset-'+screen);
  if(resetBtn)resetBtn.onclick=function(e){e.stopPropagation();GF.vendeursMarche=[];_applyVendeurFilter(screen);};
  drop.querySelectorAll('input[type=checkbox]').forEach(function(cb){
    cb.onchange=function(){
      var v=this.dataset.vendeur;
      if(!GF.vendeursMarche)GF.vendeursMarche=[];
      if(this.checked){if(GF.vendeursMarche.indexOf(v)<0)GF.vendeursMarche.push(v);}
      else{GF.vendeursMarche=GF.vendeursMarche.filter(function(x){return x!==v;});}
      _applyVendeurFilter(screen);
    };
  });
  document.addEventListener('click',function(e){
    if(wrap&&!wrap.contains(e.target))drop.style.display='none';
  },{passive:true});
}
function renderGFBar(screen){
  GF.profils=[];GF.pays='';GF.dept='';
  var vendeurs=getDistinctVendeurs();
  if(!vendeurs.length)return;
  // Injecter le bouton vendeur dans la bonne barre existante
  if(screen!=='marche')return;
  var containerId='marche-sticky-bar';
  var container=$(containerId);
  if(!container)return;
  // Supprimer l'ancien dropdown s'il existe
  var old=$('gf-vendeur-wrap-'+screen);
  if(old)old.remove();
  // Insérer en premier dans le container
  var tmp=document.createElement('div');
  tmp.innerHTML=_vendeurDropHtml(screen);
  var node=tmp.firstElementChild;
  if(node)container.insertBefore(node,container.firstChild);
  _bindVendeurDrop(screen);
}

function _applyVendeurFilter(screen){
  invalidateCache();
  buildIndex();
  if(screen==='marche'||screen==='home'||screen==='pdm'){renderMarche();}
  // Re-render the bar to update label

// ===== SHEET =====
function openSheet(title,html){
  $('sheet-title').textContent=title;
  $('sheet-body').innerHTML=html;
  $('sheet-ov').classList.add('open');
  $('sheet').classList.add('open');
  bindSheetEvents();
}
function closeSheet(){
  $('sheet-ov').classList.remove('open');
  $('sheet').classList.remove('open');
}
function bindSheetEvents(){
  QA('#sheet-body .poss-btn').forEach(btn=>{
    btn.onclick=function(){
      const vk=this.dataset.vk;
      const newState=this.dataset.state==='oui'?'non':'oui';
      const p=DB.getPossession();
      p[vk]=(newState==='non')?false:true;
      DB.savePossession(p);
      buildIndex();
      autoSave();
      this.dataset.state=newState;
      this.className=`poss-btn ${newState==='oui'?'p-oui':'p-non'}`;
      this.textContent=newState==='oui'?'✓ OUI':'✗ NON';
      toast('Possession mise à jour');
    };
  });
  QA('#sheet-body .btn-pas-proj').forEach(b=>{
    b.onclick=()=>wfPasProjet(b.dataset.tva,b.dataset.nom);
  });
  QA('#sheet-body .btn-proj-det').forEach(b=>{
    b.onclick=()=>wfProjetDetecte(b.dataset.tva,b.dataset.nom);
  });
  QA('#sheet-body .proj-card[data-pid]').forEach(b=>{
    b.onclick=()=>openProjectActions(b.dataset.pid,b.dataset.tva);
  });
  QA('#sheet-body .hist-del').forEach(b=>{
    b.onclick=()=>deleteHistory(b.dataset.tva,parseInt(b.dataset.idx));
  });
}

function openModal(title,bodyHtml,buttons){

function renderMktBars(vehicles){
  const counts={};
  vehicles.forEach(v=>{const m=(v.marque||'Inconnu').trim();counts[m]=(counts[m]||0)+1;});
  const total=Object.values(counts).reduce((a,b)=>a+b,0)||1;
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,10);
  return sorted.map(([brand,count])=>{
    const pct=Math.round(count/total*100);
    const col=(function(){for(var _bce=0;_bce<Object.keys(BRAND_COLORS).length;_bce++){var _bck=Object.keys(BRAND_COLORS)[_bce];if(brand.toUpperCase().includes(_bck))return BRAND_COLORS[_bck];}return 'var(--text3)';})();
    return`<div class="mkt-row">
      <div class="mkt-brand"><span class="mkt-name">${escH(brand)}</span><span class="mkt-count">${count} — ${pct}%</span></div>
      <div class="mkt-bar-wrap"><div class="mkt-bar" style="width:${pct}%;background:${col};"></div></div>
    </div>`;
  }).join('')||'<div style="font-size:11px;color:var(--text3);">Aucun véhicule</div>';
}

function bindImportEvents(){
  var zc=$('zone-crm'),fc=$('file-crm'),zi=$('zone-immat'),fi=$('file-immat');
  if(zc&&fc){
    zc.onclick=function(){fc.click();};
    fc.onchange=function(e){
      var f=e.target.files[0];if(!f)return;
      var statusEl=$('crm-status');
      if(statusEl)statusEl.textContent='Chargement…';
      parseExcel(f).then(function(data){
        var diag=$('import-diag');
        try{
          var r=importCRM(data);
          // Preserve manual exclusions from existing data
          var exRec=DB.getExclusions();
          DB.saveClients(r.clients);
          DB.saveExclusions(exRec);
          buildIndex();
          _unsavedChanges=true;
          autoSave();
          if(statusEl)statusEl.textContent='✓ '+r.clients.length+' clients';
          renderDiag(r.stats,null,r.cols,[]);
          toast(r.clients.length+' clients importés');
          renderMarche();
        }catch(err){
          if(statusEl)statusEl.textContent='❌ '+err.message;
          toast('Erreur: '+err.message);
        }
      }).catch(function(err){
        if(statusEl)statusEl.textContent='❌ '+err.message;
        toast('Erreur lecture: '+err.message);
      });
    };
  }
  if(zi&&fi){
    zi.onclick=function(){fi.click();};
    fi.onchange=function(e){
      var f=e.target.files[0];if(!f)return;
      var statusEl=$('immat-status');
      if(statusEl)statusEl.textContent='Chargement…';
      parseExcel(f).then(function(data){
        var diag=$('import-diag');
        try{
          var r=importVehicles(data,DB.getPossession());
          DB.saveVehicles(r.vehicles);
          buildIndex();
          _unsavedChanges=true;
          autoSave();
          if(statusEl)statusEl.textContent='✓ '+r.vehicles.length+' véhicules';
          renderDiag(null,r.stats,[],r.cols);
          toast(r.vehicles.length+' véhicules importés');
          renderMarche();
        }catch(err){

      <div class="form-group"><label class="form-label">Nouveau nom</label><input class="form-input" id="rn-name" value="${escH(bases[id]||'')}" maxlength="30"></div>
    `,[
      {label:'Annuler',cls:'btn-ghost'},
      {label:'Renommer',cls:'btn-primary',action:()=>{
        const name=(($('rn-name')||{}).value||'').trim();
        if(!name){toast('Nom requis');return;}
        bases[id]=name;DB.saveBases(bases);
        toast('Renommée');renderMarche();
      }}
    ]);
  });
  safeOn('btn-dup-base','click',()=>{
    const bases=DB.getBases();const id=DB.getBase();
    const name=`${bases[id]||'Base'} (copie)`;
    const newId='base'+Date.now();
    bases[newId]=name;
    DB.saveBases(bases);
    // copy all keys
    ['clients','vehicles','crm','projects','history','possession','settings'].forEach(k=>{
      const val=localStorage.getItem(`daf_pro_${id}_${k}`);
      if(val)localStorage.setItem(`daf_pro_${newId}_${k}`,val);
    });
    DB.setBase(newId);
    buildIndex();
    toast(`Base dupliquée : ${name}`);
    renderMarche();
  });
  safeOn('btn-del-base','click',()=>{
    const bases=DB.getBases();const id=DB.getBase();
    if(Object.keys(bases).length<=1){toast('Impossible de supprimer la seule base');return;}
    openModal('⚠️ Supprimer la base',`<p style="font-size:12px;color:var(--text2);">Supprimer définitivement <strong>${escH(bases[id])}</strong> et toutes ses données ?</p>`,[
      {label:'Annuler',cls:'btn-ghost'},
      {label:'Supprimer',cls:'btn-red',action:()=>{
        ['clients','vehicles','crm','projects','history','possession','settings'].forEach(k=>{
          localStorage.removeItem(`daf_pro_${id}_${k}`);
        });
        delete bases[id];
        DB.saveBases(bases);
        DB.setBase(Object.keys(bases)[0]);
        buildIndex();
        toast('Base supprimée');
        renderMarche();
      }}
    ]);
  });
}

function renderDiag(cs,vs,ccols,vcols){
  const diag=$('import-diag');if(!diag)return;
  let rows=[];
  if(cs){
    rows=[
      ['Clients source',cs.total,'ok'],
      ['Clients reconnus',cs.reconnus,cs.reconnus>0?'ok':'err'],
      ['Sans TVA',cs.sansTva,cs.sansTva?'warn':'ok'],
      ['Sans nom',cs.sansNom,cs.sansNom?'warn':'ok'],
      ['Sans ville',cs.sansVille,cs.sansVille>5?'warn':'ok'],
      ['Sans canton',cs.sansCanton,cs.sansCanton>5?'warn':'ok'],
      ['Doublons supprimés',cs.dups,cs.dups>0?'warn':'ok'],
    ];
    if(ccols.length)rows.push([`Colonnes (${ccols.length})`,ccols.slice(0,5).join(', ')+(ccols.length>5?'…':''),'ok']);
  }
  if(vs){
    rows=rows.concat([
      ['Véhicules source',vs.total,'ok'],
      ['Véhicules reconnus',vs.reconnus,vs.reconnus>0?'ok':'err'],
      ['Sans TVA',vs.sansTva,vs.sansTva?'warn':'ok'],
      ['Sans date',vs.sansDate,vs.sansDate>0?'warn':'ok'],
      ['Sans plaque',vs.sansPlaque,vs.sansPlaque>0?'warn':'ok'],
      ['Sans type',vs.sansType,vs.sansType>5?'warn':'ok'],
      ['Sans marque',vs.sansMarque,vs.sansMarque>0?'warn':'ok'],
      ['Doublons supprimés',vs.dups,vs.dups>0?'warn':'ok'],
    ]);
    if(vcols.length)rows.push([`Colonnes véhicules`,vcols.slice(0,5).join(', ')+(vcols.length>5?'…':''),'ok']);
  }
  var diagRows='';
  rows.forEach(function(r){diagRows+='<div class="diag-row"><span class="diag-lbl">'+r[0]+'</span><span class="diag-val d-'+r[2]+'">'+escH(String(r[1]))+'</span></div>';});
  diag.innerHTML='<div style="margin-top:10px;"><div class="card-title">&#128269; Diagnostic import</div>'+diagRows+'</div>';
}

let toursF='all', toursSearch='', toursExp={};

function buildToursData(){
  return DB.getClients().filter(clientMatchesGF).map(function(c){
    var sk=c._siteKey||makeSiteKey(c);
    const stats=getStatsCached(c.tva,sk);
    const isUrgent=isClientUrgent(c);
    const hasProjet=hasOpenProject(c.tva);
    const pasProjet=hasPasProjet(c.tva);
    var _ro=Object.assign({},c,stats);
    _ro.isFlotteNationale=isFlotteNationale(c);
    _ro.isFlotteRegionale=isFlotteRegionale(c);
    _ro.isFlotteCoordonnee=isFlotteCoordonnee(c);
    _ro.isFlotte=isFlotteBadge(c);
    _ro.isUrgent=isUrgent;
    _ro.hasProjet=hasProjet;
    _ro.pasProjet=pasProjet;
    _ro.isExclu=isClientExcluded(c);
    _ro.isInactif=isInactiveClient(c.tva,sk);
    _ro.hasTypeVerifier=_getSiteVeh(c.tva,sk).filter(matchesMarcheVehicle).some(isTypeVerifier);
    return _ro;
  });
}
function passesToursExclusions(c){
  if(GF.masquerExclusTours&&c.isExclu)return false;
  if(GF.masquerInactifsTours&&c.isInactif)return false;
  if(GF.masquerFlotteNationaleTours&&c.isFlotteNationale)return false;
  if(GF.masquerProjet&&(c.hasProjet||c.pasProjet))return false;
  return true;
}
function updateToursMaskButtons(){
  var defs=[
    ['btn-mask-exclus','Exclus',GF.masquerExclusTours],
    ['btn-mask-inactifs','Inactifs',GF.masquerInactifsTours],
    ['btn-mask-flotte-nat','Flotte Nat.',GF.masquerFlotteNationaleTours],
    ['btn-mask-projets','Projets',GF.masquerProjet]
  ];
  defs.forEach(function(d){var el=$(d[0]);if(!el)return;el.textContent=d[1]+' '+(d[2]?'ON':'OFF');el.className='gf-chip'+(d[2]?' on':'');});
}
function renderTours(){
  const data=buildToursData();
  const search=toursSearch.toLowerCase().trim();
  let shown=data.filter(function(c){
    // Cas spécial : le bouton FLOTTE sert d'audit. Il doit montrer les clients flotte
    // même si le masquage Flotte Nationale est actif, sinon on ne peut jamais les contrôler.
    if(toursF!=='flotte' && !passesToursExclusions(c))return false;
    if(search){
      const q=search;
      if(!(c.nom||'').toLowerCase().includes(q)&&!(c.ville||'').toLowerCase().includes(q)&&!(c.canton||'').toLowerCase().includes(q)&&!(c.vendeur||'').toLowerCase().includes(q)&&!(c.profil||'').toLowerCase().includes(q))return false;
    }
    switch(toursF){
      case 'daf_with':return c.dafCount>0;
      case 'no_daf':return c.dafCount===0;
      case 'urgent':return c.isUrgent;
      case 'flotte':return c.isFlotte;
      default:return true;
    }
  });
  updateToursMaskButtons();
  const kClients=shown.length;
  // Déduplique par site exact (TVA+SIRET) et non par TVA
  // pour éviter d'ignorer les sites frères d'une même entreprise multi-établissements
  const shownUniqueBySite={};
  shown.forEach(function(c){
    var sk=c._siteKey||makeSiteKey(c)||c.tva;
    if(c&&sk&&!shownUniqueBySite[sk])shownUniqueBySite[sk]=c;
  });
  const shownUnique=Object.values(shownUniqueBySite);
  const kParc=shownUnique.reduce(function(a,c){return a+c.parc;},0);
  const kDafRenew=shownUnique.reduce(function(a,c){return a+c.dafRenew;},0);
  const kHorsRenew=shownUnique.reduce(function(a,c){return a+c.horsRenew;},0);
  const kSansDaf=shownUnique.filter(function(c){return c.dafCount===0;}).length;
  const kUrgent=shown.filter(function(c){return c.isUrgent;}).length;
  $('tours-counters').innerHTML=`
    <div class="kpi-card c-blue" style="cursor:pointer;" data-cf="all"><div class="kpi-val">${kClients}</div><div class="kpi-lbl">Clients</div></div>
    <div class="kpi-card" style="cursor:pointer;" data-cf="all"><div class="kpi-val">${kParc}</div><div class="kpi-lbl">Parc total</div></div>
    <div class="kpi-card c-daf${toursF==='daf_renew_kpi'?' active':''}" style="cursor:pointer;" data-cf="daf_renew_kpi"><div class="kpi-val">${kDafRenew}</div><div class="kpi-lbl">DAF renouv.</div></div>
    <div class="kpi-card c-blue${toursF==='hors_renew_kpi'?' active':''}" style="cursor:pointer;" data-cf="hors_renew_kpi"><div class="kpi-val">${kHorsRenew}</div><div class="kpi-lbl">Conc. renouv.</div></div>
    <div class="kpi-card c-red${toursF==='no_daf_kpi'?' active':''}" style="cursor:pointer;" data-cf="no_daf_kpi"><div class="kpi-val">${kSansDaf}</div><div class="kpi-lbl">Sans DAF</div></div>
    <div class="kpi-card c-red${toursF==='urgent_kpi'?' active':''}" style="cursor:pointer;" data-cf="urgent_kpi"><div class="kpi-val">${kUrgent}</div><div class="kpi-lbl">Urgents</div></div>
  `;
  // KPI click handlers
  QA('#tours-counters .kpi-card[data-cf]').forEach(function(el){
    el.onclick=function(){
      var f=this.dataset.cf;
      toursF=(toursF===f&&f!=='all')?'all':f;
      // Sync fpills
      QA('#tours-fpills .fpill, #tours-fpills [data-f]').forEach(function(p){p.classList.remove('active');});
      var matchFpill=document.querySelector('#tours-fpills [data-f="'+toursF+'"]');
      if(matchFpill)matchFpill.classList.add('active');
      else{var allFpill=document.querySelector('#tours-fpills [data-f="all"]');if(allFpill)allFpill.classList.add('active');}
      renderTours();
    };
  });
  const toursSortSel=$('tours-sort-sel');
  const toursSort=toursSortSel?toursSortSel.value:'score';
  if(!shown.length){$('tours-list').innerHTML=`<div class="empty-state"><div class="empty-icon">🗺</div><div class="empty-title">Aucun client</div><div class="empty-sub">Modifiez les boutons ou importez des données</div></div>`;return;}
  const byCV={};
  shown.forEach(function(c){
    const canton=c.canton||'Sans canton';
    const ville=c.ville||'Sans ville';
    if(!byCV[canton])byCV[canton]={};
    if(!byCV[canton][ville])byCV[canton][ville]=[];
    byCV[canton][ville].push(c);
  });
  let html='';
  Object.keys(byCV).sort().forEach(function(canton){
    const ck='c_'+canton;
    const isOpen=toursExp[ck]===true;
    const villes=byCV[canton];
    let cTotal=0,cDaf=0,cDafR=0,cHorsR=0;
    Object.values(villes).forEach(function(cls){cls.forEach(function(c){cTotal++;if(c.dafCount>0)cDaf++;cDafR+=c.dafRenew;cHorsR+=c.horsRenew;});});
    html+=`<div class="sec-hdr ${isOpen?'sec-open':''}" data-ck="${escH(ck)}">
      <div><div class="sec-hdr-title">📍 ${escH(canton)}</div><div style="font-size:9px;color:var(--text3);margin-top:1px;">${cTotal} clients · DAF:${cDaf} · R.DAF:${cDafR} · R.Conc:${cHorsR}</div></div>
      <div style="display:flex;align-items:center;gap:6px;"><span style="font-size:10px;color:var(--text3);">${cTotal}</span><span class="sec-chevron">▶</span></div>
    </div>`;
    if(isOpen){
      Object.keys(villes).sort().forEach(function(ville){
        const vk='v_'+canton+'_'+ville;
        const isVOpen=toursExp[vk]===true;
        const cls=villes[ville];
        let vDaf=0,vDafR=0,vHorsR=0;
        cls.forEach(function(c){if(c.dafCount>0)vDaf++;vDafR+=c.dafRenew;vHorsR+=c.horsRenew;});
        html+=`<div class="subsec-hdr ${isVOpen?'sec-open':''}" data-ck="${escH(vk)}">
          <div><div style="font-size:11px;font-weight:600;color:var(--text2);">🏙 ${escH(ville)}</div><div class="ville-counts"><span class="vc-item">🟡${vDaf}</span><span class="vc-item">🔄${vDafR}</span><span class="vc-item">🎯${vHorsR}</span></div></div>
          <div style="display:flex;align-items:center;gap:5px;"><span style="font-size:10px;color:var(--text3);">${cls.length}</span><span class="sec-chevron" style="font-size:9px;">▶</span></div>
        </div>`;
        if(isVOpen){
          var sortedCls=cls.slice();
          if(toursSort==='parc_desc') sortedCls.sort(function(a,b){return b.parc-a.parc;});
          else if(toursSort==='parc_asc') sortedCls.sort(function(a,b){return a.parc-b.parc;});
          else if(toursSort==='nom_asc') sortedCls.sort(function(a,b){return (a.nom||'').localeCompare(b.nom||'');});
          else if(toursSort==='renew_desc') sortedCls.sort(function(a,b){return (b.dafRenew+b.horsRenew)-(a.dafRenew+a.horsRenew);});
          else sortedCls.sort(function(a,b){return b.score-a.score;});
          sortedCls.forEach(function(c){html+=renderClientRow(c);});
        }
      });
    }
  });
  $('tours-list').innerHTML=html;
  QA('#tours-list .sec-hdr[data-ck],#tours-list .subsec-hdr[data-ck]').forEach(function(el){el.onclick=function(){const k=el.dataset.ck;toursExp[k]=!el.classList.contains('sec-open');renderTours();};});
  QA('#tours-list .client-row[data-tva]').forEach(function(el){el.onclick=function(){openClientSheet(el.dataset.tva);};});
}
function renderClientRow(c){
  const badges=[];
  if(c.dafCount>0)badges.push('<span class="badge b-daf">DAF</span>');
  if(c.dafRenew>0)badges.push('<span class="badge b-daf">DAF RENOUV.</span>');
  if(c.horsRenew>0)badges.push('<span class="badge b-conc">CONC. RENOUV.</span>');
  if(c.isUrgent)badges.push('<span class="badge b-urgent">URGENT</span>');
  if(c.hasProjet)badges.push('<span class="badge b-projet">PROJET</span>');
  if(c.pasProjet)badges.push('<span class="badge" style="background:var(--bg3);color:var(--text3);border:1px solid var(--border);">SANS PROJET</span>');
  if(c.isFlotteRegionale)badges.push('<span class="badge b-flotte">FLOTTE RÉGIO.</span>');
  if(c.isFlotteCoordonnee)badges.push('<span class="badge b-flotte">FLOTTE COORD.</span>');
  if(c.isFlotteNationale)badges.push('<span class="badge b-flotte">FLOTTE NAT.</span>');
  if(c.isExclu)badges.push('<span class="badge" style="background:var(--bg3);color:var(--text3);border:1px solid var(--border);">EXCLU</span>');
  if(c.isInactif)badges.push('<span class="badge" style="background:var(--bg3);color:var(--text3);border:1px solid var(--border);">INACTIF</span>');
  if(c.hasTypeVerifier)badges.push('<span class="badge" style="background:var(--orange-bg);color:var(--orange);border:1px solid rgba(224,120,48,.3);">TYPE À VÉRIF.</span>');
  return`<div class="client-row" data-tva="${escH(c.tva)}">
    <div class="c-info">
      <div class="c-name">${escH(c.nom)}</div>
      <div class="c-badges">${badges.join('')}</div>
      <div class="c-sub">Parc:${c.parc} · DAF:${c.dafCount} · Renouv.:${c.dafRenew+c.horsRenew}</div>
    </div>
    <div class="c-score"><div class="score-val">${c.score}</div><div class="score-lbl">pts</div></div>
  </div>`;
}

function getBrandLogo(marque) {
  const m = (marque||'').trim().toUpperCase();
  var _bkeys=Object.keys(BRAND_LOGOS);
  for(var _bki=0;_bki<_bkeys.length;_bki++){
    var _bk=_bkeys[_bki];
    if(m===_bk.toUpperCase()||m.includes(_bk.toUpperCase()))return BRAND_LOGOS[_bk];
  }
  // Generic truck icon with brand initial
  const initial = m.charAt(0)||'?';
  return `<svg width="20" height="20" viewBox="0 0 20 20"><rect width="20" height="20" rx="3" fill="#2a3040"/><text x="10" y="14" text-anchor="middle" font-size="10" font-weight="700" fill="#a0a8b8">${initial}</text></svg>`;
}

function deleteHistory(tva,idx){
  const hist=DB.getHistory();
  if(!hist[tva])return;
  // Check if it's a PAS_DE_PROJET entry
  const entry=hist[tva][idx];
  if(entry&&entry.type==='PAS DE PROJET'){
    // Remove pas_projet from CRM too
    const crm=DB.getCRM();
    if(crm[tva]){delete crm[tva].pas_projet_year;delete crm[tva].pas_projet_date;DB.saveCRM(crm);}
  }
  hist[tva].splice(idx,1);
  DB.saveHistory(hist);
  autoSave();
  toast('Entrée supprimée');
  openClientSheet(tva);
  if(currentScreen==='tours')renderTours();
}

function updateProjet(pid,status,tva){
  const projects=DB.getProjects();
  const idx=projects.findIndex(p=>p.id===pid);
  if(idx<0)return;
  projects[idx].status=status;
  projects[idx].updated=new Date().toISOString();
  DB.saveProjects(projects);
  const hist=DB.getHistory();
  if(!hist[tva])hist[tva]=[];
  hist[tva].push({date:new Date().toISOString(),type:`PROJET → ${status}`,text:''});
  DB.saveHistory(hist);
  buildIndex();
  autoSave();
  toast(`Projet → ${status}`);
  openClientSheet(tva);
  if(currentScreen==='projets')renderProjets();
  if(currentScreen==='tours')renderTours();
}

let projetFilter='all', projetSearch='', projetSort='date_desc';

function renderProjets(){
  const projects=DB.getProjects();
  const clients=DB.getClients();
  const open=projects.filter(p=>p.status==='EN_COURS'||p.status==='FUTUR');
  const yearP=projects.filter(p=>getYear(p.date)===YEAR);
  const gagnes=projects.filter(p=>p.status==='GAGNE');
  const perdusList=projects.filter(p=>p.status==='PERDU');
  const totalCam=open.reduce((a,p)=>a+(parseInt(p.camions)||0),0);
  const camionsGagnesAnnee=projects.filter(p=>p.status==='GAGNE'&&getYear(p.updated||p.created||p.date)===YEAR).reduce((a,p)=>a+(parseInt(p.camions)||0),0);

  // Apply filter + search
  let shown=projects;
  if(projetFilter==='open') shown=shown.filter(p=>p.status==='EN_COURS'||p.status==='FUTUR');
  else if(projetFilter==='year') shown=shown.filter(p=>getYear(p.date)===YEAR);
  else if(projetFilter==='gagne') shown=shown.filter(p=>p.status==='GAGNE');
  else if(projetFilter==='perdu') shown=shown.filter(p=>p.status==='PERDU');

  if(projetSearch.trim()){
    const q=projetSearch.toLowerCase();
    shown=shown.filter(p=>(p.nom||'').toLowerCase().includes(q)||(p.tva||'').includes(q)||(p.commentaire||'').toLowerCase().includes(q));
  }

  // Sort

// ===== EXPORTS =====
function dlCSV(filename,rows){
  const csv=rows.map(r=>r.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(';')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}

function exportCSV(type){
  const base=DB.getBases()[DB.getBase()]||'base';
  const clients=DB.getClients();const vehicles=DB.getVehicles();
  const filtered=applyGlobalFilters(clients);

  if(type==='tours'){
    const rows=[['TVA','Client','Ville','Canton','Vendeur','Pays','Dept','SIREN','SIRET','Flotte','Urgente','Projet','Parc','DAF','R.DAF','R.Hors','Score']];
    filtered.forEach(c=>{
      const s=getStats(c.tva);
      const isF=/flotte r[eé]gionale|flotte coordonn[eé]e/i.test(c.profil||'')?'OUI':'NON';
      const isU=(c.priorite&&c.priorite.trim())?'OUI':'NON';
      const isP=hasOpenProject(c.tva)?'OUI':'NON';
      rows.push([c.tva,c.nom,c.ville,c.canton,c.vendeur,c.pays,c.dept,c.siren,c.siret,isF,isU,isP,s.parc,s.dafCount,s.dafRenew,s.horsRenew,s.score]);
    });
    dlCSV(`${base}_tournees_${YEAR}.csv`,rows);
    toast('Export Tournées téléchargé');
  }else if(type==='renewals'){
    const rows=[['TVA','Client','Ville','Canton','Vendeur','Pays','Dept','SIRET','Plaque','Marque','Modèle','Type','Carrosserie','Date Immat','Année','R.DAF/Hors','Possession']];
    filtered.forEach(c=>{
      _getSiteVeh(c.tva,c._siteKey||makeSiteKey(c)).filter(v=>isRenewDaf(v)||isRenewHors(v)).forEach(v=>{
        const possession=(DB.getPossession()[`${v.tva}|${v.plaque}`]===false)?'NON':'OUI';
        rows.push([c.tva,c.nom,c.ville,c.canton,c.vendeur||v.vendeur,c.pays||v.pays,c.dept||v.dept,c.siret||v.siret,v.plaque,v.marque,v.modele,v.type,v.carrosserie,fmtDate(v.date),getYear(v.date),isRenewDaf(v)?'DAF':'HORS DAF',possession]);
      });
    });
    dlCSV(`${base}_renouvellements_${YEAR}.csv`,rows);
    toast('Export Renouvellements téléchargé');
  }else if(type==='projects'){
    const rows=[['ID','TVA','Client','Ville','Canton','Vendeur','Pays','Dept','SIRET','Statut','Date','Camions','Commentaire','Résultat','Créé','MàJ']];
    DB.getProjects().forEach(p=>{
      const c=IDX.cByTva[p.tva]||{};
      rows.push([p.id,p.tva,p.nom,c.ville,c.canton,c.vendeur,c.pays,c.dept,c.siret,p.status,p.date,p.camions,p.commentaire,p.result||'',p.created,p.updated||'']);
    });
    dlCSV(`${base}_projets_${YEAR}.csv`,rows);
    toast('Export Projets téléchargé');
  }else if(type==='crm'){
    const rows=[['TVA','Client','Ville','Canton','Date action','Type','Commentaire']];
    const hist=DB.getHistory();
    filtered.forEach(c=>{
      (hist[c.tva]||[]).forEach(h=>{
        rows.push([c.tva,c.nom,c.ville,c.canton,fmtDate(h.date),h.type,h.text]);
      });
    });
    dlCSV(`${base}_crm_${YEAR}.csv`,rows);
    toast('Export CRM téléchargé');
  }
}

function restoreJSON(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        openModal('📥 Restaurer',`<p style="font-size:12px;color:var(--text2);">Restaurer la base <strong>${escH(data.nom||data.base||'?')}</strong> avec ${(data.clients||[]).length} clients et ${(data.vehicles||[]).length} véhicules ?<br><br>⚠️ Les données actuelles seront remplacées.</p>`,[
          {label:'Annuler',cls:'btn-ghost'},
          {label:'Restaurer',cls:'btn-primary',action:()=>{
            if(data.clients)DB.saveClients(data.clients);
            if(data.vehicles)DB.saveVehicles(data.vehicles);
            if(data.crm)DB.saveCRM(data.crm);
            if(data.projects)DB.saveProjects(data.projects);
            if(data.history)DB.saveHistory(data.history);
            if(data.possession)DB.savePossession(data.possession);
            buildIndex();autoSave();
            toast('Restauration effectuée !');
            renderMarche();renderMore();
            resolve(true);
          }}
        ]);
      }catch(err){toast('Fichier JSON invalide');resolve(false);}
    };
    reader.readAsText(file);
  });
}

function renderQualite(){

    +mkKpi(flotteReg.length,'Flotte régionale',flotteReg.length>0?'c-blue':'c-green','flotte_reg')
    +mkKpi(flotteCoord.length,'Flotte coordonnée',flotteCoord.length>0?'c-blue':'c-green','flotte_coord')
    +mkKpi(Object.keys(profilsMap).length,'Profils distincts','c-blue','profils_distincts')
    +'</div>';
  html+='<div id="qualite-detail"></div>';
  var summaryRows=[['Clients total',clients.length,'ok'],['Véhicules total',vehicles.length,'ok'],['Immat. sans client',immatSansClient.length,immatSansClient.length>0?'warn':'ok'],['Clients sans TVA',sansTva,sansTva>0?'err':'ok'],['Clients sans SIRET',sansSiret,sansSiret>0?'warn':'ok'],['Clients sans ville',sansVille,sansVille>0?'warn':'ok'],['Clients sans canton',sansCanton,sansCanton>0?'warn':'ok'],['Immat. sans date',immatSansDate,immatSansDate>0?'warn':'ok'],['Tous clients flotte',flotteTous.length,flotteTous.length>0?'ok':'warn'],['Flotte nationale',flotteNat.length,flotteNat.length>0?'ok':'warn'],['Profils distincts',Object.keys(profilsMap).length,'ok']];
  var sumHtml='';summaryRows.forEach(function(r){sumHtml+='<div class="diag-row"><span class="diag-lbl">'+r[0]+'</span><span class="diag-val d-'+r[2]+'">'+r[1]+'</span></div>';});

  $('qualite-content').innerHTML=html;

      else if(qf==='sans_canton'){title='Clients sans canton';items=clients.filter(c=>!c.canton||c.canton.trim()==='').slice(0,100).map(c=>[escH(c.nom||'?'),escH(c.ville||'')]);}

      else if(qf==='flotte_nat'){title='Flotte nationale ('+flotteNat.length+')';items=flotteNat.slice(0,200).map(function(c){return [escH(c.nom||'?')+' — '+escH(c.tva||''), escH(c.profil||'')+' · '+escH(c.ville||'')];});}
      else if(qf==='flotte_reg'){title='Flotte régionale ('+flotteReg.length+')';items=flotteReg.slice(0,200).map(function(c){return [escH(c.nom||'?')+' — '+escH(c.tva||''), escH(c.profil||'')+' · '+escH(c.ville||'')];});}
      else if(qf==='flotte_coord'){title='Flotte coordonnée ('+flotteCoord.length+')';items=flotteCoord.slice(0,200).map(function(c){return [escH(c.nom||'?')+' — '+escH(c.tva||''), escH(c.profil||'')+' · '+escH(c.ville||'')];});}

    };
  });
}

function getAppSettings(){return DB.getSettings()||{};}
function saveAppSettings(st){DB.saveSettings(st||{});autoSave();}
function getManualGroups(){var st=getAppSettings();return st.manualGroups||[];}
function saveManualGroups(groups){var st=getAppSettings();st.manualGroups=groups||[];saveAppSettings(st);}
function groupIdForTva(tva){return 'AUTO_TVA_'+String(tva||'').replace(/[^A-Za-z0-9]/g,'_');}
function makeManualGroupId(){return 'GRP_'+Date.now()+'_'+Math.floor(Math.random()*1000);}
function siteInManualGroup(sk){var groups=getManualGroups();for(var i=0;i<groups.length;i++){if((groups[i].siteKeys||[]).indexOf(sk)>=0)return groups[i];}return null;}
function getAutoGroupForSite(c){if(!c||!c.tva)return null;var arr=(IDX.sitesByTva&&IDX.sitesByTva[c.tva])||[];if(arr.length<2)return null;return {id:groupIdForTva(c.tva),name:'Groupe TVA '+c.tva,auto:true,tva:c.tva,siteKeys:arr.map(makeSiteKey)};}
function getGroupForSiteKey(sk){var c=IDX.cBySite&&IDX.cBySite[sk];if(!c)return null;return siteInManualGroup(sk)||getAutoGroupForSite(c);}
function getGroupById(gid){var groups=getManualGroups();for(var i=0;i<groups.length;i++){if(groups[i].id===gid)return groups[i];}if(String(gid||'').indexOf('AUTO_TVA_')===0){var tva=String(gid).replace('AUTO_TVA_','');var keys=Object.keys(IDX.sitesByTva||{});for(var k=0;k<keys.length;k++){if(groupIdForTva(keys[k])===gid){var arr=IDX.sitesByTva[keys[k]]||[];return {id:gid,name:'Groupe TVA '+keys[k],auto:true,tva:keys[k],siteKeys:arr.map(makeSiteKey)};}}}return null;}
function getAllGroups(){var out=[];var seen={};getManualGroups().forEach(function(g){out.push(g);seen[g.id]=true;});Object.keys(IDX.sitesByTva||{}).forEach(function(tva){var arr=IDX.sitesByTva[tva]||[];if(arr.length>1){var gid=groupIdForTva(tva);if(!seen[gid])out.push({id:gid,name:'Groupe TVA '+tva,auto:true,tva:tva,siteKeys:arr.map(makeSiteKey)});}});return out;}
function getGroupMeta(){var st=getAppSettings();if(!st.groupSiteMeta)st.groupSiteMeta={};return st.groupSiteMeta;}
function setGroupMeta(gid,sk,updates){var st=getAppSettings();if(!st.groupSiteMeta)st.groupSiteMeta={};var key=gid+'|'+sk;if(!st.groupSiteMeta[key])st.groupSiteMeta[key]={};Object.assign(st.groupSiteMeta[key],updates||{});saveAppSettings(st);}
function getGroupSiteMeta(gid,sk){var st=getAppSettings();return ((st.groupSiteMeta||{})[gid+'|'+sk])||{};}
function groupSiteIsPrincipal(gid,sk){var m=getGroupSiteMeta(gid,sk);return m.principal!==false;}
function groupSiteIsDecisionnaire(gid,sk){if(groupSiteIsPrincipal(gid,sk))return true;var m=getGroupSiteMeta(gid,sk);return m.decisionnaire===true;}

function saveImportDiagnostic(type,data){
  try{
    if(!data||!data.length)return;
    var headers=(data[0]||[]).map(function(h){return String(h||'').trim();});
    var rules=IMPORT_DIAG_RULES[type]||[];
    var results=rules.map(function(r){var idx=findCol(headers,r.aliases);return {key:r.key,label:r.label,critical:!!r.critical,found:idx>=0,header:idx>=0?headers[idx]:'',aliases:r.aliases};});
    var st=getAppSettings(); if(!st.importDiagnostics)st.importDiagnostics={};
    st.importDiagnostics[type]={date:new Date().toISOString(),rowCount:Math.max(0,data.length-1),headers:headers,results:results};
    saveAppSettings(st);
  }catch(e){}
}
